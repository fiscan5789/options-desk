<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 16px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;

.app { max-width: 680px; margin: 0 auto; padding: 0 0 2rem; }

.topbar {

  background: rgba(242,242,240,0.93);

.topbar-time { font-size: 11px; color: #888; }

.btn {

}

.btn:disabled { opacity: .35; pointer-events: none; }
.btn-active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

<body>
<div class="app" id="root"></div>
<script>
const KEY = '8YxfViBiNRATU2HQwZTSUaJatTsFI0yh';
// Shared spot prices used by optionChain() to anchor the strike window.
// Populated in runBriefing() before chain fetches execute.
let _chainSpots = {};

const SESSIONS = [
  { id:'pre',  label:'Pre-market',  hhmm:'08:00', short:'8 AM',  startM:480,  endM:780  },
  { id:'mid',  label:'Mid-session', hhmm:'13:00', short:'1 PM',  startM:780,  endM:1020 },
  { id:'post', label:'After-close', hhmm:'17:00', short:'5 PM',  startM:1020, endM:1320 },
];

let S = { sid:null, tab:'overview', briefs:{}, narratives:{}, narrativeLoading:false, loading:false, errs:[], warns:[], now:new Date() };

/* ── Time ── */
const toET  = d => new Date(d.toLocaleString('en-US',{timeZone:'America/New_York'}));
const ymd   = d => d.toISOString().slice(0,10);
const dBack = n => { const d=new Date(toET(new Date())); d.setDate(d.getDate()-n); return ymd(d); };

function isMarketHours() {
  const et=toET(new Date()), h=et.getHours(), m=et.getMinutes(), day=et.getDay();
  if (day===0||day===6) return false;
  return (h*60+m)>=570 && (h*60+m)<960;
}
function sessStatus(s, now) {
  const et=toET(now), m=et.getHours()*60+et.getMinutes();
  if (m>=s.startM&&m<s.endM) return 'on';
  if (m<s.startM&&s.startM-m<=30) return 'nxt';
  return '';
}
function countdown(now) {
  const et=toET(now), cur=et.getHours()*60+et.getMinutes(), sec=et.getSeconds();
  for (const s of SESSIONS) {
    if (cur<s.startM) {
      const d=(s.startM-cur)*60-sec, h=Math.floor(d/3600), m=Math.floor((d%3600)/60), s2=d%60;
      return `next in ${h?h+'h ':''}${m}m ${String(s2).padStart(2,'0')}s`;
    }
  }
  const d=(1440-cur+480)*60-sec;
  return `8AM in ${Math.floor(d/3600)}h ${Math.floor((d%3600)/60)}m`;
}

/* ── API ── */
async function apiFetch(url, lbl) {
  const r=await fetch(url);
  const j=await r.json().catch(()=>({}));
  if (!r.ok||j.status==='ERROR') throw new Error(`${lbl}: ${j.error||j.message||r.status}`);
  return j;
}

async function stockBarsLong(ticker, days=35) {
  const to=ymd(toET(new Date())), from=dBack(days);
  const j=await apiFetch(
    `https://api.polygon.io/v2/aggs/ticker/${ticker}/range/1/day/${from}/${to}?adjusted=true&sort=desc&limit=40&apiKey=${KEY}`,
    `rv-bars/${ticker}`);
  return (j.results??[]).reverse();
}

async function stockPrev(ticker) {
  const j=await apiFetch(
    `https://api.polygon.io/v2/aggs/ticker/${ticker}/prev?adjusted=true&apiKey=${KEY}`,
    `prev/${ticker}`);
  return j.results?.[0]??null;
}

async function indexBars(sym, days=5) {
  try {
    const to=ymd(toET(new Date())), from=dBack(days);
    const j=await apiFetch(
      `https://api.polygon.io/v2/aggs/ticker/${encodeURIComponent(sym)}/range/1/day/${from}/${to}?sort=desc&limit=5&apiKey=${KEY}`,
      `idx/${sym}`);
    return j.results??[];
  } catch { return []; }
}

async function tYield() {
  try {
    const j=await apiFetch(`https://api.polygon.io/v1/indicators/treasury/yield?tenor=10Y&limit=1&apiKey=${KEY}`,`yield`);
    return j.results?.values?.[0]?.value??null;
  } catch { return null; }
}

// Options chain with configurable DTE window
async function optionChain(ticker, dteLow, dteHigh) {
  // Build expiration date strings by working entirely in ET calendar space.
  // Avoid all epoch-ms arithmetic which causes UTC/ET day boundary bugs.
  function etDatePlusDays(n) {
    const et = toET(new Date());
    // Set to noon ET to avoid any DST edge cases, then add n days
    et.setHours(12, 0, 0, 0);
    et.setDate(et.getDate() + n);
    const y = et.getFullYear();
    const m = String(et.getMonth()+1).padStart(2,'0');
    const d = String(et.getDate()).padStart(2,'0');
    return y+'-'+m+'-'+d;
  }
  const from = etDatePlusDays(dteLow);
  const to   = etDatePlusDays(dteHigh);
  // Use spot pre-fetched into _chainSpots by runBriefing before chain fetches start.
  const liveSpot = _chainSpots[ticker] ?? 0;

  // Use a TIGHT ±5% window centered on spot.
  // Diagnostic confirmed: wide windows (±12%) fill limit=250 with zero-OI
  // placeholder contracts at the extremes, never reaching ATM in the middle.
  // ±5% on SPY ($680) = $646–$714, only ~68 strikes — well within limit=250.
  // ±5% on GLD ($437) = $415–$459, only ~9 strikes at $5 intervals — fine.
  // ±5% on TLT ($90)  = $85–$94, only ~19 strikes at $0.50 intervals — fine.
  const lo = (liveSpot * 0.95).toFixed(2);
  const hi = (liveSpot * 1.05).toFixed(2);
  const j = await apiFetch(
    `https://api.polygon.io/v3/snapshot/options/${ticker}`
    + `?expiration_date.gte=${from}&expiration_date.lte=${to}`
    + `&strike_price.gte=${lo}&strike_price.lte=${hi}`
    + `&limit=250&sort=strike_price&order=asc&apiKey=${KEY}`,
    `chain/${ticker}/${dteLow}-${dteHigh}d`
  );
  const results = j.results ?? [];
  results._dateFrom = from;
  results._dateTo   = to;
  return results;
}

/* ── RV Calculator ── */
function calcRV(bars, window=20) {
  if (!bars||bars.length<window+1) return null;
  const recent=bars.slice(-(window+1));
  const closes=recent.map(b=>b.c).filter(c=>c>0);
  if (closes.length<window+1) return null;
  const returns=[];
  for (let i=1;i<closes.length;i++) returns.push(Math.log(closes[i]/closes[i-1]));
  if (returns.length<window) return null;
  const mean=returns.reduce((s,r)=>s+r,0)/returns.length;
  const variance=returns.reduce((s,r)=>s+Math.pow(r-mean,2),0)/returns.length;
  return { rv:Math.sqrt(variance*252), returns, nDays:returns.length, closes };
}

/* ── Chain analysis ── */
function analyseChain(contracts, spot, dateFrom, dateTo, liveSpotParam) {
  if (!contracts.length||!spot) return null;
  // liveSpot: use pre-fetched minute bar price passed as liveSpotParam.
  // Do NOT use underlying_asset.price from contracts — it can be stale or
  // reflect a different quote than what was used to build the strike window.
  const liveSpot = (liveSpotParam && liveSpotParam > 0) ? liveSpotParam : spot;
  // Sanity guard: discard contracts whose strike is >20% from live spot.
  const plausible=contracts.filter(c=>{const k=c.details?.strike_price??0;return k>0&&Math.abs(k-liveSpot)/liveSpot<0.10;});
  if (plausible.length<4) return null;
  // Replace passed-in spot with the live value for all downstream calculations
  spot = liveSpot;
  const calls=plausible.filter(c=>c.details?.contract_type==='call');
  const puts =plausible.filter(c=>c.details?.contract_type==='put');
  if (!calls.length||!puts.length) return null;

  // Find the single strike nearest to spot, then get the call and put AT THAT SAME STRIKE.
  // This prevents the call and put being selected from different strikes, which inflates
  // the ATM IV average when the chain has wide strike spacing (e.g. GLD at $5-$10 intervals).
  // Use plausible (already filtered) contracts for strike list so ATM is anchored to live spot
  const allStrikes = [...new Set(plausible.map(c=>c.details?.strike_price).filter(Boolean))].sort((a,b)=>a-b);
  const atmStrikeVal = allStrikes.reduce((a,b)=>Math.abs(a-spot)<=Math.abs(b-spot)?a:b, allStrikes[0]??spot);
  const atmC = calls.find(c=>c.details?.strike_price===atmStrikeVal) ?? calls.reduce((a,b)=>Math.abs((a.details?.strike_price??0)-spot)<=Math.abs((b.details?.strike_price??0)-spot)?a:b);
  const atmP = puts.find( c=>c.details?.strike_price===atmStrikeVal) ?? puts.reduce( (a,b)=>Math.abs((a.details?.strike_price??0)-spot)<=Math.abs((b.details?.strike_price??0)-spot)?a:b);
  // Average call and put IV at the same strike for a clean ATM mid
  const atmCallIV = atmC?.implied_volatility??0;
  const atmPutIV  = atmP?.implied_volatility??0;
  const atmIV = (atmCallIV>0 && atmPutIV>0) ? (atmCallIV+atmPutIV)/2 : (atmCallIV||atmPutIV||0);

  const expDate=atmC?.details?.expiration_date;
  const dte=expDate?Math.max(1,Math.round((new Date(expDate)-toET(new Date()))/86400000)):15;

  // 25Δ with correct sign convention + BS fallback
  function find25IV(arr, targetDelta) {
    const withG=arr.filter(c=>c.greeks?.delta!=null);
    if (withG.length>=3) {
      const best=withG.reduce((a,b)=>{
        const da=Math.abs(a.greeks.delta-targetDelta), db=Math.abs(b.greeks.delta-targetDelta);
        return da<=db?a:b;
      });
      return best?.implied_volatility??null;
    }
    if (!atmIV||!dte) return null;
    const T=dte/365, d1=targetDelta>0?0.674:-0.674;
    const theorK=spot*Math.exp(-d1*atmIV*Math.sqrt(T));
    const best=arr.reduce((a,b)=>
      Math.abs((a.details?.strike_price??0)-theorK)<=Math.abs((b.details?.strike_price??0)-theorK)?a:b);
    return best?.implied_volatility??null;
  }

  const iv25C=find25IV(calls,+0.25)??0;
  const iv25P=find25IV(puts, -0.25)??0;
  const skew25=(iv25P&&iv25C)?iv25P-iv25C:null;

  const callOI=calls.reduce((s,c)=>s+(c.open_interest??0),0);
  const putOI =puts.reduce( (s,c)=>s+(c.open_interest??0),0);
  const pcRatio=callOI?(putOI/callOI).toFixed(2):'—';

  const walls=[...contracts].sort((a,b)=>(b.open_interest??0)-(a.open_interest??0)).slice(0,5)
    .map(c=>({strike:c.details?.strike_price,type:c.details?.contract_type,oi:c.open_interest??0}));

  const midOf=c=>c?.day?.close??0;
  const straddleMid=midOf(atmC)+midOf(atmP);
  const greeksLive=calls.filter(c=>c.greeks?.delta!=null).length>=3;

  // ATM strike for calendar leg reference
  const atmStrike=atmStrikeVal??atmC?.details?.strike_price??spot;

  const debug={atmStrikeUsed:atmStrikeVal,spot:spot,liveSpotUsed:liveSpot,atmCallIV_raw:atmC?.implied_volatility??null,atmPutIV_raw:atmP?.implied_volatility??null,atmCallTicker:atmC?.ticker??null,atmPutTicker:atmP?.ticker??null,atmCallDelta:atmC?.greeks?.delta??null,atmPutDelta:atmP?.greeks?.delta??null,contractsInWindow:plausible.length,allStrikesRaw:allStrikes.slice(0,5),dateFrom,dateTo};
  return {atmIV,iv25C,iv25P,skew25,callOI,putOI,pcRatio,walls,straddleMid,dte,greeksLive,atmStrike,debug};
}

/* ── Term structure analysis ── */
// tsRatio = nearIV / farIV
// > 1.05 → contango (near rich vs far)  → calendar/diagonal favored
// < 0.95 → backwardation (far rich)     → vertical spreads favored
// 0.95–1.05 → flat → slight lean vertical
function termStructureRegime(tsRatio) {
  if (!tsRatio) return { label:'Unknown', regime:'flat', source:'none' };
  if (tsRatio > 1.10) return { label:'Steep contango', regime:'contango', ratio:tsRatio };
  if (tsRatio > 1.05) return { label:'Mild contango',  regime:'contango', ratio:tsRatio };
  if (tsRatio < 0.92) return { label:'Backwardation',  regime:'backwardation', ratio:tsRatio };
  return { label:'Flat', regime:'flat', ratio:tsRatio };
}

/* ── Strategy selection ── */
// Returns { type, label, rationale } per asset
// Types: 'credit_spread' | 'calendar' | 'diagonal' | 'debit_spread'
function selectStrategy(asset, { vrp, tsInfo, skewCond, volReg, changePct, dnt }) {
  const vrpPos = vrp > 0;
  const vrpStrong = vrp > 3;       // IV meaningfully above RV
  const vrpNeg  = vrp < -1;
  const isDirectional = Math.abs(changePct) > 0.5;
  const tsRegime = tsInfo?.regime ?? 'flat';

  // No short premium if VRP negative
  if (vrpNeg || dnt==='HOLD') {
    return {
      type:'debit_spread',
      label:'Debit spread',
      rationale:`Negative VRP (IV < RV) — avoid selling vol. Use debit structure to limit short premium exposure.`
    };
  }

  // Contango: near IV > far IV → calendars and diagonals capture theta differential
  if (tsRegime==='contango' && vrpPos) {
    if (isDirectional) {
      return {
        type:'diagonal',
        label:'Diagonal spread',
        rationale:`Near IV rich vs far IV (ratio ${tsInfo?.ratio?.toFixed(2)}) + directional bias → sell rich near-term strike, buy far-term ATM for vega exposure.`
      };
    }
    return {
      type:'calendar',
      label:'Calendar spread',
      rationale:`Near IV rich vs far IV (ratio ${tsInfo?.ratio?.toFixed(2)}) + range-bound + positive VRP → sell near-term decay, own far-term gamma. Classic calendar setup.`
    };
  }

  // Backwardation or flat: far IV ≥ near IV → vertical spreads capture outright premium
  if (tsRegime==='backwardation' || tsRegime==='flat') {
    if (vrpStrong) {
      return {
        type:'credit_spread',
        label:'Credit spread',
        rationale:`${tsRegime==='backwardation'?'Backwardation (far IV elevated)':'Flat term structure'} + strong positive VRP (${vrp.toFixed(1)}pts) → collect outright premium via vertical spread.`
      };
    }
    return {
      type:'credit_spread',
      label:'Credit spread',
      rationale:`Flat term structure + positive VRP → vertical spread preferred over calendar. Near and far IV not sufficiently differentiated to justify time spread.`
    };
  }

  return { type:'credit_spread', label:'Credit spread', rationale:'Default: flat regime, positive VRP.' };
}

/* ── Math ── */
function ndCDF(x){
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const sg=x<0?-1:1; x=Math.abs(x);
  const t=1/(1+p*x),y=1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);
  return 0.5*(1+sg*y);
}
function pOTM(spot,strike,iv,dte,type='put'){
  if(!iv||!dte) return 0.78;
  const t=dte/365,d2=(Math.log(spot/strike)-0.5*iv*iv*t)/(iv*Math.sqrt(t));
  return type==='put'?ndCDF(d2):(1-ndCDF(d2));
}
function emCalc(spot,iv,dte){ return spot*(iv||0)*Math.sqrt(dte/365); }

/* ── Formatting ── */
const f  =(n,d=2)=>isNaN(n)||n==null?'—':Number(n).toFixed(d);
const f$ =n=>'$'+f(n);
const fp =(n,d=1)=>(!n&&n!==0)||isNaN(n)?'—':(n*100).toFixed(d)+'%';
const sgn=n=>parseFloat(n)>=0?'+':'';
const cc =n=>parseFloat(n)>=0?'up':'dn';

/* ── Build briefing ── */
function buildBriefing({stocks,rvData,indices,chainsNear,chainsFar,tnx10}) {
  const sp=stocks.SPY, gl=stocks.GLD, tl=stocks.TLT;
  // Previous-day closes for change calculation
  const spyPr=sp?.prevClose??sp?.price??0;
  const gldPr=gl?.prevClose??gl?.price??0;
  const tltPr=tl?.prevClose??tl?.price??0;
  const chg=(c,p)=>p?{ch:f(c-p),pct:f((c-p)/p*100)}:{ch:'0.00',pct:'0.00'};

  const CA=chainsNear.SPY, CB=chainsNear.GLD, CC=chainsNear.TLT;
  const FA=chainsFar.SPY,  FB=chainsFar.GLD,  FC=chainsFar.TLT;

  // Live spot: prefer underlying_asset.price from chain (real-time), fall back to bar close.
  const spyP2 = (_chainSpots.SPY > 0 ? _chainSpots.SPY : sp?.price) ?? 0;
  const gldP2 = (_chainSpots.GLD > 0 ? _chainSpots.GLD : gl?.price) ?? 0;
  const tltP2 = (_chainSpots.TLT > 0 ? _chainSpots.TLT : tl?.price) ?? 0;

  const vixFallback=(indices.vix??22)/100;
  const spyIV=CA?.atmIV||vixFallback;
  const gldIV=CB?.atmIV||0.24;
  const tltIV=CC?.atmIV||0.175;

  // Far IV for term structure
  const spyFarIV=FA?.atmIV||null;
  const gldFarIV=FB?.atmIV||null;
  const tltFarIV=FC?.atmIV||null;

  // Term structure ratios (near/far)
  // If chain-based ratio unavailable, fall back to VIX/VIX3M
  const vix3m = indices.vix3m ?? null;
  const vixRatioFallback = (indices.vix && vix3m) ? indices.vix/vix3m : null;

  const mkTsRatio = (nearIV, farIV, fallback) => {
    if (nearIV && farIV && farIV>0) return { ratio:nearIV/farIV, source:'chain' };
    if (fallback) return { ratio:fallback, source:'VIX/VIX3M' };
    return null;
  };

  const spyTsRaw = mkTsRatio(spyIV, spyFarIV, vixRatioFallback);
  const gldTsRaw = mkTsRatio(gldIV, gldFarIV, null);
  const tltTsRaw = mkTsRatio(tltIV, tltFarIV, null);

  const spyTs = spyTsRaw ? { ...termStructureRegime(spyTsRaw.ratio), source:spyTsRaw.source, nearIV:spyIV, farIV:spyFarIV } : null;
  const gldTs = gldTsRaw ? { ...termStructureRegime(gldTsRaw.ratio), source:gldTsRaw.source, nearIV:gldIV, farIV:gldFarIV } : null;
  const tltTs = tltTsRaw ? { ...termStructureRegime(tltTsRaw.ratio), source:tltTsRaw.source, nearIV:tltIV, farIV:tltFarIV } : null;

  // Live RV
  const FBRV={spy:0.185,gld:0.28,tlt:0.14};
  const spyRV=rvData.SPY?.rv??FBRV.spy;
  const gldRV=rvData.GLD?.rv??FBRV.gld;
  const tltRV=rvData.TLT?.rv??FBRV.tlt;
  const rvLive=!!(rvData.SPY?.rv&&rvData.GLD?.rv&&rvData.TLT?.rv);

  const spyVRP=((spyIV-spyRV)*100);
  const gldVRP=((gldIV-gldRV)*100);
  const tltVRP=((tltIV-tltRV)*100);

  const vix  =indices.vix  ??spyIV*100;
  const vvix =indices.vvix ??94;
  const move =indices.move ??85;
  const dxy  =indices.dxy  ??99.6;
  const tnx  =tnx10??indices.tnx??4.34;
  const vixPct =Math.round(Math.max(0,Math.min(100,(vix-13.38)/(60.13-13.38)*100)));
  const vvixPct=Math.round(Math.max(0,Math.min(100,(vvix-60)/(180-60)*100)));

  const skewCond=s=>{if(s==null)return'N/A';return s>0.04?'Elevated':s<-0.01?'Inverted':'Normal';};
  const volR=iv=>iv>0.30?'Expansion':iv>0.18?'Transition':'Compression';
  const moveReg=move>110?'Expansion':move>80?'Transition':'Compression';
  const vixReg =vix>30?'Expansion':vix>18?'Transition':'Compression';
  const regime =vix>30||move>120?'High':vix>20||move>90?'Moderate':'Low';

  const dnt={
    spy:spyVRP<0||vix>28?'HOLD':'PROCEED',
    gld:gldVRP<0?'HOLD':'PROCEED',
    tlt:move>120?'HOLD':'PROCEED',
  };

  // Strategy selection per asset
  const changes={spy:chg(spyP2,spyPr),gld:chg(gldP2,gldPr),tlt:chg(tltP2,tltPr)};
  const spyStrat=selectStrategy('spy',{vrp:spyVRP,tsInfo:spyTs,skewCond:skewCond(CA?.skew25??null),volReg:volR(spyIV),changePct:parseFloat(changes.spy.pct),dnt:dnt.spy});
  const gldStrat=selectStrategy('gld',{vrp:gldVRP,tsInfo:gldTs,skewCond:skewCond(CB?.skew25??null),volReg:volR(gldIV),changePct:parseFloat(changes.gld.pct),dnt:dnt.gld});
  const tltStrat=selectStrategy('tlt',{vrp:tltVRP,tsInfo:tltTs,skewCond:skewCond(CC?.skew25??null),volReg:volR(tltIV),changePct:parseFloat(changes.tlt.pct),dnt:dnt.tlt});

  // Strike finder for vertical legs
  const findStrike=(spot,iv,side)=>{
    if(!spot||!iv) return {k:side==='put'?spot*.973:spot*1.027,p:78};
    let best=null,bestD=1;
    for(let pct=0.5;pct<=25;pct+=0.25){
      const k=side==='put'?spot*(1-pct/100):spot*(1+pct/100);
      const p=pOTM(spot,k,iv,15,side);
      const d=Math.abs(p-0.78);
      if(d<bestD){bestD=d;best={k:parseFloat(f(k,2)),p:parseFloat(f(p*100,0))};}
    }
    return best??{k:side==='put'?parseFloat(f(spot*.973,2)):parseFloat(f(spot*1.027,2)),p:78};
  };

  const spySS=findStrike(spyP2,spyIV,'put');
  const gldSS=findStrike(gldP2,gldIV,'call');
  const tltSS=findStrike(tltP2,tltIV,'call');

  // ── Trade Generation Engine v2 ──
  // Spread widths by asset (dollar-wide)
  const WIDTHS = { SPY:5, GLD:2.5, TLT:2 };

  // BS credit estimator for a vertical spread
  function bsSpreadCredit(spot, shortK, longK, iv, dte, side) {
    // Approximate: difference in BS option prices using simplified model
    const T = dte/365;
    if (!T||!iv) return 0;
    function bsPrice(K, type) {
      const d1=(Math.log(spot/K)+(0.5*iv*iv)*T)/(iv*Math.sqrt(T));
      const d2=d1-iv*Math.sqrt(T);
      if(type==='call') return spot*ndCDF(d1)-K*Math.exp(-0.04*T)*ndCDF(d2);
      return K*Math.exp(-0.04*T)*ndCDF(-d2)-spot*ndCDF(-d1);
    }
    const shortP = bsPrice(shortK, side);
    const longP  = bsPrice(longK,  side);
    return Math.max(0, shortP - longP);
  }

  // Find short strike in target P(OTM) zone
  // Returns {k, potm, aggressive, reason}
  function findShortStrike(spot, iv, dte, side, zoneLo=0.70, zoneHi=0.85) {
    let candidates=[];
    for (let pct=0.25; pct<=35; pct+=0.25) {
      const k = side==='put' ? spot*(1-pct/100) : spot*(1+pct/100);
      const p = pOTM(spot,k,iv,dte,side);
      candidates.push({k:parseFloat(f(k,2)), potm:p});
    }
    // Best in zone
    const inZone = candidates.filter(c=>c.potm>=zoneLo&&c.potm<=zoneHi);
    if (inZone.length) {
      const best = inZone.reduce((a,b)=>Math.abs(a.potm-0.775)<=Math.abs(b.potm-0.775)?a:b);
      return {k:best.k, potm:best.potm*100, aggressive:false, reason:null};
    }
    // Best near zone (65–70% or 85–90%)
    const nearZone = candidates.filter(c=>c.potm>=0.65&&c.potm<zoneLo);
    if (nearZone.length) {
      const best = nearZone.reduce((a,b)=>b.potm>=a.potm?b:a);
      return {k:best.k, potm:best.potm*100, aggressive:true,
        reason:`Short strike P(OTM) ${(best.potm*100).toFixed(0)}% is below the 70% target zone — IV structure does not support a tighter strike at ≥70% P(OTM) for this expiration.`};
    }
    return null; // exclude — below 65%
  }

  // Risk-Adjusted Modifier → contract count
  function contractCount(vrp, regimeStr, dntSig) {
    if (dntSig==='HOLD') return 0;
    let base = regimeStr==='High'?1 : regimeStr==='Low'?4 : 3;
    if (vrp < 0) base = Math.max(1, base-1);
    if (vrp > 8) base = Math.min(6, base+1);
    return base;
  }

  // Skew alignment check — spread direction should favor the rich side
  // Returns true if direction aligns with skew
  function skewAligned(side, skCond) {
    if (skCond==='Elevated') return side==='put'; // put skew rich → sell puts
    if (skCond==='Inverted') return side==='call'; // call skew rich → sell calls
    return true; // neutral skew — either side ok
  }

  // Generate trades for one asset × one DTE
  function genTrades(label, spot, iv, farIV, rv, dntSig, tsInfo, biasObj, skCond, dte) {
    if (!spot||!iv) return [];
    const a = label.toLowerCase();
    const vrpPts = a==='spy'?spyVRP : a==='gld'?gldVRP : tltVRP;
    const vrp = parseFloat(vrpPts);
    const width = WIDTHS[label];
    const tsReg = tsInfo?.regime ?? 'flat';
    const tsRatio = tsInfo?.ratio ?? 1;
    const bullish = biasObj.bull > biasObj.bear;
    const directional = Math.abs(biasObj.bull - biasObj.bear) > 20;
    const contracts = contractCount(vrp, regime, dntSig);
    const atmChain = a==='spy'?CA : a==='gld'?CB : CC;
    const atmK = atmChain?.atmStrike ?? spot;
    const em = emCalc(spot, iv, dte);
    const results = [];

    // ── HOLD: always propose one debit trade with justification ──
    if (dntSig==='HOLD') {
      const side = bullish ? 'call' : 'put';
      const longK = parseFloat(f(atmK,2));
      const shortK = side==='call' ? parseFloat(f(longK+width*2,2)) : parseFloat(f(longK-width*2,2));
      const potm = pOTM(spot,shortK,iv,dte,side)*100;
      if (potm<50) return []; // truly untradeable
      const aggressive = potm<70||potm>85;
      const debitEst = Math.max(0.10, bsSpreadCredit(spot,longK,shortK,iv,dte,side));
      results.push({
        type:'debit', label, dte, dntSig, contracts:Math.max(1,contracts),
        strat: side==='call'?'Bull call debit spread':'Bear put debit spread',
        structure: `${width*2}-wide debit — HOLD flag, long premium only`,
        expiry: `${dte} DTE (single expiration)`,
        legs: [`Buy  ${f$(longK)} ${side}`, `Sell ${f$(shortK)} ${side}`],
        potm: potm.toFixed(0)+'%', aggressive,
        premTarget: `$${f(debitEst,2)} db (estimated)`,
        credit: false,
        rationale: `${label} flagged HOLD — short premium prohibited. ${side==='call'?'Bullish':'Bearish'} debit proposed: directional bias (${biasObj.bull}%/${biasObj.bear}%) justifies limited long premium. VRP ${vrp.toFixed(1)}pts.${aggressive?' ⚠ Aggressive: P(OTM) outside 70–85% zone.':''}`,
        regimeNote: `Regime: ${regime} vol. VRP ${vrp>=0?'+':''}${vrp.toFixed(1)}pts. Skew: ${skCond}.`,
        risk: 'Full debit lost if expires OTM. Time decay headwind. Max risk = debit paid.',
        score: Math.max(1, Math.abs(vrp)) * (potm/100) * 5,
      });
      return results;
    }

    // ── PROCEED assets: generate all applicable structures ──

    // 1. Calendar — when farIV available and range-bound or positive VRP
    if (farIV && (tsReg==='contango' || (!directional && vrp>0))) {
      const farDTE = dte+30;
      const netDebit = Math.max(0.3, Math.abs(iv-farIV)*spot*0.04 + 0.3);
      const strikeWidth = width*4;
      const maxDebit = strikeWidth*0.40;
      const debitOk = netDebit <= maxDebit;
      results.push({
        type:'calendar', label, dte, farDTE, dntSig, contracts,
        strat:'Calendar spread',
        structure:`ATM calendar — sell ${dte}D / buy ${farDTE}D`,
        expiry:`${dte} DTE (near) / ${farDTE} DTE (far)`,
        legs:[`Sell ${f$(atmK)} (${dte} DTE)`, `Buy  ${f$(atmK)} (${farDTE} DTE)`],
        potm:'≥70% (near expires worthless)',
        premTarget:`~$${f(netDebit,2)} db (${debitOk?'≤':'⚠ >'} 40% of $${strikeWidth} width)`,
        aggressive: !debitOk,
        credit:false,
        tsRatio: tsRatio.toFixed(3),
        rationale:`${tsReg==='contango'?'Contango (ratio '+tsRatio.toFixed(2)+')':'+VRP and range-bound bias'} supports ATM calendar. Near IV ${fp(iv)} vs far IV ${fp(farIV)}. Net debit ~$${f(netDebit,2)} ${debitOk?'within':'may exceed'} 40% of $${strikeWidth} width.${!debitOk?' ⚠ Aggressive.':''}`,
        regimeNote:`Regime: ${regime} vol. TS: ${tsReg} (${tsRatio.toFixed(2)}). Skew: ${skCond}.`,
        risk:'Sharp move compresses spread. Assignment risk on near short.',
        score: Math.max(1,vrp) * (tsReg==='contango'?tsRatio:1) * (directional?7:11),
      });
    }

    // 2. Diagonal — directional bias with farIV
    if (farIV && directional) {
      const side = bullish ? 'put' : 'call';
      const ss = findShortStrike(spot, iv, dte, side);
      if (ss) {
        const longK = parseFloat(f(atmK,2));
        const strikeWidth = Math.max(width*2, Math.abs(longK-ss.k));
        const netDebit = Math.max(0.3, bsSpreadCredit(spot,longK,ss.k,iv,dte+30,side));
        const maxDebit = strikeWidth*0.40;
        results.push({
          type:'diagonal', label, dte, farDTE:dte+30, dntSig, contracts,
          strat:'Diagonal spread',
          structure:`OTM ${side} near / ATM ${side} far`,
          expiry:`${dte} DTE (near) / ${dte+30} DTE (far)`,
          legs:[`Sell ${f$(ss.k)} ${side} (${dte} DTE)`, `Buy  ${f$(longK)} ${side} (${dte+30} DTE)`],
          potm: ss.potm.toFixed(0)+'%',
          premTarget:`~$${f(Math.min(netDebit,maxDebit),2)} db (≤ 40% of $${f(strikeWidth,2)} width)`,
          aggressive: ss.aggressive,
          credit:false,
          tsRatio: tsRatio.toFixed(3),
          rationale:`${bullish?'Bullish':'Bearish'} bias (${biasObj.bull}/${biasObj.bear}) → diagonal sells near OTM ${side}, owns far vega. Strike ${f$(ss.k)} at ${ss.potm.toFixed(0)}% P(OTM).${ss.aggressive?' ⚠ '+ss.reason:''}`,
          regimeNote:`Regime: ${regime} vol. VRP ${vrp>=0?'+':''}${vrp.toFixed(1)}pts.`,
          risk:'Adverse move through near short. Near IV collapse faster than far.',
          score: Math.max(1,vrp) * (ss.aggressive?6:9),
        });
      }
    }

    // 3. Iron condor — neutral bias (any positive VRP)
    if (!directional && vrp>0) {
      const callSS = findShortStrike(spot, iv, dte, 'call', 0.70, 0.85);
      const putSS  = findShortStrike(spot, iv, dte, 'put',  0.70, 0.85);
      if (callSS && putSS) {
        const callLong = parseFloat(f(callSS.k+width,2));
        const putLong  = parseFloat(f(putSS.k-width,2));
        const callCr = bsSpreadCredit(spot,callSS.k,callLong,iv,dte,'call');
        const putCr  = bsSpreadCredit(spot,putSS.k,putLong,iv,dte,'put');
        const total  = callCr+putCr;
        const tLo=width*0.25, tHi=width*0.33;
        results.push({
          type:'condor', label, dte, dntSig, contracts,
          strat:'Iron condor',
          structure:`${width}-wide wings both sides (single expiration)`,
          expiry:`${dte} DTE (single expiration)`,
          legs:[
            `Sell ${f$(putSS.k)} put / Buy ${f$(putLong)} put`,
            `Sell ${f$(callSS.k)} call / Buy ${f$(callLong)} call`,
          ],
          potm:`Put ${putSS.potm.toFixed(0)}% / Call ${callSS.potm.toFixed(0)}%`,
          premTarget:`$${f(total,2)} total cr · target $${f(tLo,2)}–$${f(tHi,2)} per wing`,
          aggressive: callSS.aggressive||putSS.aggressive,
          credit:true,
          rationale:`VRP +${vrp.toFixed(1)}pts + neutral bias → iron condor collects both sides. Put ${putSS.potm.toFixed(0)}% / Call ${callSS.potm.toFixed(0)}% P(OTM). EM ±$${f(em,0)} at ${dte}D.`,
          regimeNote:`Regime: ${regime} vol. EM ±$${f(em,0)} at ${dte}D.`,
          risk:'Directional break through either short strike. Max loss = width − credit.',
          score: vrp * Math.min(callSS.potm,putSS.potm)/100 * 13,
        });
      }
    }

    // 4. BWB — elevated skew + any directional lean
    if (skCond==='Elevated' && Math.abs(biasObj.bull-biasObj.bear)>15) {
      const side = bullish ? 'put' : 'call';
      const body = findShortStrike(spot, iv, dte, side, 0.68, 0.84);
      if (body) {
        const nearK = side==='put' ? parseFloat(f(body.k+width,2)) : parseFloat(f(body.k-width,2));
        const skipK = side==='put' ? parseFloat(f(body.k-width*2,2)): parseFloat(f(body.k+width*2,2));
        const cr = Math.max(0, bsSpreadCredit(spot,nearK,body.k,iv,dte,side)*2
                           - bsSpreadCredit(spot,body.k,skipK,iv,dte,side));
        const tLo=width*0.25, tHi=width*0.33;
        results.push({
          type:'bwb', label, dte, dntSig, contracts,
          strat:'Broken-wing butterfly',
          structure:`${side.toUpperCase()} BWB ×1/×2/×1 skip ${bullish?'downside':'upside'} wing (single expiration)`,
          expiry:`${dte} DTE (single expiration)`,
          legs:[
            `Buy  ${f$(nearK)} ${side} ×1`,
            `Sell ${f$(body.k)} ${side} ×2`,
            `Buy  ${f$(skipK)} ${side} ×1 (skip wing)`,
          ],
          potm: body.potm.toFixed(0)+'%',
          premTarget:`$${f(cr,2)} cr (target $${f(tLo,2)}–$${f(tHi,2)} per unit)`,
          aggressive: body.aggressive,
          credit:true,
          rationale:`Elevated ${side} skew (${skCond}) + ${bullish?'bullish':'bearish'} bias (${biasObj.bull}/${biasObj.bear}) → BWB nets credit while expressing direction. Body ${f$(body.k)} at ${body.potm.toFixed(0)}% P(OTM). Skip wing on ${bullish?'downside':'upside'}.${body.aggressive?' ⚠ '+body.reason:''}`,
          regimeNote:`Regime: ${regime} vol. Skew ${skCond}.`,
          risk:`Move through body doubles short. ${bullish?'Downside':'Upside'} uncapped beyond skip wing.`,
          score: Math.max(1,vrp) * body.potm/100 * 12,
        });
      }
    }

    // 5. Credit spread — generated for ALL PROCEED assets regardless of other conditions
    //    This is the baseline guaranteed trade for every PROCEED asset × DTE
    {
      const creditSide = bullish ? 'put' : 'call';
      const ss = findShortStrike(spot, iv, dte, creditSide);
      if (ss) {
        const shortK = ss.k;
        const longK  = creditSide==='put' ? parseFloat(f(shortK-width,2)) : parseFloat(f(shortK+width,2));
        const cr = bsSpreadCredit(spot,shortK,longK,iv,dte,creditSide);
        const tLo=width*0.25, tHi=width*0.33;
        const premOk = cr>=tLo;
        const outsideEM = creditSide==='put' ? shortK<spot-em : shortK>spot+em;
        const aligned = skewAligned(creditSide, skCond);
        const aggr = ss.aggressive || !outsideEM;
        results.push({
          type:'credit', label, dte, dntSig, contracts: Math.max(1,contracts),
          strat: creditSide==='put'?'Bull put spread':'Bear call spread',
          structure:`${width}-wide ${creditSide==='put'?'bull put':'bear call'} (single expiration)`,
          expiry:`${dte} DTE (single expiration)`,
          legs:[`Sell ${f$(shortK)} ${creditSide}`, `Buy  ${f$(longK)} ${creditSide}`],
          potm: ss.potm.toFixed(0)+'%',
          premTarget:`$${f(cr,2)} cr · target $${f(tLo,2)}–$${f(tHi,2)} (${premOk?'✓ within range':'⚠ below 25% floor'})`,
          aggressive: aggr,
          credit:true,
          rationale:`${vrp>=0?'VRP +'+vrp.toFixed(1)+'pts — premium elevated vs RV.':'IV near RV — modest premium.'} ${bullish?'Bullish':'Bearish'} bias → ${creditSide} spread. Strike ${f$(shortK)} at ${ss.potm.toFixed(0)}% P(OTM), ${outsideEM?'outside':'inside'} ${dte}D EM (±$${f(em,0)}). ${aligned?'Skew '+skCond+' aligns.':'Neutral skew.'} Credit $${f(cr,2)} vs $${f(tLo,2)}–$${f(tHi,2)} target.${ss.aggressive?' ⚠ '+ss.reason:''}${!outsideEM?' ⚠ Aggressive: strike inside EM.':''}`,
          regimeNote:`Regime: ${regime} vol. EM ±$${f(em,0)} at ${dte}D. Skew: ${skCond}.`,
          risk:`Gap ${creditSide==='put'?'below':'above'} ${f$(shortK)}. Max loss $${f(width-Math.max(0,cr),2)} per spread.`,
          score: Math.max(0.5,vrp) * ss.potm/100 * (aligned?10:8) * (outsideEM?1:0.7),
        });
      }
    }

    return results;
  }

  // Bias must be declared before genTrades calls (it's also stored in return object)
  const bias = {
    spy:{bull:vix<22?65:55, bear:vix<22?35:45, conf:vix>28?'Low':'Medium'},
    gld:{bull:80, bear:20, conf:'Medium'},
    tlt:{bull:20, bear:80, conf:'Med-High'},
  };

  // Generate for all assets × both DTE windows
  const allCandidates = [
    ...genTrades('SPY',spyP2,spyIV,spyFarIV,spyRV,dnt.spy,spyTs,bias.spy,skewCond(CA?.skew25??null),15),
    ...genTrades('GLD',gldP2,gldIV,gldFarIV,gldRV,dnt.gld,gldTs,bias.gld,skewCond(CB?.skew25??null),15),
    ...genTrades('TLT',tltP2,tltIV,tltFarIV,tltRV,dnt.tlt,tltTs,bias.tlt,skewCond(CC?.skew25??null),15),
    ...genTrades('SPY',spyP2,spyIV,spyFarIV,spyRV,dnt.spy,spyTs,bias.spy,skewCond(CA?.skew25??null),30),
    ...genTrades('GLD',gldP2,gldIV,gldFarIV,gldRV,dnt.gld,gldTs,bias.gld,skewCond(CB?.skew25??null),30),
    ...genTrades('TLT',tltP2,tltIV,tltFarIV,tltRV,dnt.tlt,tltTs,bias.tlt,skewCond(CC?.skew25??null),30),
  ].filter(t=>t && t.contracts>0 && t.potm && t.legs?.length);

  // Sort by score desc, take top 5
  // Guarantee exactly 5 by including all if fewer than 5 qualify
  const trades = allCandidates
    .sort((a,b)=>b.score-a.score)
    .slice(0, Math.min(5, allCandidates.length));

  return {
    ts:new Date().toISOString(),
    greeksLive:isMarketHours(), rvLive,
    _debugChains:{ SPY:chainsNear.SPY?.debug, GLD:chainsNear.GLD?.debug, TLT:chainsNear.TLT?.debug },
    prices:{spy:spyP2,gld:gldP2,tlt:tltP2}, changes,
    vix:{val:vix,pct:vixPct,reg:vixReg,prev:indices.vix1},
    vvix:{val:vvix,pct:vvixPct},
    move:{val:move,reg:moveReg,prev:indices.move1},
    dxy:{val:dxy}, tnx:{val:tnx},
    iv:{spy:spyIV,gld:gldIV,tlt:tltIV},
    farIV:{spy:spyFarIV,gld:gldFarIV,tlt:tltFarIV},
    rv:{spy:{val:spyRV,data:rvData.SPY},gld:{val:gldRV,data:rvData.GLD},tlt:{val:tltRV,data:rvData.TLT}},
    vrp:{spy:spyVRP.toFixed(1),gld:gldVRP.toFixed(1),tlt:tltVRP.toFixed(1)},
    ts_struct:{spy:spyTs,gld:gldTs,tlt:tltTs},
    skew:{spy:CA?.skew25??null,gld:CB?.skew25??null,tlt:CC?.skew25??null},
    skewCond:{spy:skewCond(CA?.skew25??null),gld:skewCond(CB?.skew25??null),tlt:skewCond(CC?.skew25??null)},
    iv25:{spy:{c:CA?.iv25C,p:CA?.iv25P},gld:{c:CB?.iv25C,p:CB?.iv25P},tlt:{c:CC?.iv25C,p:CC?.iv25P}},
    oi:{spy:{pc:CA?.pcRatio??'—',walls:CA?.walls??[]},gld:{pc:CB?.pcRatio??'—',walls:CB?.walls??[]},tlt:{pc:CC?.pcRatio??'—',walls:CC?.walls??[]}},
    straddle:{spy:f(CA?.straddleMid??0),gld:f(CB?.straddleMid??0),tlt:f(CC?.straddleMid??0)},
    volReg:{spy:volR(spyIV),gld:volR(gldIV),tlt:volR(tltIV)},
    em:{
      spy:{d7:emCalc(spyP2,spyIV,7),d15:emCalc(spyP2,spyIV,15),d30:emCalc(spyP2,spyIV,30)},
      gld:{d7:emCalc(gldP2,gldIV,7),d15:emCalc(gldP2,gldIV,15),d30:emCalc(gldP2,gldIV,30)},
      tlt:{d7:emCalc(tltP2,tltIV,7),d15:emCalc(tltP2,tltIV,15),d30:emCalc(tltP2,tltIV,30)},
    },
    dnt, regime, trades,
    stratSel:{spy:spyStrat,gld:gldStrat,tlt:tltStrat},
    mod:{spy:vix>28?'Reduce':vix<18?'Increase':'Maintain',gld:gldVRP<0?'Reduce':'Maintain',tlt:move>110?'Reduce':'Maintain'},
    bias,
  };
}

function renderNarrative(sid) {
  if (S.narrativeLoading && !S.narratives[sid]) {
    return '<div class="state-screen"><div class="spin"></div><div class="state-title">Generating briefing\u2026</div><div class="state-sub">Claude is analyzing live market data across all four sections</div></div>';
  }
  const text = S.narratives[sid];
  if (!text) return '<div class="state-screen"><div class="state-title">No briefing yet</div><div class="state-sub">Tap Run to generate the AI briefing.</div></div>';

  function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function mdToHtml(md) {
    const lines = md.split('\n');
    const out = [];
    let inTable = false, tableRows = [], inList = false, listItems = [];

    function flushTable() {
      if (!tableRows.length) return;
      out.push('<div class="nar-table-wrap"><table class="nar-table">');
      tableRows.forEach((row, ri) => {
        const cells = row.split('|').map(c => c.trim()).filter(Boolean);
        if (ri === 1 && cells.every(c => /^-+$/.test(c))) return; // skip separator
        out.push('<tr>' + cells.map(c => '<td class="nar-td">' + inline(c) + '</td>').join('') + '</tr>');
      });
      out.push('</table></div>');
      tableRows = []; inTable = false;
    }
    function flushList() {
      if (!listItems.length) return;
      out.push('<ul class="nar-ul">' + listItems.map(i => '<li>' + i + '</li>').join('') + '</ul>');
      listItems = []; inList = false;
    }
    function inline(s) {
      return escHtml(s)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`(.+?)`/g, '<code>$1</code>');
    }

    lines.forEach(line => {
      if (line.startsWith('## ')) {
        flushTable(); flushList();
        out.push('<h2 class="nar-h2">' + inline(line.slice(3)) + '</h2>');
      } else if (line.startsWith('### ')) {
        flushTable(); flushList();
        out.push('<h3 class="nar-h3">' + inline(line.slice(4)) + '</h3>');
      } else if (line.startsWith('|')) {
        flushList(); inTable = true; tableRows.push(line);
      } else if (line.startsWith('- ') || line.startsWith('* ')) {
        flushTable(); inList = true; listItems.push(inline(line.slice(2)));
      } else if (line.trim() === '') {
        flushTable(); flushList();
      } else {
        flushTable(); flushList();
        if (line.trim()) out.push('<p class="nar-p">' + inline(line) + '</p>');
      }
    });
    flushTable(); flushList();
    return out.join('\n');
  }

  return '<div class="content nar-content">' + mdToHtml(text) + '</div>';
}

    if(tltSpot>0) stocks.TLT.price=tltSpot;

    // Options chains — near (10–23 DTE) AND far (35–55 DTE)
    const [spyNear,gldNear,tltNear,spyFar,gldFar,tltFar]=await Promise.all([
      optionChain('SPY',10,23).catch(e=>{S.warns.push('SPY near: '+e.message);return[];}),
      optionChain('GLD',10,23).catch(e=>{S.warns.push('GLD near: '+e.message);return[];}),
      optionChain('TLT',10,23).catch(e=>{S.warns.push('TLT near: '+e.message);return[];}),
      optionChain('SPY',35,55).catch(e=>{S.warns.push('SPY far: '+e.message);return[];}),
      optionChain('GLD',35,55).catch(e=>{S.warns.push('GLD far: '+e.message);return[];}),
      optionChain('TLT',35,55).catch(e=>{S.warns.push('TLT far: '+e.message);return[];}),
    ]);
    const chainsNear={
      SPY:analyseChain(spyNear,stocks.SPY.price,spyNear._dateFrom,spyNear._dateTo,_chainSpots.SPY),
      GLD:analyseChain(gldNear,stocks.GLD.price,gldNear._dateFrom,gldNear._dateTo,_chainSpots.GLD),
      TLT:analyseChain(tltNear,stocks.TLT.price,tltNear._dateFrom,tltNear._dateTo,_chainSpots.TLT),
    };
    const chainsFar={
      SPY:analyseChain(spyFar,stocks.SPY.price,spyFar._dateFrom,spyFar._dateTo,_chainSpots.SPY),
      GLD:analyseChain(gldFar,stocks.GLD.price,gldFar._dateFrom,gldFar._dateTo,_chainSpots.GLD),
      TLT:analyseChain(tltFar,stocks.TLT.price,tltFar._dateFrom,tltFar._dateTo,_chainSpots.TLT),
    };

    if(!isMarketHours()) S.warns.push('Outside market hours — 25Δ greeks estimated via BS strike approximation (live greeks: 9:30–4:00 PM ET)');

    clearTimeout(_safetyTimer);
    S.briefs[sid]=buildBriefing({stocks,rvData,indices,chainsNear,chainsFar,tnx10});
    S.sid=sid; S.tab='overview';
    generateNarrative(sid, S.briefs[sid]);
  } catch(e) { S.errs.push((e.message||String(e)) + (e.stack?' | '+e.stack.split('\n')[1]:''));  }
  finally { S.loading=false; render(); }
}

/* ── Main render ── */
function render() {
  const root=document.getElementById('root');
  const et=toET(S.now);
  const timeStr=et.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true})+' ET';
  const dateStr=et.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  const b=S.sid?S.briefs[S.sid]:null;

  let bodyHTML='';
  if (S.loading) {
    bodyHTML=`<div class="state-screen">
      <div class="spin"></div>
      <div class="state-title">Fetching…</div>
      <div class="state-sub">Near + far option chains · 20D RV · VIX/VIX3M term structure · MOVE · DXY</div>
    </div>`;
  } else if (b) {
    const c=S.tab==='narrative'?renderNarrative(S.sid):S.tab==='overview'?renderOverview(b):S.tab==='signals'?renderSignals(b):renderTrades(b);
    bodyHTML=`<div class="content">${c}
      <div class="footer-ts">
        ${new Date(b.ts).toLocaleString('en-US',{timeZone:'America/New_York',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:true})} ET
        &nbsp;·&nbsp; RV: 20D c-t-c${b.rvLive?' (live)':' (fallback)'}
        &nbsp;·&nbsp; TS: ${b.ts_struct.spy?.source==='chain'?'chain-based':'VIX/VIX3M'} ratio
        &nbsp;·&nbsp; IV: Options Starter
      </div>
    </div>`;
  } else {
    bodyHTML=`<div class="state-screen">
      <div class="state-title">No briefing yet</div>
      <div class="state-sub">Tap Run to fetch live data including near + far option chains for term structure analysis.<br><br>Auto-runs at 8 AM, 1 PM, and 5 PM ET.</div>
    </div>`;
  }

  const tabs=(b||S.narrativeLoading||S.narratives[S.sid])?`<div class="tabs">
    <button class="tab ${S.tab==='narrative'?'on':''}" onclick="setTab('narrative')">Briefing</button>
    <button class="tab ${S.tab==='overview'?'on':''}" onclick="setTab('overview')">Overview</button>
    <button class="tab ${S.tab==='signals'?'on':''}" onclick="setTab('signals')">Signals &amp; OI</button>
    <button class="tab ${S.tab==='trades'?'on':''}" onclick="setTab('trades')">Trades</button>
  </div>`:'';

  root.innerHTML=`
  <div class="topbar">
    <div class="topbar-row1"><h1>Options Desk</h1><div class="topbar-time">${dateStr} · ${timeStr}</div></div>
    <div class="run-btns">
      ${SESSIONS.map(s=>`<button class="btn ${sessStatus(s,S.now)==='on'?'btn-active':''}" ${S.loading?'disabled':''} onclick="run('${s.id}')">Run ${s.short}</button>`).join('')}
    </div>
  </div>
  <div style="height:8px"></div>
  <div class="sbar">
    ${SESSIONS.map(s=>{const st=sessStatus(s,S.now),has=!!S.briefs[s.id];return`<span class="pill ${st} ${has?'ptr':''}" onclick="${has?`setSession('${s.id}')`:''}">${s.label}${has?' ✓':''}</span>`;}).join('')}
    <span class="cd">${countdown(S.now)}</span>
  </div>
  <div style="height:6px"></div>
  ${tabs}
  ${S.errs.length?`<div class="content"><div class="alert alert-err">⚠ ${S.errs.join(' · ')}</div></div>`:''}
  ${S.warns.length?`<div class="content"><div class="alert alert-warn">${S.warns.join('<br>')}</div></div>`:''}
  ${bodyHTML}`;
}

function setTab(t){S.tab=t;render();}
function setSession(sid){S.sid=sid;S.tab='overview';render();}
function run(sid){runBriefing(sid);}

const timers={};
function scheduleAutos(){
  SESSIONS.forEach(s=>{
    clearTimeout(timers[s.id]);
    const tick=()=>{
      const et=toET(new Date()),[h,m]=s.hhmm.split(':').map(Number);
      const tgt=new Date(et);tgt.setHours(h,m,0,0);
      let ms=tgt-et;if(ms<0)ms+=864e5;
      timers[s.id]=setTimeout(()=>{run(s.id);tick();},ms);
    };
    tick();
  });
}

setInterval(()=>{S.now=new Date();render();},1000);
scheduleAutos();
render();
</script>
