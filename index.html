<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Options Desk">
<title>Options Desk</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 16px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
  font-size: 14px; color: #1a1a1a; background: #f2f2f0;
  padding-bottom: env(safe-area-inset-bottom);
}
.app { max-width: 680px; margin: 0 auto; padding: 0 0 2rem; }

.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(242,242,240,0.93);
  -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
  padding: 12px 16px 10px; border-bottom: 0.5px solid #d8d8d6;
}
.topbar-row1 { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.topbar h1 { font-size: 15px; font-weight: 600; letter-spacing: -.2px; }
.topbar-time { font-size: 11px; color: #888; }
.run-btns { display: flex; gap: 6px; }

.btn {
  font-size: 12px; font-weight: 500; padding: 6px 12px;
  border: 0.5px solid #c8c8c6; border-radius: 8px;
  background: #fff; color: #1a1a1a; cursor: pointer;
  white-space: nowrap; -webkit-user-select: none; user-select: none;
}
.btn:active { opacity: .6; }
.btn:disabled { opacity: .35; pointer-events: none; }
.btn-active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

.sbar { display: flex; gap: 6px; align-items: center; overflow-x: auto; padding: 0 16px 2px; scrollbar-width: none; }
.sbar::-webkit-scrollbar { display: none; }
.pill { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; border: 0.5px solid #d0d0ce; color: #888; background: #e8e8e6; white-space: nowrap; flex-shrink: 0; }
.pill.on  { background: #fff; border-color: #888; color: #1a1a1a; }
.pill.nxt { background: #eff6ff; border-color: #93c5fd; color: #1d4ed8; }
.pill.ptr { cursor: pointer; }
.cd { font-size: 10px; color: #aaa; margin-left: auto; flex-shrink: 0; font-variant-numeric: tabular-nums; }

.tabs { display: flex; overflow-x: auto; padding: 0 16px; border-bottom: 0.5px solid #d8d8d6; background: #f2f2f0; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
.tabs::-webkit-scrollbar { display: none; }
.tab { font-size: 13px; font-weight: 500; padding: 10px 16px; border: none; background: transparent; color: #999; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -0.5px; white-space: nowrap; flex-shrink: 0; }
.tab.on { color: #1a1a1a; border-bottom-color: #1a1a1a; }

.content { padding: 14px 16px 0; }

.alert { border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.55; margin-bottom: 12px; }
.alert-err  { background: #fee2e2; color: #b91c1c; border: 0.5px solid #fca5a5; }
.alert-warn { background: #fef3c7; color: #92400e; border: 0.5px solid #fde68a; }
.alert-info { background: #eff6ff; color: #1e40af; border: 0.5px solid #bfdbfe; }

.sh { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: #999; margin: 18px 0 8px; padding-bottom: 5px; border-bottom: 0.5px solid #d8d8d6; }
.sh:first-child { margin-top: 4px; }

.price-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.price-card { background: #fff; border-radius: 12px; padding: 12px 12px 10px; border: 0.5px solid #e0e0de; }
.pc-ticker { font-size: 11px; font-weight: 600; color: #888; letter-spacing: .04em; margin-bottom: 3px; }
.pc-price  { font-size: 19px; font-weight: 600; letter-spacing: -.5px; line-height: 1; margin-bottom: 4px; }
.pc-chg    { font-size: 11px; font-weight: 500; }
.pc-iv     { font-size: 10px; color: #aaa; margin-top: 3px; }
.up { color: #16a34a; } .dn { color: #dc2626; } .mu { color: #888; }

.metric-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.metric-card { background: #fff; border-radius: 10px; padding: 10px 10px 8px; border: 0.5px solid #e0e0de; min-width: 0; }
.mc-l { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: #aaa; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mc-v { font-size: 16px; font-weight: 600; line-height: 1.1; }
.mc-s { font-size: 10px; color: #999; margin-top: 2px; }

/* Term structure card */
.ts-card { background: #fff; border-radius: 12px; border: 0.5px solid #e0e0de; overflow: hidden; margin-bottom: 8px; }
.ts-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px 8px; border-bottom: 0.5px solid #f0f0ee; }
.ts-ticker { font-size: 13px; font-weight: 600; }
.ts-body   { padding: 10px 14px; }
.ts-row    { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.ts-row:last-child { margin-bottom: 0; }
.ts-label  { font-size: 11px; color: #888; }
.ts-val    { font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums; }
/* Term structure slope bar */
.ts-slope-wrap { margin-top: 10px; padding-top: 10px; border-top: 0.5px solid #f0f0ee; }
.ts-slope-labels { display: flex; justify-content: space-between; font-size: 10px; color: #aaa; margin-bottom: 5px; }
.ts-slope-track { position: relative; height: 8px; background: #f0f0ee; border-radius: 4px; overflow: hidden; }
.ts-slope-near  { position: absolute; left: 0; top: 0; height: 100%; background: #dc2626; border-radius: 4px 0 0 4px; opacity: .8; }
.ts-slope-far   { position: absolute; left: 0; top: 0; height: 100%; background: #1d4ed8; border-radius: 4px 0 0 4px; opacity: .6; }

/* RV card */
.rv-card { background: #fff; border-radius: 12px; border: 0.5px solid #e0e0de; overflow: hidden; margin-bottom: 8px; }
.rv-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px 8px; border-bottom: 0.5px solid #f0f0ee; }
.rv-ticker { font-size: 13px; font-weight: 600; }
.rv-body   { padding: 10px 14px; }
.rv-row    { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.rv-row:last-child { margin-bottom: 0; }
.rv-label  { font-size: 11px; color: #888; }
.rv-val    { font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums; }
.vrp-bar-wrap { margin-top: 10px; padding-top: 10px; border-top: 0.5px solid #f0f0ee; }
.vrp-bar-label { display: flex; justify-content: space-between; font-size: 10px; color: #aaa; margin-bottom: 4px; }
.sparkline { display: flex; align-items: flex-end; gap: 2px; height: 28px; margin-top: 8px; }
.spark-bar { flex: 1; border-radius: 2px; min-height: 2px; }

.exec-card { background: #fff; border-radius: 12px; border: 0.5px solid #e0e0de; padding: 12px 14px; margin-bottom: 8px; }
.exec-top  { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.exec-ticker { font-size: 15px; font-weight: 600; }
.exec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; }
.exec-label { font-size: 10px; color: #aaa; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 1px; }
.exec-val   { font-size: 12px; font-weight: 500; }

.badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; display: inline-block; white-space: nowrap; }
.bg { background: #dcfce7; color: #15803d; }
.br { background: #fee2e2; color: #b91c1c; }
.ba { background: #fef3c7; color: #b45309; }
.bb { background: #dbeafe; color: #1d4ed8; }
.bp { background: #f3e8ff; color: #7c3aed; }
.bx { background: #f0f0ee; color: #666; }

.list-card { background: #fff; border-radius: 12px; border: 0.5px solid #e0e0de; overflow: hidden; }
.list-row { display: flex; align-items: center; padding: 10px 14px; border-bottom: 0.5px solid #f0f0ee; gap: 8px; }
.list-row:last-child { border-bottom: none; }
.list-label { font-size: 12px; color: #666; flex: 1; min-width: 0; }
.list-val   { font-size: 12px; font-weight: 500; text-align: right; font-variant-numeric: tabular-nums; flex-shrink: 0; }
.list-badge { flex-shrink: 0; }

.trade-card { background: #fff; border-radius: 12px; border: 0.5px solid #e0e0de; padding: 12px 14px; margin-bottom: 8px; }
.trade-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 8px; }
.trade-title { font-size: 13px; font-weight: 600; line-height: 1.3; }
.trade-type-pill { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 6px; flex-shrink: 0; }
.trade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px 12px; margin-bottom: 10px; }
.tg-l { font-size: 10px; color: #aaa; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 1px; }
.tg-v { font-size: 12px; font-weight: 500; font-variant-numeric: tabular-nums; }
.trade-thesis { font-size: 11px; color: #444; line-height: 1.55; padding-top: 9px; border-top: 0.5px solid #f0f0ee; }
.trade-risk   { font-size: 11px; color: #dc2626; margin-top: 4px; line-height: 1.45; }

.skew-visual { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.skew-track  { flex: 1; height: 4px; background: #e8e8e6; border-radius: 2px; position: relative; overflow: hidden; }
.skew-fill   { height: 100%; border-radius: 2px; position: absolute; top: 0; left: 0; }
.skew-pts    { font-size: 10px; color: #aaa; flex-shrink: 0; font-variant-numeric: tabular-nums; min-width: 48px; text-align: right; }

.wall-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.wall-chip  { font-size: 11px; font-weight: 500; padding: 5px 10px; border-radius: 8px; border: 0.5px solid #e0e0de; background: #f8f8f6; display: flex; align-items: center; gap: 5px; }
.wc-type    { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 4px; }
.wc-call .wc-type { background: #dbeafe; color: #1d4ed8; }
.wc-put  .wc-type { background: #fee2e2; color: #b91c1c; }

.state-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 55vh; gap: 14px; text-align: center; padding: 24px; }
.spin { width: 24px; height: 24px; border: 2px solid #e0e0de; border-top-color: #1a1a1a; border-radius: 50%; animation: sp .8s linear infinite; }
@keyframes sp { to { transform: rotate(360deg); } }
.state-title { font-size: 15px; font-weight: 600; }
.state-sub   { font-size: 12px; color: #aaa; max-width: 260px; line-height: 1.5; }

.footer-ts { font-size: 10px; color: #c0c0be; text-align: center; margin-top: 20px; padding: 0 16px; line-height: 1.8; }

@media (min-width: 560px) {
  .topbar { padding: 14px 24px 12px; }
  .content { padding: 16px 24px 0; }
  .sbar   { padding: 0 24px 2px; }
  .tabs   { padding: 0 24px; }
  .metric-row { grid-template-columns: repeat(6,1fr); }
  .exec-grid  { grid-template-columns: repeat(3,1fr); }
  .pc-price   { font-size: 22px; }
}

/* Override inputs */
.ov-row { display:flex; gap:5px; align-items:center; margin-bottom:8px; flex-wrap:wrap; }
.ov-field { display:flex; flex-direction:column; flex:1; min-width:48px; }
.ov-label { font-size:9px; font-weight:600; color:#aaa; text-transform:uppercase; letter-spacing:.04em; margin-bottom:2px; }
.ov-input {
  font-size:12px; font-weight:500;
  padding:4px 6px; border-radius:6px;
  border:0.5px solid #d0d0ce; background:#fff;
  color:#1a1a1a; width:100%; text-align:center;
  font-variant-numeric:tabular-nums;
  -webkit-appearance:none;
}
.ov-input::placeholder { color:#ccc; }
.ov-input:focus { outline:none; border-color:#888; }
.ov-input.has-val { border-color:#f59e0b; background:#fffbeb; color:#92400e; font-weight:600; }

/* AI Briefing */
.ai-card { background:#fff; border:0.5px solid #e0e0de; border-radius:12px; padding:14px; margin-bottom:12px; }
.ai-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.ai-title { font-size:12px; font-weight:700; letter-spacing:-.1px; }
.ai-badge { font-size:9px; font-weight:600; padding:2px 7px; border-radius:5px; background:#f3e8ff; color:#7c3aed; }
.ai-body { font-size:12px; line-height:1.65; color:#333; white-space:pre-wrap; }
.ai-section { font-size:11px; font-weight:700; color:#1a1a1a; margin:10px 0 4px; text-transform:uppercase; letter-spacing:.04em; }
.ai-divider { border:none; border-top:0.5px solid #e8e8e6; margin:10px 0; }
.ai-btn { display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600; padding:8px 14px; border-radius:8px; border:0.5px solid #d0d0ce; background:#fff; cursor:pointer; color:#1a1a1a; }
.ai-btn:active { background:#f0f0ee; }
.ai-btn-purple { background:#7c3aed; color:#fff; border-color:#7c3aed; }
.ai-spin { width:12px; height:12px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:sp .8s linear infinite; display:inline-block; }
</style>
</head>
<body>
<div class="topbar" id="static-topbar">
  <div class="topbar-row1"><h1>Options Desk</h1><div class="topbar-time" id="clock-display"></div></div>
  <div class="ov-row" style="margin-bottom:4px">
    <div class="ov-field" style="max-width:28px;min-width:28px;justify-content:flex-end"><div class="ov-label" style="color:#bbb;font-size:8px">TODAY</div></div>
    <div class="ov-field"><div class="ov-label">VIX</div><input id="ov-vix" class="ov-input" type="number" step="0.01" min="0" placeholder="—" oninput="setOV('vix',this.value)" onfocus="this.select()"></div>
    <div class="ov-field"><div class="ov-label">VVIX</div><input id="ov-vvix" class="ov-input" type="number" step="0.01" min="0" placeholder="—" oninput="setOV('vvix',this.value)" onfocus="this.select()"></div>
    <div class="ov-field"><div class="ov-label">MOVE</div><input id="ov-move" class="ov-input" type="number" step="0.01" min="0" placeholder="—" oninput="setOV('move',this.value)" onfocus="this.select()"></div>
    <div class="ov-field"><div class="ov-label">DXY</div><input id="ov-dxy" class="ov-input" type="number" step="0.01" min="0" placeholder="—" oninput="setOV('dxy',this.value)" onfocus="this.select()"></div>
    <div class="ov-field"><div class="ov-label">10Y</div><div style="position:relative"><input id="ov-tnx" class="ov-input" type="number" step="0.001" min="0" max="20" placeholder="—" oninput="setOV('tnx',this.value)" onfocus="this.select()" style="padding-right:14px"><span id="ov-tnx-pct" style="position:absolute;right:4px;top:50%;transform:translateY(-50%);font-size:10px;color:#ccc;pointer-events:none">%</span></div></div>
    <div class="ov-field"><div class="ov-label">10Y real</div><div style="position:relative"><input id="ov-ry" class="ov-input" type="number" step="0.001" min="-5" max="20" placeholder="—" oninput="setOV('ry',this.value)" onfocus="this.select()" style="padding-right:14px"><span id="ov-ry-pct" style="position:absolute;right:4px;top:50%;transform:translateY(-50%);font-size:10px;color:#ccc;pointer-events:none">%</span></div></div>
    <div class="ov-field"><div class="ov-label">VIX3M</div><input id="ov-vix3m" class="ov-input" type="number" step="0.01" min="0" placeholder="—" oninput="setOV('vix3m',this.value)" onfocus="this.select()"></div>
    <div class="ov-field" style="min-width:32px;max-width:36px"><div class="ov-label">&nbsp;</div><button class="btn" style="padding:4px 6px;font-size:11px;border-radius:6px" onclick="clearOV()" title="Clear all">✕</button></div>
  </div>
  <div class="ov-row">
    <div class="ov-field" style="max-width:28px;min-width:28px;justify-content:flex-end"><div class="ov-label" style="color:#bbb;font-size:8px">PREV</div></div>
    <div class="ov-field"><input id="ov-vix1" class="ov-input" type="number" step="0.01" min="0" placeholder="—" oninput="setOV('vix1',this.value)" onfocus="this.select()" style="border-style:dashed"></div>
    <div class="ov-field"><input id="ov-vvix1" class="ov-input" type="number" step="0.01" min="0" placeholder="—" oninput="setOV('vvix1',this.value)" onfocus="this.select()" style="border-style:dashed"></div>
    <div class="ov-field"><input id="ov-move1" class="ov-input" type="number" step="0.01" min="0" placeholder="—" oninput="setOV('move1',this.value)" onfocus="this.select()" style="border-style:dashed"></div>
    <div class="ov-field"><input id="ov-dxy1" class="ov-input" type="number" step="0.01" min="0" placeholder="—" oninput="setOV('dxy1',this.value)" onfocus="this.select()" style="border-style:dashed"></div>
    <div class="ov-field"><div style="position:relative"><input id="ov-tnx1" class="ov-input" type="number" step="0.001" min="0" max="20" placeholder="—" oninput="setOV('tnx1',this.value)" onfocus="this.select()" style="padding-right:14px;border-style:dashed"><span style="position:absolute;right:4px;top:50%;transform:translateY(-50%);font-size:10px;color:#ccc;pointer-events:none">%</span></div></div>
    <div class="ov-field"><div style="position:relative"><input id="ov-ry1" class="ov-input" type="number" step="0.001" min="-5" max="20" placeholder="—" oninput="setOV('ry1',this.value)" onfocus="this.select()" style="padding-right:14px;border-style:dashed"><span style="position:absolute;right:4px;top:50%;transform:translateY(-50%);font-size:10px;color:#ccc;pointer-events:none">%</span></div></div>
    <div class="ov-field"><input class="ov-input" type="text" placeholder="—" disabled style="border-style:dashed;opacity:0.3;cursor:default"></div>
    <div class="ov-field" style="min-width:32px;max-width:36px"></div>
  </div>
  <div class="run-btns" id="run-btns-container"></div>
</div>
<div class="app" id="root"></div>
<script>
const KEY = '8YxfViBiNRATU2HQwZTSUaJatTsFI0yh';

// Shared spot prices used by optionChain() to anchor the strike window.
// Populated in runBriefing() before chain fetches execute.
let _chainSpots = {};

// Forex bar fetch via Polygon Starter — returns [{date,value}] newest-first.
// Used for EUR/USD → DXY proxy: DXY ≈ 96.5 / EURUSD (directionally accurate).
async function polyForex(pair, limit=3) {
  const to=ymd(toET(new Date())), from=dBack(limit*3);
  const url=`https://api.polygon.io/v2/aggs/ticker/${encodeURIComponent(pair)}/range/1/day/${from}/${to}?sort=desc&limit=${limit}&apiKey=${KEY}`;
  try {
    const r = await fetch(url);
    const j = await r.json().catch(()=>({}));
    if (!r.ok || j.status==='ERROR') {
      const out=[]; out._err=`${pair}: ${j.error||j.message||r.status}`; return out;
    }
    const bars = j.results ?? [];
    if (!bars.length) { const out=[]; out._err=`${pair}: no data`; return out; }
    return bars.map(b=>({ date:new Date(b.t).toISOString().slice(0,10), value:b.c }));
  } catch(e) {
    const out=[]; out._err=`${pair}: ${e.message}`; return out;
  }
}

const SESSIONS = [
  { id:'pre',   label:'Pre-market',   hhmm:'08:00', short:'8 AM',   startM:480,  endM:630  },
  { id:'mid1',  label:'Mid-morning',  hhmm:'10:30', short:'10:30',  startM:630,  endM:780  },
  { id:'mid2',  label:'Midday',       hhmm:'13:00', short:'1 PM',   startM:780,  endM:930  },
  { id:'late',  label:'Late session', hhmm:'15:30', short:'3:30 PM',startM:930,  endM:1215 },
  { id:'post',  label:'After-close',  hhmm:'20:15', short:'8:15 PM',startM:1215, endM:1440 },
];

let S = { sid:null, tab:'overview', briefs:{}, loading:false, errs:[], warns:[], now:new Date() };
let OV = { vix:'', vix1:'', vvix:'', vvix1:'', move:'', move1:'', dxy:'', dxy1:'', tnx:'', tnx1:'', ry:'', ry1:'', vix3m:'' }; // manual overrides (empty = use proxy)

/* ── Time ── */
const toET  = d => new Date(d.toLocaleString('en-US',{timeZone:'America/New_York'}));
const ymd   = d => d.toISOString().slice(0,10);
const dBack = n => { const d=new Date(toET(new Date())); d.setDate(d.getDate()-n); return ymd(d); };

function isMarketHours() {
  const et=toET(new Date()), h=et.getHours(), m=et.getMinutes(), day=et.getDay();
  if (day===0||day===6) return false;
  return (h*60+m)>=570 && (h*60+m)<960;
}
function sessStatus(s, now) {
  const et=toET(now), m=et.getHours()*60+et.getMinutes();
  if (m>=s.startM&&m<s.endM) return 'on';
  if (m<s.startM&&s.startM-m<=30) return 'nxt';
  return '';
}
function countdown(now) {
  const et=toET(now), cur=et.getHours()*60+et.getMinutes(), sec=et.getSeconds();
  for (const s of SESSIONS) {
    if (cur<s.startM) {
      const d=(s.startM-cur)*60-sec, h=Math.floor(d/3600), m=Math.floor((d%3600)/60), s2=d%60;
      return `next in ${h?h+'h ':''}${m}m ${String(s2).padStart(2,'0')}s`;
    }
  }
  const d=(1440-cur+480)*60-sec;
  return `8AM in ${Math.floor(d/3600)}h ${Math.floor((d%3600)/60)}m`;
}

/* ── API ── */
async function apiFetch(url, lbl) {
  const r=await fetch(url);
  const j=await r.json().catch(()=>({}));
  if (!r.ok||j.status==='ERROR') throw new Error(`${lbl}: ${j.error||j.message||r.status}`);
  return j;
}

async function stockBarsLong(ticker, days=35) {
  const to=ymd(toET(new Date())), from=dBack(days);
  const j=await apiFetch(
    `https://api.polygon.io/v2/aggs/ticker/${ticker}/range/1/day/${from}/${to}?adjusted=true&sort=desc&limit=40&apiKey=${KEY}`,
    `rv-bars/${ticker}`);
  return (j.results??[]).reverse();
}

async function stockPrev(ticker) {
  const j=await apiFetch(
    `https://api.polygon.io/v2/aggs/ticker/${ticker}/prev?adjusted=true&apiKey=${KEY}`,
    `prev/${ticker}`);
  return j.results?.[0]??null;
}

async function indexBars(sym, days=5) {
  const to=ymd(toET(new Date())), from=dBack(days);
  const url=`https://api.polygon.io/v2/aggs/ticker/${encodeURIComponent(sym)}/range/1/day/${from}/${to}?sort=desc&limit=5&apiKey=${KEY}`;
  try {
    const r = await fetch(url);
    const j = await r.json().catch(()=>({}));
    if (!r.ok || j.status==='ERROR') {
      // Capture the actual HTTP status and Polygon error message for diagnostics
      const err = j.error || j.message || `HTTP ${r.status}`;
      const bars = [];
      bars._err = `${sym}: ${r.status} — ${err}`;
      return bars;
    }
    return j.results ?? [];
  } catch(e) {
    const bars = [];
    bars._err = `${sym}: network error — ${e.message}`;
    return bars;
  }
}


// Options chain with configurable DTE window
async function optionChain(ticker, dteLow, dteHigh, spot) {
  // spot is passed in explicitly from runBriefing after the snapshot fetch completes.
  // This avoids any dependency on _chainSpots timing.
  function etDatePlusDays(n) {
    const et = toET(new Date());
    et.setHours(12, 0, 0, 0);
    et.setDate(et.getDate() + n);
    const y = et.getFullYear();
    const m = String(et.getMonth()+1).padStart(2,'0');
    const d = String(et.getDate()).padStart(2,'0');
    return y+'-'+m+'-'+d;
  }
  const from = etDatePlusDays(dteLow);
  const to   = etDatePlusDays(dteHigh);
  const liveSpot = spot ?? 0;
  // SPY has $1 strike spacing so needs a tighter window to stay within limit=250.
  // GLD ($5 spacing) and TLT ($0.50 spacing) are fine with a wider window.
  const pct = ticker === 'SPY' ? 0.03 : 0.08;
  const lo = (liveSpot * (1 - pct * 0.5)).toFixed(2);
  const hi = (liveSpot * (1 + pct * 1.5)).toFixed(2);
  if (!liveSpot) S.warns?.push(`${ticker} chain: spot=0, window will be wrong`);
  const j = await apiFetch(
    `https://api.polygon.io/v3/snapshot/options/${ticker}`
    + `?expiration_date.gte=${from}&expiration_date.lte=${to}`
    + `&strike_price.gte=${lo}&strike_price.lte=${hi}`
    + `&limit=250&sort=strike_price&order=asc&apiKey=${KEY}`,
    `chain/${ticker}/${dteLow}-${dteHigh}d`
  );
  const results = j.results ?? [];
  results._dateFrom = from;
  results._dateTo   = to;
  return results;
}

/* ── RV Calculator ── */
function calcRV(bars, window=20) {
  if (!bars||bars.length<window+1) return null;
  const recent=bars.slice(-(window+1));
  const closes=recent.map(b=>b.c).filter(c=>c>0);
  if (closes.length<window+1) return null;
  const returns=[];
  for (let i=1;i<closes.length;i++) returns.push(Math.log(closes[i]/closes[i-1]));
  if (returns.length<window) return null;
  const mean=returns.reduce((s,r)=>s+r,0)/returns.length;
  const variance=returns.reduce((s,r)=>s+Math.pow(r-mean,2),0)/returns.length;
  return { rv:Math.sqrt(variance*252), returns, nDays:returns.length, closes };
}

/* ── Chain analysis ── */
function analyseChain(contracts, spot, dateFrom, dateTo, liveSpotParam, ticker='GLD') {
  if (!contracts.length||!spot) return null;
  // liveSpot: use pre-fetched minute bar price passed as liveSpotParam.
  // Do NOT use underlying_asset.price from contracts — it can be stale or
  // reflect a different quote than what was used to build the strike window.
  // During market hours, underlying_asset.price on the contracts is real-time and
  // more current than the minute bar. Use it if it looks plausible (within 5% of liveSpotParam).
  const chainSpot = contracts.find(c=>c.underlying_asset?.price>0)?.underlying_asset?.price ?? 0;
  const liveSpot = (chainSpot>0 && liveSpotParam>0 && Math.abs(chainSpot-liveSpotParam)/liveSpotParam<0.05)
    ? chainSpot                          // chain price is fresh and sane — use it
    : (liveSpotParam && liveSpotParam>0)
      ? liveSpotParam                    // fall back to minute bar
      : spot;                            // last resort: bar close
  // Sanity guard: discard contracts whose strike is >20% from live spot.
  const plausible=contracts.filter(c=>{const k=c.details?.strike_price??0;return k>0&&Math.abs(k-liveSpot)/liveSpot<0.10;});
  if (plausible.length<4) return null;
  // Replace passed-in spot with the live value for all downstream calculations
  spot = liveSpot;
  const calls=plausible.filter(c=>c.details?.contract_type==='call');
  const puts =plausible.filter(c=>c.details?.contract_type==='put');
  if (!calls.length||!puts.length) return null;

  // Find the single strike nearest to spot, then get the call and put AT THAT SAME STRIKE.
  // This prevents the call and put being selected from different strikes, which inflates
  // the ATM IV average when the chain has wide strike spacing (e.g. GLD at $5-$10 intervals).
  // Use plausible (already filtered) contracts for strike list so ATM is anchored to live spot
  const allStrikes = [...new Set(plausible.map(c=>c.details?.strike_price).filter(Boolean))].sort((a,b)=>a-b);
  const atmStrikeVal = allStrikes.reduce((a,b)=>Math.abs(a-spot)<=Math.abs(b-spot)?a:b, allStrikes[0]??spot);
  const atmC = calls.find(c=>c.details?.strike_price===atmStrikeVal) ?? calls.reduce((a,b)=>Math.abs((a.details?.strike_price??0)-spot)<=Math.abs((b.details?.strike_price??0)-spot)?a:b);
  const atmP = puts.find( c=>c.details?.strike_price===atmStrikeVal) ?? puts.reduce( (a,b)=>Math.abs((a.details?.strike_price??0)-spot)<=Math.abs((b.details?.strike_price??0)-spot)?a:b);
  // Average call and put IV at the same strike for a clean ATM mid
  const atmCallIV = atmC?.implied_volatility??0;
  const atmPutIV  = atmP?.implied_volatility??0;
  const atmIV = (atmCallIV>0 && atmPutIV>0) ? (atmCallIV+atmPutIV)/2 : (atmCallIV||atmPutIV||0);

  const expDate=atmC?.details?.expiration_date;
  const dte=expDate?Math.max(1,Math.round((new Date(expDate)-toET(new Date()))/86400000)):15;

  // 25Δ with correct sign convention + BS fallback
  function find25IV(arr, targetDelta) {
    // Live greeks path (market hours only — Polygon only populates delta 9:30-4PM ET)
    const withG=arr.filter(c=>c.greeks?.delta!=null);
    if (withG.length>=3) {
      const best=withG.reduce((a,b)=>{
        const da=Math.abs(a.greeks.delta-targetDelta), db=Math.abs(b.greeks.delta-targetDelta);
        return da<=db?a:b;
      });
      return best?.implied_volatility??null;
    }
    // Outside market hours: greeks unavailable, return null (show — in UI)
    return null;
  }

  const iv25C=find25IV(calls,+0.25)??0;
  const iv25P=find25IV(puts, -0.25)??0;
  let skew25=(iv25P&&iv25C)?iv25P-iv25C:null;
  let skewSource='greeks';

  // Fallback skew estimation from chain prices (used outside market hours)
  // Method: find equidistant OTM put and call strikes ~5-8% from ATM,
  // compare their implied vols. Put IV > Call IV = positive (put) skew.
  // Less precise than 25Δ greeks but directionally reliable.
  if (skew25 === null && atmIV > 0) {
    const targetPct = 0.05; // ~5% OTM target
    const putTarget  = spot * (1 - targetPct);
    const callTarget = spot * (1 + targetPct);
    const nearPut  = puts.reduce( (a,b)=>Math.abs((a.details?.strike_price??0)-putTarget) <=Math.abs((b.details?.strike_price??0)-putTarget) ?a:b, puts[0]);
    const nearCall = calls.reduce((a,b)=>Math.abs((a.details?.strike_price??0)-callTarget)<=Math.abs((b.details?.strike_price??0)-callTarget)?a:b, calls[0]);
    const putIVfb  = nearPut?.implied_volatility  ?? 0;
    const callIVfb = nearCall?.implied_volatility ?? 0;
    // Only use fallback if both strikes are meaningfully OTM (>1% from ATM) and IV is plausible
    const putDist  = nearPut?.details?.strike_price  ? Math.abs(nearPut.details.strike_price  - spot)/spot : 0;
    const callDist = nearCall?.details?.strike_price ? Math.abs(nearCall.details.strike_price - spot)/spot : 0;
    if (putIVfb > 0 && callIVfb > 0 && putDist > 0.01 && callDist > 0.01) {
      skew25 = putIVfb - callIVfb;
      skewSource = 'price-implied';
    }
  }

  const callOI=calls.reduce((s,c)=>s+(c.open_interest??0),0);
  const putOI =puts.reduce( (s,c)=>s+(c.open_interest??0),0);
  const pcRatio=callOI?(putOI/callOI).toFixed(2):'—';

  // Zone-based wall selection — guarantees representation from three distance bands:
  //   Pin zone    (0–1.5%):  1–2 walls — active gamma pinning strikes for this week
  //   S/R zone    (1.5–6%):  2–3 walls — meaningful support/resistance price can reach in 15D
  //   Tail zone   (6–10%):   1 wall    — regime marker, key level if vol expands
  // Within each zone, sort by raw OI (no distance weighting) so the largest strike cluster wins.
  // Deduplicate by strike+side across expiries first: aggregate OI, keep nearest DTE.
  const wallMap = new Map(); // key: `${strike}-${type}`
  plausible
    .filter(c=>(c.open_interest??0)>0)
    .forEach(c=>{
      const k=c.details?.strike_price??0;
      const type=c.details?.contract_type;
      const oi=c.open_interest??0;
      const expDate=c.details?.expiration_date;
      const wallDte=expDate?Math.max(1,Math.round((new Date(expDate)-toET(new Date()))/86400000)):null;
      const key=`${k}-${type}`;
      if (wallMap.has(key)) {
        const existing=wallMap.get(key);
        existing.oi+=oi;
        if (wallDte!=null&&(existing.dte==null||wallDte<existing.dte)) existing.dte=wallDte;
      } else {
        const distPct=spot>0?Math.abs(k-spot)/spot:1;
        wallMap.set(key,{strike:k,type,oi,distPct,dte:wallDte});
      }
    });

  // Assign each deduplicated wall to a zone, sort by OI within zone
  const allDeduped=[...wallMap.values()].sort((a,b)=>b.oi-a.oi);
  const pinZone   =allDeduped.filter(w=>w.distPct<=0.015);
  const srZone    =allDeduped.filter(w=>w.distPct>0.015&&w.distPct<=0.06);
  const tailZone  =allDeduped.filter(w=>w.distPct>0.06);

  // Pick from each zone: up to 2 pin, up to 3 S/R (prefer different strikes both sides), 1 tail
  // For S/R prefer one put-side and one call-side if available
  const srCalls = srZone.filter(w=>w.type==='call');
  const srPuts  = srZone.filter(w=>w.type==='put');
  const srPicked = [];
  // Interleave: best call, best put, second best call, etc. up to 3
  const srMax = 3;
  for (let i=0; srPicked.length<srMax; i++) {
    const c=srCalls[i], p=srPuts[i];
    if (!c&&!p) break;
    if (c) srPicked.push(c);
    if (srPicked.length<srMax&&p) srPicked.push(p);
  }

  const walls=[
    ...pinZone.slice(0,2),
    ...srPicked,
    ...tailZone.slice(0,1),
  ]
  // Attach zone label for display
  .map(w=>({
    ...w,
    zone: w.distPct<=0.015?'pin':w.distPct<=0.06?'sr':'tail',
  }))
  // Final dedup: if pin zone somehow got same strike as sr, keep only pin entry
  .filter((w,i,arr)=>arr.findIndex(x=>x.strike===w.strike&&x.type===w.type)===i)
  .slice(0,6); // safety cap

  const midOf=c=>c?.day?.close??0;
  const straddleMid=midOf(atmC)+midOf(atmP);
  const greeksLive=calls.filter(c=>c.greeks?.delta!=null).length>=3;

  // ATM strike for calendar leg reference
  const atmStrike=atmStrikeVal??atmC?.details?.strike_price??spot;

  // ── Dealer Gamma Exposure (GEX) ──
  // Convention: dealers are assumed short the options customers buy.
  // Net GEX = Σ_calls(OI × gamma × spot² × 0.01) − Σ_puts(OI × gamma × spot² × 0.01)
  // Positive GEX → dealers net long gamma → countercyclical (buy dips, sell rips) → dampens moves
  // Negative GEX → dealers net short gamma → procyclical (amplifies moves) → trend continuation
  // Units: dollars of delta per 1% move in spot (normalized to millions for display)
  //
  // Gamma source priority:
  //   1. Live greeks.gamma from Polygon (market hours only)
  //   2. BS-estimated gamma: N'(d1) / (spot × iv × √T)  (outside market hours)
  function bsGamma(s, k, iv, dte) {
    if (!iv || !dte || !s || !k) return 0;
    const T = Math.max(dte, 1) / 365;
    const d1 = (Math.log(s/k) + 0.5*iv*iv*T) / (iv*Math.sqrt(T));
    const pdf = Math.exp(-0.5*d1*d1) / Math.sqrt(2*Math.PI); // standard normal PDF
    return pdf / (s * iv * Math.sqrt(T));
  }

  let gexRaw = 0;
  let gexSource = 'none';
  const gexContracts = plausible.filter(c => (c.open_interest??0) > 0 && (c.implied_volatility??0) > 0);

  if (gexContracts.length >= 4) {
    const hasLiveGamma = gexContracts.some(c => c.greeks?.gamma != null);
    gexSource = hasLiveGamma ? 'live' : 'bs-estimated';

    for (const con of gexContracts) {
      const oi  = con.open_interest ?? 0;
      const k   = con.details?.strike_price ?? 0;
      const iv  = con.implied_volatility ?? 0;
      const conDte = con.details?.expiration_date
        ? Math.max(1, Math.round((new Date(con.details.expiration_date) - toET(new Date())) / 86400000))
        : dte;
      const gamma = (hasLiveGamma && con.greeks?.gamma != null)
        ? con.greeks.gamma
        : bsGamma(spot, k, iv, conDte);
      if (!gamma || !k) continue;
      // GEX contribution: OI × gamma × spot² × 0.01 × 100 (contract multiplier)
      const contribution = oi * gamma * spot * spot * 0.01 * 100;
      if (con.details?.contract_type === 'call') gexRaw += contribution;
      else                                        gexRaw -= contribution; // puts subtract
    }
  }

  // Normalize GEX to a −100→+100 score using asset-specific reference scales.
  // Each scale is set so that ±1× the reference ≈ ±100 score at typical peak GEX.
  // SPY: peak GEX ~$2–5B on opex weeks → $2B reference gives resolution across the range.
  // TLT: smaller options market, peak ~$200–500M → $200M reference.
  // GLD: smallest of the three, peak ~$50–150M → $50M reference.
  const GEX_REFS = { SPY: 2_000_000_000, TLT: 200_000_000, GLD: 50_000_000 };
  const GEX_REF = GEX_REFS[ticker] ?? 50_000_000;
  const gexScore = Math.max(-100, Math.min(100, Math.round(gexRaw / GEX_REF * 100)));
  // GEX in millions for display
  const gexM = parseFloat((gexRaw / 1_000_000).toFixed(1));

  const debug={atmStrikeUsed:atmStrikeVal,spot:spot,liveSpotUsed:liveSpot,atmCallIV_raw:atmC?.implied_volatility??null,atmPutIV_raw:atmP?.implied_volatility??null,atmCallTicker:atmC?.ticker??null,atmPutTicker:atmP?.ticker??null,atmCallDelta:atmC?.greeks?.delta??null,atmPutDelta:atmP?.greeks?.delta??null,contractsInWindow:plausible.length,allStrikesRaw:allStrikes.slice(0,5),dateFrom,dateTo};
  return {atmIV,iv25C,iv25P,skew25,skewSource,callOI,putOI,pcRatio,walls,straddleMid,dte,greeksLive,atmStrike,gexRaw,gexM,gexScore,gexSource,debug};
}

/* ── Term structure analysis ── */
// tsRatio = nearIV / farIV
// > 1.05 → contango (near rich vs far)  → calendar/diagonal favored
// < 0.95 → backwardation (far rich)     → vertical spreads favored
// 0.95–1.05 → flat → slight lean vertical
function termStructureRegime(tsRatio) {
  if (!tsRatio) return { label:'Unknown', regime:'flat', source:'none' };
  if (tsRatio > 1.10) return { label:'Steep contango', regime:'contango', ratio:tsRatio };
  if (tsRatio > 1.05) return { label:'Mild contango',  regime:'contango', ratio:tsRatio };
  if (tsRatio < 0.92) return { label:'Backwardation',  regime:'backwardation', ratio:tsRatio };
  return { label:'Flat', regime:'flat', ratio:tsRatio };
}

/* ── Strategy selection ── */
// Returns { type, label, rationale } per asset
// Types: 'credit_spread' | 'calendar' | 'diagonal' | 'debit_spread'
function selectStrategy(asset, { vrp, tsInfo, skewCond, volReg, changePct, dnt }) {
  const vrpPos = vrp > 0;
  const vrpStrong = vrp > 3;       // IV meaningfully above RV
  const vrpNeg  = vrp < -1;
  const isDirectional = Math.abs(changePct) > 0.5;
  const tsRegime = tsInfo?.regime ?? 'flat';

  // No short premium if VRP negative
  if (vrpNeg || dnt==='HOLD') {
    return {
      type:'debit_spread',
      label:'Debit spread',
      rationale:`Negative VRP (IV < RV) — avoid selling vol. Use debit structure to limit short premium exposure.`
    };
  }

  // Contango: near IV > far IV → calendars and diagonals capture theta differential
  if (tsRegime==='contango' && vrpPos) {
    if (isDirectional) {
      return {
        type:'diagonal',
        label:'Diagonal spread',
        rationale:`Near IV rich vs far IV (ratio ${tsInfo?.ratio?.toFixed(2)}) + directional bias → sell rich near-term strike, buy far-term ATM for vega exposure.`
      };
    }
    return {
      type:'calendar',
      label:'Calendar spread',
      rationale:`Near IV rich vs far IV (ratio ${tsInfo?.ratio?.toFixed(2)}) + range-bound + positive VRP → sell near-term decay, own far-term gamma. Classic calendar setup.`
    };
  }

  // Backwardation or flat: far IV ≥ near IV → vertical spreads capture outright premium
  if (tsRegime==='backwardation' || tsRegime==='flat') {
    if (vrpStrong) {
      return {
        type:'credit_spread',
        label:'Credit spread',
        rationale:`${tsRegime==='backwardation'?'Backwardation (far IV elevated)':'Flat term structure'} + strong positive VRP (${vrp.toFixed(1)}pts) → collect outright premium via vertical spread.`
      };
    }
    return {
      type:'credit_spread',
      label:'Credit spread',
      rationale:`Flat term structure + positive VRP → vertical spread preferred over calendar. Near and far IV not sufficiently differentiated to justify time spread.`
    };
  }

  return { type:'credit_spread', label:'Credit spread', rationale:'Default: flat regime, positive VRP.' };
}

/* ── Math ── */
function ndCDF(x){
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const sg=x<0?-1:1; x=Math.abs(x);
  const t=1/(1+p*x),y=1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);
  return 0.5*(1+sg*y);
}
function pOTM(spot,strike,iv,dte,type='put'){
  if(!iv||!dte) return 0.78;
  const t=dte/365,d2=(Math.log(spot/strike)-0.5*iv*iv*t)/(iv*Math.sqrt(t));
  return type==='put'?ndCDF(d2):(1-ndCDF(d2));
}
function emCalc(spot,iv,dte){ return spot*(iv||0)*Math.sqrt(dte/365); }

/* ── Formatting ── */
const f  =(n,d=2)=>isNaN(n)||n==null?'—':Number(n).toFixed(d);
const f$ =n=>'$'+f(n);
const fp =(n,d=1)=>(!n&&n!==0)||isNaN(n)?'—':(n*100).toFixed(d)+'%';
const sgn=n=>parseFloat(n)>=0?'+':'';
const cc =n=>parseFloat(n)>=0?'up':'dn';

/* ── Build briefing ── */
function buildBriefing({stocks,rvData,indices,chainsNear,chainsFar,tnx10}) {
  const sp=stocks.SPY, gl=stocks.GLD, tl=stocks.TLT;
  // Previous-day closes for change calculation
  const spyPr=sp?.prevClose??sp?.price??0;
  const gldPr=gl?.prevClose??gl?.price??0;
  const tltPr=tl?.prevClose??tl?.price??0;
  const chg=(c,p)=>p?{ch:f(c-p),pct:f((c-p)/p*100)}:{ch:'0.00',pct:'0.00'};

  const CA=chainsNear.SPY, CB=chainsNear.GLD, CC=chainsNear.TLT;
  const FA=chainsFar.SPY,  FB=chainsFar.GLD,  FC=chainsFar.TLT;

  // Live spot: prefer underlying_asset.price from chain (real-time), fall back to bar close.
  const spyP2 = (_chainSpots.SPY > 0 ? _chainSpots.SPY : sp?.price) ?? 0;
  const gldP2 = (_chainSpots.GLD > 0 ? _chainSpots.GLD : gl?.price) ?? 0;
  const tltP2 = (_chainSpots.TLT > 0 ? _chainSpots.TLT : tl?.price) ?? 0;

  const vixFallback=(indices.vix??22)/100;
  const spyIV=CA?.atmIV||vixFallback;
  const gldIV=CB?.atmIV||0.24;
  const tltIV=CC?.atmIV||0.175;

  // Far IV for term structure
  const spyFarIV=FA?.atmIV||null;
  const gldFarIV=FB?.atmIV||null;
  const tltFarIV=FC?.atmIV||null;

  // Term structure ratios (near/far)
  // If chain-based ratio unavailable, fall back to VIX/VIX3M
  const vix3m = indices.vix3m ?? null;
  const vixRatioFallback = (indices.vix && vix3m) ? indices.vix/vix3m : null;

  const mkTsRatio = (nearIV, farIV, fallback) => {
    if (nearIV && farIV && farIV>0) return { ratio:nearIV/farIV, source:'chain' };
    if (fallback) return { ratio:fallback, source:'VIX/VIX3M' };
    return null;
  };

  const spyTsRaw = mkTsRatio(spyIV, spyFarIV, vixRatioFallback);
  const gldTsRaw = mkTsRatio(gldIV, gldFarIV, null);
  const tltTsRaw = mkTsRatio(tltIV, tltFarIV, null);

  const spyTs = spyTsRaw ? { ...termStructureRegime(spyTsRaw.ratio), source:spyTsRaw.source, nearIV:spyIV, farIV:spyFarIV } : null;
  const gldTs = gldTsRaw ? { ...termStructureRegime(gldTsRaw.ratio), source:gldTsRaw.source, nearIV:gldIV, farIV:gldFarIV } : null;
  const tltTs = tltTsRaw ? { ...termStructureRegime(tltTsRaw.ratio), source:tltTsRaw.source, nearIV:tltIV, farIV:tltFarIV } : null;

  // Live RV
  const FBRV={spy:0.185,gld:0.28,tlt:0.14};
  const spyRV=rvData.SPY?.rv??FBRV.spy;
  const gldRV=rvData.GLD?.rv??FBRV.gld;
  const tltRV=rvData.TLT?.rv??FBRV.tlt;
  const rvLive=!!(rvData.SPY?.rv&&rvData.GLD?.rv&&rvData.TLT?.rv);

  const spyVRP=((spyIV-spyRV)*100);
  const gldVRP=((gldIV-gldRV)*100);
  const tltVRP=((tltIV-tltRV)*100);

  const vix  =indices.vix  ??spyIV*100;
  const vvix =indices.vvix ??94;
  // MOVE proxy: I:MOVE is an ICE proprietary index not available on Polygon.
  // Use TLT ATM IV × 450 as a proxy — historically MOVE ≈ TLT_IV × 100 × 4.5.
  // This captures the same regime signal (calm / stressed bond vol) directionally.
  const moveProxy = tltIV ? parseFloat((tltIV * 450).toFixed(1)) : null;
  const move = indices.move ?? moveProxy;
  const dxy  =indices.dxy  ??99.6;
  const tnx  =tnx10??indices.tnx??4.34;
  const vixPct =Math.round(Math.max(0,Math.min(100,(vix-13.38)/(60.13-13.38)*100)));
  const vvixPct=Math.round(Math.max(0,Math.min(100,(vvix-60)/(180-60)*100)));

  const skewCond=s=>{if(s==null)return'N/A';return s>0.04?'Elevated':s<-0.01?'Inverted':'Normal';};
  const volR=iv=>iv>0.30?'Expansion':iv>0.18?'Transition':'Compression';
  const moveReg=move==null?'N/A':move>110?'Expansion':move>80?'Transition':'Compression';
  const moveIsProxy=!indices.move&&moveProxy!=null;
  const vixReg =vix>30?'Expansion':vix>18?'Transition':'Compression';
  const regime =vix>30||move>120?'High':vix>20||move>90?'Moderate':'Low';

  const dnt={
    spy: spyVRP<0||vix>28||spyIV<0.15 ? 'HOLD':'PROCEED',
    gld: gldVRP<0||gldIV<0.14         ? 'HOLD':'PROCEED',
    tlt: tltVRP<0||tltIV<0.10||(move!=null&&move>120) ? 'HOLD':'PROCEED',
  };

  // Strategy selection per asset
  const changes={spy:chg(spyP2,spyPr),gld:chg(gldP2,gldPr),tlt:chg(tltP2,tltPr)};
  const spyStrat=selectStrategy('spy',{vrp:spyVRP,tsInfo:spyTs,skewCond:skewCond(CA?.skew25??null),volReg:volR(spyIV),changePct:parseFloat(changes.spy.pct),dnt:dnt.spy});
  const gldStrat=selectStrategy('gld',{vrp:gldVRP,tsInfo:gldTs,skewCond:skewCond(CB?.skew25??null),volReg:volR(gldIV),changePct:parseFloat(changes.gld.pct),dnt:dnt.gld});
  const tltStrat=selectStrategy('tlt',{vrp:tltVRP,tsInfo:tltTs,skewCond:skewCond(CC?.skew25??null),volReg:volR(tltIV),changePct:parseFloat(changes.tlt.pct),dnt:dnt.tlt});

  // Strike finder for vertical legs
  const findStrike=(spot,iv,side)=>{
    if(!spot||!iv) return {k:side==='put'?spot*.973:spot*1.027,p:78};
    let best=null,bestD=1;
    for(let pct=0.5;pct<=25;pct+=0.25){
      const k=side==='put'?spot*(1-pct/100):spot*(1+pct/100);
      const p=pOTM(spot,k,iv,15,side);
      const d=Math.abs(p-0.78);
      if(d<bestD){bestD=d;best={k:parseFloat(f(k,2)),p:parseFloat(f(p*100,0))};}
    }
    return best??{k:side==='put'?parseFloat(f(spot*.973,2)):parseFloat(f(spot*1.027,2)),p:78};
  };

  const spySS=findStrike(spyP2,spyIV,'put');
  const gldSS=findStrike(gldP2,gldIV,'call');
  const tltSS=findStrike(tltP2,tltIV,'call');

  // ── Trade Generation Engine v2 ──
  // Spread widths by asset (dollar-wide)
  const WIDTHS = { SPY:5, GLD:2.5, TLT:2 };

  // BS credit estimator for a vertical spread
  function bsSpreadCredit(spot, shortK, longK, iv, dte, side) {
    // Approximate: difference in BS option prices using simplified model
    const T = dte/365;
    if (!T||!iv) return 0;
    function bsPrice(K, type) {
      const d1=(Math.log(spot/K)+(0.5*iv*iv)*T)/(iv*Math.sqrt(T));
      const d2=d1-iv*Math.sqrt(T);
      if(type==='call') return spot*ndCDF(d1)-K*Math.exp(-0.04*T)*ndCDF(d2);
      return K*Math.exp(-0.04*T)*ndCDF(-d2)-spot*ndCDF(-d1);
    }
    const shortP = bsPrice(shortK, side);
    const longP  = bsPrice(longK,  side);
    return Math.max(0, shortP - longP);
  }

  // Find short strike in target P(OTM) zone
  // Returns {k, potm, aggressive, reason}
  function findShortStrike(spot, iv, dte, side, zoneLo=0.70, zoneHi=0.85) {
    let candidates=[];
    for (let pct=0.25; pct<=35; pct+=0.25) {
      const k = side==='put' ? spot*(1-pct/100) : spot*(1+pct/100);
      const p = pOTM(spot,k,iv,dte,side);
      candidates.push({k:parseFloat(f(k,2)), potm:p});
    }
    // Best in zone
    const inZone = candidates.filter(c=>c.potm>=zoneLo&&c.potm<=zoneHi);
    if (inZone.length) {
      const best = inZone.reduce((a,b)=>Math.abs(a.potm-0.775)<=Math.abs(b.potm-0.775)?a:b);
      return {k:best.k, potm:best.potm*100, aggressive:false, reason:null};
    }
    // Best near zone (65–70% or 85–90%)
    const nearZone = candidates.filter(c=>c.potm>=0.65&&c.potm<zoneLo);
    if (nearZone.length) {
      const best = nearZone.reduce((a,b)=>b.potm>=a.potm?b:a);
      return {k:best.k, potm:best.potm*100, aggressive:true,
        reason:`Short strike P(OTM) ${(best.potm*100).toFixed(0)}% is below the 70% target zone — IV structure does not support a tighter strike at ≥70% P(OTM) for this expiration.`};
    }
    return null; // exclude — below 65%
  }

  // CVaR budgets — max acceptable 5% tail loss in dollars per trade, per asset
  // Calibrated to ~2% of capital allocation: SPY=40K → $800, GLD/TLT=20K → $400
  const CVAR_BUDGETS = { SPY: 800, GLD: 400, TLT: 400 };

  // CVaR-based trade sizer.
  // Pass cvarPerContract=null on first-pass (before MC runs); will use heuristic.
  // Call again after tradePayoff() returns a per-unit CVaR to get final contract count.
  function sizeToCVaR(cvarPerContract, vrp, regimeStr, dntSig, label) {
    if (dntSig==='HOLD') return 0;
    const regBase = regimeStr==='High' ? 1 : regimeStr==='Low' ? 4 : 3;
    const vrpAdj  = vrp < 0 ? -1 : vrp > 8 ? 1 : 0;
    const heuristic = Math.max(1, Math.min(6, regBase + vrpAdj));
    if (!cvarPerContract || cvarPerContract <= 0) return heuristic;
    // Asset-specific budget (label is 'SPY', 'GLD', or 'TLT')
    const budget = CVAR_BUDGETS[label] ?? 800;
    // How many contracts fit inside the budget?
    const budgetContracts = Math.floor(budget / cvarPerContract);
    // Conservative: min of budget-derived and regime-heuristic, clamped 1–6
    return Math.max(1, Math.min(6, budgetContracts, heuristic));
  }

  // Legacy shim — heuristic only, used in HOLD debit path before CVaR is known
  function contractCount(vrp, regimeStr, dntSig) {
    return sizeToCVaR(null, vrp, regimeStr, dntSig);
  }

  // Skew alignment check — spread direction should favor the rich side
  // Returns true if direction aligns with skew
  function skewAligned(side, skCond) {
    if (skCond==='Elevated') return side==='put'; // put skew rich → sell puts
    if (skCond==='Inverted') return side==='call'; // call skew rich → sell calls
    return true; // neutral skew — either side ok
  }


  // ── CVaR calculation ──
  // Estimates 5% CVaR for each trade structure using analytical approximations.
  // Returns { cvar: dollar amount, label: string } per trade.
  // CVaR = Expected loss in the worst 5% of scenarios at expiry.
  // Uses log-normal return distribution with IV as annualized vol.

  function tradePayoff(type, spot, legs, iv, dte, width, credit, contracts) {
    const T = dte / 365;
    const sigma = iv * Math.sqrt(T);
    const N = 2000; // Monte Carlo paths
    const pnls = [];

    for (let i = 0; i < N; i++) {
      // Box-Muller normal sample
      const u1 = Math.random(), u2 = Math.random();
      const z = Math.sqrt(-2*Math.log(u1)) * Math.cos(2*Math.PI*u2);
      const sT = spot * Math.exp(-0.5*iv*iv*T + sigma*z);

      let payoff = 0;

      if (type === 'credit' || type === 'debit') {
        // Vertical spread: parse legs for strikes and side
        // legs[0] = short, legs[1] = long (credit) or reverse (debit)
        const leg0 = legs[0], leg1 = legs[1];
        const side = (leg0+leg1).toLowerCase().includes('put') ? 'put' : 'call';
        const k0 = parseFloat((leg0.match(/\$([\d.]+)/)||[])[1]??0);
        const k1 = parseFloat((leg1.match(/\$([\d.]+)/)||[])[1]??0);
        if (credit) {
          // Short vertical: collect premium, cap gain at credit, max loss = width - credit
          const shortK = Math.max(k0,k1) * (side==='put'?1:0) || Math.min(k0,k1);
          const longK  = side==='put' ? Math.min(k0,k1) : Math.max(k0,k1);
          const shortPayoff = side==='put' ? Math.max(0, shortK-sT) : Math.max(0, sT-shortK);
          const longPayoff  = side==='put' ? Math.max(0, longK-sT)  : Math.max(0, sT-longK);
          payoff = -(shortPayoff - longPayoff); // P&L from short spread perspective
        } else {
          // Long vertical: pay debit, max profit = width - debit
          const longK  = side==='put' ? Math.max(k0,k1) : Math.min(k0,k1);
          const shortK = side==='put' ? Math.min(k0,k1) : Math.max(k0,k1);
          const longPayoff  = side==='put' ? Math.max(0, longK-sT)  : Math.max(0, sT-longK);
          const shortPayoff = side==='put' ? Math.max(0, shortK-sT) : Math.max(0, sT-shortK);
          payoff = longPayoff - shortPayoff;
        }
      } else if (type === 'calendar') {
        // Calendar: approximate P&L as function of near expiry move
        // Profit zone: near-term strike ± 0.5×EM, loses on large moves
        const em = spot * iv * Math.sqrt(T);
        const dist = Math.abs(sT - spot);
        payoff = dist < em*0.5 ? width*0.15 : -(dist - em*0.5) * 0.3;
        payoff = Math.max(-width*0.4, Math.min(width*0.2, payoff));
      } else if (type === 'diagonal') {
        // Diagonal: similar to calendar but with slight directional tilt
        const em = spot * iv * Math.sqrt(T);
        const move = sT - spot;
        const favorable = (legs[0]||'').toLowerCase().includes('put') ? move > 0 : move < 0;
        payoff = favorable ? Math.min(width*0.2, Math.abs(move)*0.1) : -Math.min(width*0.4, Math.abs(move)*0.15);
      } else if (type === 'condor') {
        // Iron condor: profit between short strikes, lose outside long strikes
        const putShortK  = parseFloat(((legs[0]||'').match(/\$([\d.]+)\s+put/i)||[])[1]??spot*0.95);
        const callShortK = parseFloat(((legs[1]||'').match(/\$([\d.]+)\s+call/i)||[])[1]??spot*1.05);
        if (sT > putShortK && sT < callShortK) {
          payoff = width * 0.28; // near max credit
        } else if (sT <= putShortK) {
          payoff = Math.max(-width, -(putShortK - sT));
        } else {
          payoff = Math.max(-width, -(sT - callShortK));
        }
      } else if (type === 'bwb') {
        // BWB: parse body strike from legs
        const bodyK = parseFloat(((legs[1]||'').match(/\$([\d.]+)/)||[])[1]??spot);
        const side = (legs[0]||'').toLowerCase().includes('put') ? 'put' : 'call';
        const move = side==='put' ? spot - sT : sT - spot;
        if (move < 0) payoff = width * 0.15; // expires worthless, keep credit
        else if (move < width) payoff = width*0.15 - move*0.5;
        else if (move < width*2) payoff = -(move - width)*1.0;
        else payoff = -width * 0.9; // near max loss
      }

      pnls.push(payoff * contracts);
    }

    // Sort ascending, take worst 5%
    pnls.sort((a,b) => a-b);
    const cutoff = Math.floor(N * 0.05);
    const tail = pnls.slice(0, cutoff);
    const cvar = tail.reduce((s,v) => s+v, 0) / tail.length;
    return Math.abs(cvar);
  }

  // Generate trades for one asset × one DTE
  function genTrades(label, spot, iv, farIV, rv, dntSig, tsInfo, biasObj, skCond, dte) {
    if (!spot||!iv) return [];
    const a = label.toLowerCase();
    const vrpPts = a==='spy'?spyVRP : a==='gld'?gldVRP : tltVRP;
    const vrp = parseFloat(vrpPts);
    const width = WIDTHS[label];
    const tsReg = tsInfo?.regime ?? 'flat';
    const tsRatio = tsInfo?.ratio ?? 1;
    const bullish = biasObj.bull > biasObj.bear;
    const directional = Math.abs(biasObj.bull - biasObj.bear) > 20;
    const contracts = contractCount(vrp, regime, dntSig);
    const atmChain = a==='spy'?CA : a==='gld'?CB : CC;
    const atmK = atmChain?.atmStrike ?? spot;
    const em = emCalc(spot, iv, dte);
    const results = [];

    // ── HOLD: always propose one debit trade with justification ──
    if (dntSig==='HOLD') {
      const side = bullish ? 'call' : 'put';
      const longK = parseFloat(f(atmK,2));
      const shortK = side==='call' ? parseFloat(f(longK+width*2,2)) : parseFloat(f(longK-width*2,2));
      const potm = pOTM(spot,shortK,iv,dte,side)*100;
      if (potm<50) return []; // truly untradeable
      const aggressive = potm<70||potm>85;
      const debitEst = Math.max(0.10, bsSpreadCredit(spot,longK,shortK,iv,dte,side));
      // CVaR sizing: run MC at 1 contract, then size to budget
      const cvar1 = tradePayoff('debit',spot,[`Buy  ${f$(longK)} ${side}`, `Sell ${f$(shortK)} ${side}`],iv,dte,width,false,1);
      const finalContracts = Math.max(1, sizeToCVaR(cvar1, vrp, regime, dntSig, label));
      const finalCvar = cvar1 * finalContracts;
      results.push({
        type:'debit', label, dte, dntSig, contracts:finalContracts,
        cvarPerUnit: cvar1, cvarBudget: CVAR_BUDGETS[label]??800,
        strat: side==='call'?'Bull call debit spread':'Bear put debit spread',
        structure: `${width*2}-wide debit — HOLD flag, long premium only`,
        expiry: `${dte} DTE (single expiration)`,
        legs: [`Buy  ${f$(longK)} ${side}`, `Sell ${f$(shortK)} ${side}`],
        potm: potm.toFixed(0)+'%', aggressive,
        premTarget: `$${f(debitEst,2)} db (estimated)`,
        credit: false,
        rationale: `${label} flagged HOLD — short premium prohibited. ${side==='call'?'Bullish':'Bearish'} debit proposed: directional bias (${biasObj.bull}%/${biasObj.bear}%) justifies limited long premium. VRP ${vrp.toFixed(1)}pts.${aggressive?' ⚠ Aggressive: P(OTM) outside 70–85% zone.':''}`,
        regimeNote: `Regime: ${regime} vol. VRP ${vrp>=0?'+':''}${vrp.toFixed(1)}pts. Skew: ${skCond}.`,
        risk: 'Full debit lost if expires OTM. Time decay headwind. Max risk = debit paid.',
        score: Math.max(1, Math.abs(vrp)) * (potm/100) * 5,
        cvar: finalCvar,
      });
      return results;
    }

    // ── PROCEED assets: generate all applicable structures ──

    // 1. Calendar — when farIV available and range-bound or positive VRP
    if (farIV && (tsReg==='contango' || (!directional && vrp>0))) {
      const farDTE = dte+30;
      const netDebit = Math.max(0.3, Math.abs(iv-farIV)*spot*0.04 + 0.3);
      const strikeWidth = width*4;
      const maxDebit = strikeWidth*0.40;
      const debitOk = netDebit <= maxDebit;
      results.push({
        type:'calendar', label, dte, farDTE, dntSig, contracts,
        strat:'Calendar spread',
        structure:`ATM calendar — sell ${dte}D / buy ${farDTE}D`,
        expiry:`${dte} DTE (near) / ${farDTE} DTE (far)`,
        legs:[`Sell ${f$(atmK)} (${dte} DTE)`, `Buy  ${f$(atmK)} (${farDTE} DTE)`],
        potm:'≥70% (near expires worthless)',
        premTarget:`~$${f(netDebit,2)} db (${debitOk?'≤':'⚠ >'} 40% of $${strikeWidth} width)`,
        aggressive: !debitOk,
        credit:false,
        tsRatio: tsRatio.toFixed(3),
        rationale:`${tsReg==='contango'?'Contango (ratio '+tsRatio.toFixed(2)+')':'+VRP and range-bound bias'} supports ATM calendar. Near IV ${fp(iv)} vs far IV ${fp(farIV)}. Net debit ~$${f(netDebit,2)} ${debitOk?'within':'may exceed'} 40% of $${strikeWidth} width.${!debitOk?' ⚠ Aggressive.':''}`,
        regimeNote:`Regime: ${regime} vol. TS: ${tsReg} (${tsRatio.toFixed(2)}). Skew: ${skCond}.`,
        risk:'Sharp move compresses spread. Assignment risk on near short.',
        score: Math.max(1,vrp) * (tsReg==='contango'?tsRatio:1) * (directional?7:11),
      });
      { const t=results[results.length-1]; const c1=tradePayoff('calendar',spot,t.legs,iv,dte,width,false,1); const fc=sizeToCVaR(c1,vrp,regime,dntSig,label); t.contracts=fc; t.cvar=c1*fc; t.cvarPerUnit=c1; t.cvarBudget=CVAR_BUDGETS[label]??800; }
    }

    // 2. Diagonal — term structure trade with directional tilt.
    // Rationale: near IV > far IV (contango) → sell near premium, own far vega.
    // STRIKE FIX: both legs OTM so net delta is near-neutral or slightly directional.
    //   Near short: 75–85% P(OTM) OTM strike (same as before).
    //   Far long: one increment further OTM than the near short — NOT ATM.
    //   This keeps net delta from going negative on a bullish diagonal (or positive on bearish).
    // Bias label removed from rationale — the diagonal is a TS trade, not a directional trade.
    if (farIV && directional) {
      const side = bullish ? 'put' : 'call';
      const ss = findShortStrike(spot, iv, dte, side);
      if (ss) {
        // Far long: one standard width increment further OTM than near short.
        // Bullish put diagonal: long put BELOW near short (more OTM, less negative delta).
        // Bearish call diagonal: long call ABOVE near short (more OTM, less positive delta).
        const farLongK = bullish
          ? parseFloat(f(ss.k - width, 2))      // further OTM put (lower strike)
          : parseFloat(f(ss.k + width, 2));      // further OTM call (higher strike)
        const strikeWidth = Math.abs(farLongK - ss.k);
        const netDebit = Math.max(0.3, bsSpreadCredit(spot, farLongK, ss.k, farIV, dte+30, side));
        const maxDebit = strikeWidth * 0.40;
        // Net delta estimate: near short + far long (both OTM → net delta near zero, slight directional lean)
        const nearDelta = bullish ? +(1 - ss.potm/100).toFixed(2) : -(1 - ss.potm/100).toFixed(2);
        const netDeltaApprox = bullish ? '+small' : '−small';
        results.push({
          type:'diagonal', label, dte, farDTE:dte+30, dntSig, contracts,
          strat:'Diagonal spread',
          structure:`OTM ${side} near / OTM ${side} far (both legs OTM)`,
          expiry:`${dte} DTE (near) / ${dte+30} DTE (far)`,
          legs:[`Sell ${f$(ss.k)} ${side} (${dte} DTE)`, `Buy  ${f$(farLongK)} ${side} (${dte+30} DTE)`],
          potm: ss.potm.toFixed(0)+'%',
          premTarget:`~$${f(Math.min(netDebit,maxDebit),2)} db (≤ 40% of $${f(strikeWidth,2)} width)`,
          aggressive: ss.aggressive,
          credit:false,
          tsRatio: tsRatio.toFixed(3),
          netDelta: netDeltaApprox,
          rationale:`Term structure (TS ratio ${tsRatio.toFixed(3)}, near IV ${fp(iv)} > far IV ${fp(farIV)}) → sell near premium, own far vega. Both legs OTM: near short ${f$(ss.k)} at ${ss.potm.toFixed(0)}% P(OTM), far long ${f$(farLongK)} further OTM. ${bullish?'Bullish':'Bearish'} lean from bias (${biasObj.bull}/${biasObj.bear}) sets ${side} side.${ss.aggressive?' ⚠ '+ss.reason:''}`,
          regimeNote:`Regime: ${regime} vol. VRP ${vrp>=0?'+':''}${vrp.toFixed(1)}pts. Net Δ ≈ ${netDeltaApprox}.`,
          risk:`Adverse move through near short. Near IV collapse faster than far. Both legs OTM — max loss = net debit paid.`,
          score: Math.max(1,vrp) * (ss.aggressive?6:9),
        });
        { const t=results[results.length-1]; const c1=tradePayoff('diagonal',spot,t.legs,iv,dte,width,false,1); const fc=sizeToCVaR(c1,vrp,regime,dntSig,label); t.contracts=fc; t.cvar=c1*fc; t.cvarPerUnit=c1; t.cvarBudget=CVAR_BUDGETS[label]??800; }
      }
    }

    // 3. Iron condor — default PROCEED structure for all bias levels.
    // Symmetric when neutral. Leaning when directional: tighten the short strike on the
    // directional side (closer to ATM = higher premium) and widen the other (more room).
    // Both sides remain fully defined — no uncapped tail exposure.
    if (vrp > 0) {
      // Strike zones by directional lean
      // Tight side: 0.72–0.82 P(OTM) — short strike closer to ATM, collects more premium
      // Wide side:  0.78–0.88 P(OTM) — short strike further OTM, less premium but more room
      // Neutral:    both sides 0.75–0.85
      const tightZone = [0.72, 0.82];
      const wideZone  = [0.78, 0.88];
      const neutZone  = [0.75, 0.85];
      let callZone, putZone, leanLabel;
      if (directional && bullish) {
        // Bullish lean: tighten put side (collect more put premium = directional bet),
        //              widen call side (give room for upside move)
        putZone  = tightZone; callZone = wideZone;
        leanLabel = 'bullish lean — put side tightened';
      } else if (directional && !bullish) {
        // Bearish lean: tighten call side, widen put side
        callZone = tightZone; putZone  = wideZone;
        leanLabel = 'bearish lean — call side tightened';
      } else {
        putZone = neutZone; callZone = neutZone;
        leanLabel = 'neutral';
      }
      const callSS = findShortStrike(spot, iv, dte, 'call', callZone[0], callZone[1]);
      const putSS  = findShortStrike(spot, iv, dte, 'put',  putZone[0],  putZone[1]);
      if (callSS && putSS) {
        const callLong = parseFloat(f(callSS.k+width,2));
        const putLong  = parseFloat(f(putSS.k-width,2));
        const callCr = bsSpreadCredit(spot,callSS.k,callLong,iv,dte,'call');
        const putCr  = bsSpreadCredit(spot,putSS.k,putLong,iv,dte,'put');
        const total  = callCr+putCr;
        const tLo=width*0.20, tHi=width*0.35;
        // IC score: boosted above credit spread to reflect consistency preference.
        // Directional lean gets full score; neutral slightly lower (less conviction).
        const icScore = vrp * Math.min(callSS.potm,putSS.potm)/100 * (directional ? 16 : 14);
        results.push({
          type:'condor', label, dte, dntSig, contracts,
          strat: directional ? `${bullish?'Bullish':'Bearish'}-leaning iron condor` : 'Iron condor',
          structure:`${width}-wide wings both sides — ${leanLabel}`,
          expiry:`${dte} DTE (single expiration)`,
          legs:[
            `Sell ${f$(putSS.k)} put / Buy ${f$(putLong)} put`,
            `Sell ${f$(callSS.k)} call / Buy ${f$(callLong)} call`,
          ],
          potm:`Put ${putSS.potm.toFixed(0)}% / Call ${callSS.potm.toFixed(0)}%`,
          premTarget:`$${f(total,2)} total cr · target $${f(tLo,2)}–$${f(tHi,2)} per wing`,
          aggressive: callSS.aggressive||putSS.aggressive,
          credit:true,
          netDelta: directional ? (bullish ? '+small (put wing tighter)' : '−small (call wing tighter)') : '≈0 (symmetric)',
          rationale:`VRP +${vrp.toFixed(1)}pts → IC preferred for consistency (both sides defined). ${directional?`${bullish?'Bullish':'Bearish'} bias (${biasObj.bull}/${biasObj.bear}) — ${leanLabel}.`:'Neutral bias — symmetric strikes.'} Put ${putSS.potm.toFixed(0)}% / Call ${callSS.potm.toFixed(0)}% P(OTM). EM ±$${f(em,0)} at ${dte}D.`,
          regimeNote:`Regime: ${regime} vol. EM ±$${f(em,0)} at ${dte}D. Skew: ${skCond}.`,
          risk:'Directional break through either short strike. Max loss = width − credit. Both sides fully defined.',
          score: icScore,
        });
        { const t=results[results.length-1]; const c1=tradePayoff('condor',spot,t.legs,iv,dte,width,true,1); const fc=sizeToCVaR(c1,vrp,regime,dntSig,label); t.contracts=fc; t.cvar=c1*fc; t.cvarPerUnit=c1; t.cvarBudget=CVAR_BUDGETS[label]??800; }
      }
    }

    // 4. BWB — high conviction + elevated skew only (asymmetric tail, use sparingly)
    if (skCond==='Elevated' && Math.abs(biasObj.bull-biasObj.bear)>30) {
      const side = bullish ? 'put' : 'call';
      const body = findShortStrike(spot, iv, dte, side, 0.68, 0.84);
      if (body) {
        const nearK = side==='put' ? parseFloat(f(body.k+width,2)) : parseFloat(f(body.k-width,2));
        const skipK = side==='put' ? parseFloat(f(body.k-width*2,2)): parseFloat(f(body.k+width*2,2));
        const cr = Math.max(0, bsSpreadCredit(spot,nearK,body.k,iv,dte,side)*2
                           - bsSpreadCredit(spot,body.k,skipK,iv,dte,side));
        const tLo=width*0.25, tHi=width*0.33;
        results.push({
          type:'bwb', label, dte, dntSig, contracts,
          strat:'Broken-wing butterfly',
          structure:`${side.toUpperCase()} BWB ×1/×2/×1 skip ${bullish?'downside':'upside'} wing (single expiration)`,
          expiry:`${dte} DTE (single expiration)`,
          legs:[
            `Buy  ${f$(nearK)} ${side} ×1`,
            `Sell ${f$(body.k)} ${side} ×2`,
            `Buy  ${f$(skipK)} ${side} ×1 (skip wing)`,
          ],
          potm: body.potm.toFixed(0)+'%',
          premTarget:`$${f(cr,2)} cr (target $${f(tLo,2)}–$${f(tHi,2)} per unit)`,
          aggressive: body.aggressive,
          credit:true,
          rationale:`Elevated ${side} skew (${skCond}) + ${bullish?'bullish':'bearish'} bias (${biasObj.bull}/${biasObj.bear}) → BWB nets credit while expressing direction. Body ${f$(body.k)} at ${body.potm.toFixed(0)}% P(OTM). Skip wing on ${bullish?'downside':'upside'}.${body.aggressive?' ⚠ '+body.reason:''}`,
          regimeNote:`Regime: ${regime} vol. Skew ${skCond}.`,
          risk:`Move through body doubles short. ${bullish?'Downside':'Upside'} uncapped beyond skip wing.`,
          score: Math.max(1,vrp) * body.potm/100 * 12,
        });
        { const t=results[results.length-1]; const c1=tradePayoff('bwb',spot,t.legs,iv,dte,width,true,1); const fc=sizeToCVaR(c1,vrp,regime,dntSig,label); t.contracts=fc; t.cvar=c1*fc; t.cvarPerUnit=c1; t.cvarBudget=CVAR_BUDGETS[label]??800; }
      }
    }

    // 5. Credit spread — generated for ALL PROCEED assets regardless of other conditions
    //    This is the baseline guaranteed trade for every PROCEED asset × DTE
    {
      const creditSide = bullish ? 'put' : 'call';
      const ss = findShortStrike(spot, iv, dte, creditSide);
      if (ss) {
        const shortK = ss.k;
        const longK  = creditSide==='put' ? parseFloat(f(shortK-width,2)) : parseFloat(f(shortK+width,2));
        const cr = bsSpreadCredit(spot,shortK,longK,iv,dte,creditSide);
        const tLo=width*0.25, tHi=width*0.33;
        const premOk = cr>=tLo;
        const outsideEM = creditSide==='put' ? shortK<spot-em : shortK>spot+em;
        const aligned = skewAligned(creditSide, skCond);
        const aggr = ss.aggressive || !outsideEM;
        results.push({
          type:'credit', label, dte, dntSig, contracts: Math.max(1,contracts),
          strat: creditSide==='put'?'Bull put spread':'Bear call spread',
          structure:`${width}-wide ${creditSide==='put'?'bull put':'bear call'} (single expiration)`,
          expiry:`${dte} DTE (single expiration)`,
          legs:[`Sell ${f$(shortK)} ${creditSide}`, `Buy  ${f$(longK)} ${creditSide}`],
          potm: ss.potm.toFixed(0)+'%',
          premTarget:`$${f(cr,2)} cr · target $${f(tLo,2)}–$${f(tHi,2)} (${premOk?'✓ within range':'⚠ below 25% floor'})`,
          aggressive: aggr,
          credit:true,
          rationale:`${vrp>=0?'VRP +'+vrp.toFixed(1)+'pts — premium elevated vs RV.':'IV near RV — modest premium.'} ${bullish?'Bullish':'Bearish'} bias → ${creditSide} spread. Strike ${f$(shortK)} at ${ss.potm.toFixed(0)}% P(OTM), ${outsideEM?'outside':'inside'} ${dte}D EM (±$${f(em,0)}). ${aligned?'Skew '+skCond+' aligns.':'Neutral skew.'} Credit $${f(cr,2)} vs $${f(tLo,2)}–$${f(tHi,2)} target.${ss.aggressive?' ⚠ '+ss.reason:''}${!outsideEM?' ⚠ Aggressive: strike inside EM.':''}`,
          regimeNote:`Regime: ${regime} vol. EM ±$${f(em,0)} at ${dte}D. Skew: ${skCond}.`,
          risk:`Gap ${creditSide==='put'?'below':'above'} ${f$(shortK)}. Max loss $${f(width-Math.max(0,cr),2)} per spread.`,
          score: Math.max(0.5,vrp) * ss.potm/100 * (aligned?7:5) * (outsideEM?1:0.7),
        });
        { const t=results[results.length-1]; const c1=tradePayoff('credit',spot,t.legs,iv,dte,width,true,1); const fc=sizeToCVaR(c1,vrp,regime,dntSig,label); t.contracts=fc; t.cvar=c1*fc; t.cvarPerUnit=c1; t.cvarBudget=CVAR_BUDGETS[label]??800; }
      }
    }

    return results;
  }

  // ── Data-driven directional bias ──
  // Uses price momentum (5D vs 20D close), OI skew, VIX trend, DXY, yield direction.
  // Output: bull/bear as % summing to 100, conf as 'Low'|'Medium'|'High'

  function calcBias(closes, pcRatio, skew, extraSignals, rv, asset) {
    // closes: array oldest→newest (from rvData which reverses to oldest-first)
    // rv: annualized realized vol (decimal) for overextension z-score calculation
    // asset: 'spy' | 'gld' | 'tlt' — used for asset-specific PC ratio baselines
    // Start at 50/50 and apply signals as adjustments
    let score = 0; // positive = bullish, negative = bearish
    const signals = [];

    if (closes && closes.length >= 6) {
      // 5-day momentum: last close vs close 5 days ago
      // Threshold raised 1%→2% to filter choppy/mean-reverting noise
      const mom5 = (closes.at(-1) - closes.at(-6)) / closes.at(-6);
      let mom5Score = 0;
      if (mom5 > 0.02)       { mom5Score = +15; signals.push('5D momentum +'); }
      else if (mom5 < -0.02) { mom5Score = -15; signals.push('5D momentum −'); }

      // Signal B: Momentum exhaustion check
      // If 5D momentum fired bearish but the most recent 2-day return is positive
      // (move already stabilizing), halve the momentum penalty.
      // Symmetric: if momentum fired bullish but 2-day return is negative, halve the bonus.
      if (mom5Score !== 0 && closes.length >= 3) {
        const ret2d = (closes.at(-1) - closes.at(-3)) / closes.at(-3);
        if (mom5Score < 0 && ret2d > 0) {
          mom5Score = Math.round(mom5Score / 2);
          signals.push('momentum exhaustion (stabilizing)');
        } else if (mom5Score > 0 && ret2d < 0) {
          mom5Score = Math.round(mom5Score / 2);
          signals.push('momentum exhaustion (fading)');
        }
      }
      score += mom5Score;

      // 20-day trend: last close vs 20-day SMA
      // Threshold raised 0.5%→1% to avoid firing on near-ATM price action
      if (closes.length >= 21) {
        const sma20 = closes.slice(-21,-1).reduce((s,c)=>s+c,0) / 20;
        if (closes.at(-1) > sma20 * 1.010)       { score += 10; signals.push('above 20D SMA'); }
        else if (closes.at(-1) < sma20 * 0.990)  { score -= 10; signals.push('below 20D SMA'); }

        // Signal A: Overextension detector
        // Measures how far price is from SMA20 in units of normal vol-adjusted range.
        // extension = (price - SMA20) / (20D RV × price × sqrt(20/252))
        // Fires when price is >1.5σ from SMA — indicates likely mean-reversion candidate.
        // Asymmetric: downside overshoots snap back faster → stronger bullish signal.
        if (rv && rv > 0) {
          const price = closes.at(-1);
          const normalRange = rv * price * Math.sqrt(20/252);
          const extension = normalRange > 0 ? (price - sma20) / normalRange : 0;
          if (extension < -1.5) {
            score += 10;
            signals.push(`overextended low (${extension.toFixed(1)}σ)`);
          } else if (extension > 1.5) {
            score -= 8;
            signals.push(`overextended high (+${extension.toFixed(1)}σ)`);
          }
        }
      }
    }

    // Put/call OI ratio — asset-specific z-score vs structural baseline
    // Fixed thresholds fail because each asset has different structural PC ratios:
    //   SPY: institutional hedging drives structurally high put demand (~1.50 mean)
    //   GLD: different hedger composition, lower put bias (~0.85 mean)
    //   TLT: rate-driven, intermediate (~1.10 mean)
    // Signal scales continuously with σ deviation: max ±10-12pts at ±2σ
    const PC_BASELINES = {
      spy: { mean: 1.50, std: 0.35 },
      gld: { mean: 0.85, std: 0.25 },
      tlt: { mean: 1.10, std: 0.30 },
    };
    if (pcRatio && pcRatio !== '—') {
      const pc = parseFloat(pcRatio);
      const baseline = PC_BASELINES[asset] ?? PC_BASELINES.spy;
      const zScore = (pc - baseline.mean) / baseline.std;
      if (zScore > 1.0) {
        // Put-heavy vs structural norm → bearish signal, scaled by σ, max −12 at 2σ
        const adj = -Math.round(Math.min(12, 6 * zScore));
        score += adj;
        signals.push(`put OI elevated (+${zScore.toFixed(1)}σ)`);
      } else if (zScore < -1.0) {
        // Call-heavy vs structural norm → bullish signal, scaled by σ, max +10 at −2σ
        const adj = Math.round(Math.min(10, 5 * Math.abs(zScore)));
        score += adj;
        signals.push(`call OI elevated (${zScore.toFixed(1)}σ)`);
      }
    }

    // ── Skew signal ──
    // Elevated put skew and inverted skew are treated differently:
    //   Put skew: unconditional bearish signal (market paying for downside protection)
    //   Inverted skew: conditional — only bullish when confirmed by trend + dealer positioning.
    //     Without confirmation it's likely complacency or late-stage exhaustion, not bullish conviction.

    // Pre-compute context needed for inverted skew confirmation
    let inUptrend = false;
    const overextendedLow  = closes && closes.length >= 21 && rv && rv > 0
      ? (() => {
          const sma20 = closes.slice(-21,-1).reduce((s,c)=>s+c,0)/20;
          const normalRange = rv * closes.at(-1) * Math.sqrt(20/252);
          return normalRange > 0 ? (closes.at(-1) - sma20) / normalRange < -1.5 : false;
        })()
      : false;
    const overextendedHigh = closes && closes.length >= 21 && rv && rv > 0
      ? (() => {
          const sma20 = closes.slice(-21,-1).reduce((s,c)=>s+c,0)/20;
          const normalRange = rv * closes.at(-1) * Math.sqrt(20/252);
          return normalRange > 0 ? (closes.at(-1) - sma20) / normalRange > 1.5 : false;
        })()
      : false;
    if (closes && closes.length >= 21) {
      const sma20 = closes.slice(-21,-1).reduce((s,c)=>s+c,0)/20;
      inUptrend = closes.at(-1) > sma20 * 1.010;
    }

    let skewAdj = 0;
    if (skew != null) {

      // ── Elevated put skew ──
      // SPY / GLD: put skew = bearish sentiment, market paying for downside protection → −12.
      // TLT: put skew = rational hedging against yield rises in a rate-sensitive instrument.
      //   Not intrinsically bearish — often reflects institutional duration hedging rather than
      //   directional conviction. Softer penalty (−5), no overbought amplification.
      if (skew > 0.05) {
        if (asset === 'tlt') {
          skewAdj = -5;
          signals.push('elevated put skew (rate hedge — softened)');
          // Oversold offset still applies for TLT: put skew into a bond selloff = mean-reversion setup
          if (overextendedLow) {
            skewAdj = Math.round(skewAdj * 0.5);
            signals.push('skew/overextension offset (bond oversold)');
          }
          // No overbought amplification for TLT — put skew at high bond prices is just prudent hedging
        } else {
          skewAdj = -12;
          signals.push('elevated put skew');
          // Interaction: put skew + oversold → partially offset (strong put-selling setup)
          if (overextendedLow) {
            skewAdj = Math.round(skewAdj * 0.5);
            signals.push('skew/overextension offset (put-selling setup)');
          } else if (overextendedHigh) {
            // Put skew + overbought → compounds bearish read
            skewAdj = Math.round(skewAdj * 1.3);
            signals.push('skew/overextension compound (bearish)');
          }
        }

      // ── Inverted skew ──
      // TLT: inverted skew means OTM calls (lower yield) bid up = flight-to-quality demand.
      //   This is a bond-specific bullish signal (bonds up, yields down) driven by risk-off
      //   flows, not an equity squeeze setup. Treat as unconditional bullish — no equity-style
      //   confirmation logic applies. Magnitude modest (+8) since it can also reflect rate rally
      //   expectations that are already partially priced.
      //
      // SPY / GLD: conditional scoring — only bullish when confirmed by trend + dealer positioning.
      //   Without confirmation it's likely complacency or late-stage exhaustion, not bullish conviction.
      } else if (skew < -0.01) {
        if (asset === 'tlt') {
          // TLT inverted skew = calls bid up = market pricing yield decline = bond bullish
          skewAdj = +8;
          signals.push('inverted skew (flight-to-quality demand)');
        } else {
          // SPY / GLD — confirmation-required framework
          const gex = extraSignals?.gexScore ?? null;
          const dealerShortGamma = gex !== null && gex <= -20;
          const dealerLongGamma  = gex !== null && gex >= +20;
          const confirmCount = (inUptrend ? 1 : 0) + (dealerShortGamma ? 1 : 0);

          if (overextendedHigh) {
            // Late-stage exhaustion: inverted skew at overbought levels → bearish fade signal
            skewAdj = -4;
            signals.push('inverted skew (late-stage exhaustion — bearish)');
          } else if (dealerLongGamma && !inUptrend) {
            // Long gamma + no trend + inverted skew = complacency / suppressed move
            skewAdj = +2;
            signals.push('inverted skew (complacency — muted, dealer long gamma)');
          } else if (confirmCount === 0) {
            // No confirmation — treat as noise, very weak signal
            skewAdj = +3;
            signals.push('inverted skew (unconfirmed — weak)');
          } else if (confirmCount === 1) {
            // One confirmation — moderate bullish
            skewAdj = +6;
            const conf1 = inUptrend ? 'uptrend' : 'dealer short gamma';
            signals.push(`inverted skew + ${conf1}`);
          } else {
            // Both confirmations: uptrend + dealer short gamma → squeeze setup, full signal
            skewAdj = +14;
            signals.push('inverted skew + uptrend + dealer short gamma (squeeze setup)');
          }
        }
      }
    }
    score += skewAdj;

    // Asset-specific extra signals
    if (extraSignals) {
      // SPY: VIX momentum — continuous scaling with move magnitude.
      // Noise filter: <5% ignored. Asymmetric caps: rising penalizes more than falling rewards.
      // Rising: 5–10% → −6, 10–20% → −10, 20–35% → −14, >35% → −18 cap.
      // Falling: 5–10% → +5, 10–20% → +8, 20–35% → +11, >35% → +14 cap.
      // Conflict check: VIX falling while VVIX rising = second leg risk.
      //   Post-spike mean reversion with nervous options market underneath.
      //   Suppress the bullish VIX signal and replace with caution score.
      if (extraSignals.vixMomPct != null) {
        const vm = extraSignals.vixMomPct;
        const absVm = Math.abs(vm);
        const vvmp = extraSignals.vvixMomPct ?? null;
        const vvixRising = vvmp !== null && vvmp > 5;
        const vvixSpiking = vvmp !== null && vvmp > 10;
        if (absVm >= 5) {
          if (vm > 0) {
            // Rising VIX — VVIX amplification already handled in VVIX block below
            const vixMomAdj = absVm >= 35 ? -18
                            : absVm >= 20 ? -14
                            : absVm >= 10 ? -10
