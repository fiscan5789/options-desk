<style>

<body>
<div class="app" id="root"></div>
<script>
const KEY = '8YxfViBiNRATU2HQwZTSUaJatTsFI0yh';
// Shared spot prices used by optionChain() to anchor the strike window.
// Populated in runBriefing() before chain fetches execute.
let _chainSpots = {};

const SESSIONS = [
  { id:'pre',  label:'Pre-market',  hhmm:'08:00', short:'8 AM',  startM:480,  endM:780  },
  { id:'mid',  label:'Mid-session', hhmm:'13:00', short:'1 PM',  startM:780,  endM:1020 },
  { id:'post', label:'After-close', hhmm:'17:00', short:'5 PM',  startM:1020, endM:1320 },
];

let S = { sid:null, tab:'overview', briefs:{}, loading:false, errs:[], warns:[], now:new Date() };

/* ── Time ── */
const toET  = d => new Date(d.toLocaleString('en-US',{timeZone:'America/New_York'}));
const ymd   = d => d.toISOString().slice(0,10);
const dBack = n => { const d=new Date(toET(new Date())); d.setDate(d.getDate()-n); return ymd(d); };

function isMarketHours() {
  const et=toET(new Date()), h=et.getHours(), m=et.getMinutes(), day=et.getDay();
  if (day===0||day===6) return false;
  return (h*60+m)>=570 && (h*60+m)<960;
}
function sessStatus(s, now) {
  const et=toET(now), m=et.getHours()*60+et.getMinutes();
  if (m>=s.startM&&m<s.endM) return 'on';
  if (m<s.startM&&s.startM-m<=30) return 'nxt';
  return '';
}
function countdown(now) {
  const et=toET(now), cur=et.getHours()*60+et.getMinutes(), sec=et.getSeconds();
  for (const s of SESSIONS) {
    if (cur<s.startM) {
      const d=(s.startM-cur)*60-sec, h=Math.floor(d/3600), m=Math.floor((d%3600)/60), s2=d%60;
      return `next in ${h?h+'h ':''}${m}m ${String(s2).padStart(2,'0')}s`;
    }
  }
  const d=(1440-cur+480)*60-sec;
  return `8AM in ${Math.floor(d/3600)}h ${Math.floor((d%3600)/60)}m`;
}

/* ── API ── */
async function apiFetch(url, lbl) {
  const r=await fetch(url);
  const j=await r.json().catch(()=>({}));
  if (!r.ok||j.status==='ERROR') throw new Error(`${lbl}: ${j.error||j.message||r.status}`);
  return j;
}

async function stockBarsLong(ticker, days=35) {
  const to=ymd(toET(new Date())), from=dBack(days);
  const j=await apiFetch(
    `https://api.polygon.io/v2/aggs/ticker/${ticker}/range/1/day/${from}/${to}?adjusted=true&sort=desc&limit=40&apiKey=${KEY}`,
    `rv-bars/${ticker}`);
  return (j.results??[]).reverse();
}

async function stockPrev(ticker) {
  const j=await apiFetch(
    `https://api.polygon.io/v2/aggs/ticker/${ticker}/prev?adjusted=true&apiKey=${KEY}`,
    `prev/${ticker}`);
  return j.results?.[0]??null;
}

async function indexBars(sym, days=5) {
  try {
    const to=ymd(toET(new Date())), from=dBack(days);
    const j=await apiFetch(
      `https://api.polygon.io/v2/aggs/ticker/${encodeURIComponent(sym)}/range/1/day/${from}/${to}?sort=desc&limit=5&apiKey=${KEY}`,
      `idx/${sym}`);
    return j.results??[];
  } catch { return []; }
}

async function tYield() {
  try {
    const j=await apiFetch(`https://api.polygon.io/v1/indicators/treasury/yield?tenor=10Y&limit=1&apiKey=${KEY}`,`yield`);
    return j.results?.values?.[0]?.value??null;
  } catch { return null; }
}

// Options chain with configurable DTE window
async function optionChain(ticker, dteLow, dteHigh) {
  // Build expiration date strings by working entirely in ET calendar space.
  // Avoid all epoch-ms arithmetic which causes UTC/ET day boundary bugs.
  function etDatePlusDays(n) {
    const et = toET(new Date());
    // Set to noon ET to avoid any DST edge cases, then add n days
    et.setHours(12, 0, 0, 0);
    et.setDate(et.getDate() + n);
    const y = et.getFullYear();
    const m = String(et.getMonth()+1).padStart(2,'0');
    const d = String(et.getDate()).padStart(2,'0');
    return y+'-'+m+'-'+d;
  }
  const from = etDatePlusDays(dteLow);
  const to   = etDatePlusDays(dteHigh);
  // Get current spot from the most recent stock bar (passed via closure from runBriefing)
  // We use a wide ±20% window around spot to capture all realistic strikes
  // Use ±10% strike window around last known spot.
  // analyseChain will then refine spot using underlying_asset.price from the contracts.
  const spotRef = _chainSpots[ticker] ?? 0;
  let results;
  if (spotRef > 0) {
    const lo = (spotRef * 0.90).toFixed(2);
    const hi = (spotRef * 1.10).toFixed(2);
    const j = await apiFetch(
      `https://api.polygon.io/v3/snapshot/options/${ticker}`
      + `?expiration_date.gte=${from}&expiration_date.lte=${to}`
      + `&strike_price.gte=${lo}&strike_price.lte=${hi}`
      + `&limit=250&sort=strike_price&order=asc&apiKey=${KEY}`,
      `chain/${ticker}/${dteLow}-${dteHigh}d`
    );
    results = j.results??[];
    // If Polygon returns underlying_asset.price on any contract, use it to refine
    // _chainSpots so the next run (and analyseChain) uses the live price
    const liveSpot = results.find(c=>c.underlying_asset?.price>0)?.underlying_asset?.price;
    if (liveSpot) _chainSpots[ticker] = liveSpot;
  } else {
    const j = await apiFetch(
      `https://api.polygon.io/v3/snapshot/options/${ticker}?expiration_date.gte=${from}&expiration_date.lte=${to}&limit=250&sort=strike_price&order=asc&apiKey=${KEY}`,
      `chain/${ticker}/${dteLow}-${dteHigh}d`
    );
    results = j.results??[];
  }
  results._dateFrom = from;
  results._dateTo   = to;
  return results;
}

/* ── RV Calculator ── */
function calcRV(bars, window=20) {
  if (!bars||bars.length<window+1) return null;
  const recent=bars.slice(-(window+1));
  const closes=recent.map(b=>b.c).filter(c=>c>0);
  if (closes.length<window+1) return null;
  const returns=[];
  for (let i=1;i<closes.length;i++) returns.push(Math.log(closes[i]/closes[i-1]));
  if (returns.length<window) return null;
  const mean=returns.reduce((s,r)=>s+r,0)/returns.length;
  const variance=returns.reduce((s,r)=>s+Math.pow(r-mean,2),0)/returns.length;
  return { rv:Math.sqrt(variance*252), returns, nDays:returns.length, closes };
}

/* ── Chain analysis ── */
function analyseChain(contracts, spot, dateFrom, dateTo) {
  if (!contracts.length||!spot) return null;
  // Prefer live spot from underlying_asset.price embedded in the chain response.
  // This is more accurate than the previous-day close passed in as spot.
  const chainSpot = contracts.find(c=>c.underlying_asset?.price>0)?.underlying_asset?.price;
  const liveSpot = chainSpot ?? spot;
  // Sanity guard: discard contracts whose strike is >20% from live spot.
  const plausible=contracts.filter(c=>{const k=c.details?.strike_price??0;return k>0&&Math.abs(k-liveSpot)/liveSpot<0.20;});
  if (plausible.length<4) return null;
  // Replace passed-in spot with the live value for all downstream calculations
  spot = liveSpot;
  const calls=plausible.filter(c=>c.details?.contract_type==='call');
  const puts =plausible.filter(c=>c.details?.contract_type==='put');
  if (!calls.length||!puts.length) return null;

  // Find the single strike nearest to spot, then get the call and put AT THAT SAME STRIKE.
  // This prevents the call and put being selected from different strikes, which inflates
  // the ATM IV average when the chain has wide strike spacing (e.g. GLD at $5-$10 intervals).
  const allStrikes = [...new Set(contracts.map(c=>c.details?.strike_price).filter(Boolean))].sort((a,b)=>a-b);
  const atmStrikeVal = allStrikes.reduce((a,b)=>Math.abs(a-spot)<=Math.abs(b-spot)?a:b, allStrikes[0]??spot);
  const atmC = calls.find(c=>c.details?.strike_price===atmStrikeVal) ?? calls.reduce((a,b)=>Math.abs((a.details?.strike_price??0)-spot)<=Math.abs((b.details?.strike_price??0)-spot)?a:b);
  const atmP = puts.find( c=>c.details?.strike_price===atmStrikeVal) ?? puts.reduce( (a,b)=>Math.abs((a.details?.strike_price??0)-spot)<=Math.abs((b.details?.strike_price??0)-spot)?a:b);
  // Average call and put IV at the same strike for a clean ATM mid
  const atmCallIV = atmC?.implied_volatility??0;
  const atmPutIV  = atmP?.implied_volatility??0;
  const atmIV = (atmCallIV>0 && atmPutIV>0) ? (atmCallIV+atmPutIV)/2 : (atmCallIV||atmPutIV||0);

  const expDate=atmC?.details?.expiration_date;
  const dte=expDate?Math.max(1,Math.round((new Date(expDate)-toET(new Date()))/86400000)):15;

  // 25Δ with correct sign convention + BS fallback
  function find25IV(arr, targetDelta) {
    const withG=arr.filter(c=>c.greeks?.delta!=null);
    if (withG.length>=3) {
      const best=withG.reduce((a,b)=>{
        const da=Math.abs(a.greeks.delta-targetDelta), db=Math.abs(b.greeks.delta-targetDelta);
        return da<=db?a:b;
      });
      return best?.implied_volatility??null;
    }
    if (!atmIV||!dte) return null;
    const T=dte/365, d1=targetDelta>0?0.674:-0.674;
    const theorK=spot*Math.exp(-d1*atmIV*Math.sqrt(T));
    const best=arr.reduce((a,b)=>
      Math.abs((a.details?.strike_price??0)-theorK)<=Math.abs((b.details?.strike_price??0)-theorK)?a:b);
    return best?.implied_volatility??null;
  }

  const iv25C=find25IV(calls,+0.25)??0;
  const iv25P=find25IV(puts, -0.25)??0;
  const skew25=(iv25P&&iv25C)?iv25P-iv25C:null;

  const callOI=calls.reduce((s,c)=>s+(c.open_interest??0),0);
  const putOI =puts.reduce( (s,c)=>s+(c.open_interest??0),0);
  const pcRatio=callOI?(putOI/callOI).toFixed(2):'—';

  const walls=[...contracts].sort((a,b)=>(b.open_interest??0)-(a.open_interest??0)).slice(0,5)
    .map(c=>({strike:c.details?.strike_price,type:c.details?.contract_type,oi:c.open_interest??0}));

  const midOf=c=>c?.day?.close??0;
  const straddleMid=midOf(atmC)+midOf(atmP);
  const greeksLive=calls.filter(c=>c.greeks?.delta!=null).length>=3;

  // ATM strike for calendar leg reference
  const atmStrike=atmStrikeVal??atmC?.details?.strike_price??spot;

  const debug={atmStrikeUsed:atmStrikeVal,spot:spot,atmCallIV_raw:atmC?.implied_volatility??null,atmPutIV_raw:atmP?.implied_volatility??null,atmCallTicker:atmC?.ticker??null,atmPutTicker:atmP?.ticker??null,atmCallDelta:atmC?.greeks?.delta??null,atmPutDelta:atmP?.greeks?.delta??null,contractsInWindow:plausible.length,allStrikesRaw:allStrikes.slice(0,5),dateFrom,dateTo};
  return {atmIV,iv25C,iv25P,skew25,callOI,putOI,pcRatio,walls,straddleMid,dte,greeksLive,atmStrike,debug};
}

/* ── Term structure analysis ── */
// tsRatio = nearIV / farIV
// > 1.05 → contango (near rich vs far)  → calendar/diagonal favored
// < 0.95 → backwardation (far rich)     → vertical spreads favored
// 0.95–1.05 → flat → slight lean vertical
function termStructureRegime(tsRatio) {
  if (!tsRatio) return { label:'Unknown', regime:'flat', source:'none' };
  if (tsRatio > 1.10) return { label:'Steep contango', regime:'contango', ratio:tsRatio };
  if (tsRatio > 1.05) return { label:'Mild contango',  regime:'contango', ratio:tsRatio };
  if (tsRatio < 0.92) return { label:'Backwardation',  regime:'backwardation', ratio:tsRatio };
  return { label:'Flat', regime:'flat', ratio:tsRatio };
}

/* ── Strategy selection ── */
// Returns { type, label, rationale } per asset
// Types: 'credit_spread' | 'calendar' | 'diagonal' | 'debit_spread'
function selectStrategy(asset, { vrp, tsInfo, skewCond, volReg, changePct, dnt }) {
  const vrpPos = vrp > 0;
  const vrpStrong = vrp > 3;       // IV meaningfully above RV
  const vrpNeg  = vrp < -1;
  const isDirectional = Math.abs(changePct) > 0.5;
  const tsRegime = tsInfo?.regime ?? 'flat';

  // No short premium if VRP negative
  if (vrpNeg || dnt==='HOLD') {
    return {
      type:'debit_spread',
      label:'Debit spread',
      rationale:`Negative VRP (IV < RV) — avoid selling vol. Use debit structure to limit short premium exposure.`
    };
  }

  // Contango: near IV > far IV → calendars and diagonals capture theta differential
  if (tsRegime==='contango' && vrpPos) {
    if (isDirectional) {
      return {
        type:'diagonal',
        label:'Diagonal spread',
        rationale:`Near IV rich vs far IV (ratio ${tsInfo?.ratio?.toFixed(2)}) + directional bias → sell rich near-term strike, buy far-term ATM for vega exposure.`
      };
    }
    return {
      type:'calendar',
      label:'Calendar spread',
      rationale:`Near IV rich vs far IV (ratio ${tsInfo?.ratio?.toFixed(2)}) + range-bound + positive VRP → sell near-term decay, own far-term gamma. Classic calendar setup.`
    };
  }

  // Backwardation or flat: far IV ≥ near IV → vertical spreads capture outright premium
  if (tsRegime==='backwardation' || tsRegime==='flat') {
    if (vrpStrong) {
      return {
        type:'credit_spread',
        label:'Credit spread',
        rationale:`${tsRegime==='backwardation'?'Backwardation (far IV elevated)':'Flat term structure'} + strong positive VRP (${vrp.toFixed(1)}pts) → collect outright premium via vertical spread.`
      };
    }
    return {
      type:'credit_spread',
      label:'Credit spread',
      rationale:`Flat term structure + positive VRP → vertical spread preferred over calendar. Near and far IV not sufficiently differentiated to justify time spread.`
    };
  }

  return { type:'credit_spread', label:'Credit spread', rationale:'Default: flat regime, positive VRP.' };
}

/* ── Math ── */
function ndCDF(x){
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const sg=x<0?-1:1; x=Math.abs(x);
  const t=1/(1+p*x),y=1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);
  return 0.5*(1+sg*y);
}
function pOTM(spot,strike,iv,dte,type='put'){
  if(!iv||!dte) return 0.78;
  const t=dte/365,d2=(Math.log(spot/strike)-0.5*iv*iv*t)/(iv*Math.sqrt(t));
  return type==='put'?ndCDF(d2):(1-ndCDF(d2));
}
function emCalc(spot,iv,dte){ return spot*(iv||0)*Math.sqrt(dte/365); }

/* ── Formatting ── */
const f  =(n,d=2)=>isNaN(n)||n==null?'—':Number(n).toFixed(d);
const f$ =n=>'$'+f(n);
const fp =(n,d=1)=>(!n&&n!==0)||isNaN(n)?'—':(n*100).toFixed(d)+'%';
const sgn=n=>parseFloat(n)>=0?'+':'';
const cc =n=>parseFloat(n)>=0?'up':'dn';

/* ── Build briefing ── */
function buildBriefing({stocks,rvData,indices,chainsNear,chainsFar,tnx10}) {
  const sp=stocks.SPY, gl=stocks.GLD, tl=stocks.TLT;
  const spyP2=sp?.price??0, gldP2=gl?.price??0, tltP2=tl?.price??0;
  const spyPr=sp?.prevClose??spyP2, gldPr=gl?.prevClose??gldP2, tltPr=tl?.prevClose??tltP2;
  const chg=(c,p)=>p?{ch:f(c-p),pct:f((c-p)/p*100)}:{ch:'0.00',pct:'0.00'};

  const CA=chainsNear.SPY, CB=chainsNear.GLD, CC=chainsNear.TLT;
  const FA=chainsFar.SPY,  FB=chainsFar.GLD,  FC=chainsFar.TLT;

  // Use live spot from underlying_asset.price (captured in _chainSpots by optionChain).
  // This replaces the stale previous-day bar close for all price displays and calcs.
  if (_chainSpots.SPY > 0) { stocks.SPY.price = _chainSpots.SPY; }
  if (_chainSpots.GLD > 0) { stocks.GLD.price = _chainSpots.GLD; }
  if (_chainSpots.TLT > 0) { stocks.TLT.price = _chainSpots.TLT; }
  const spyP2=stocks.SPY.price, gldP2=stocks.GLD.price, tltP2=stocks.TLT.price;

  const vixFallback=(indices.vix??22)/100;
  const spyIV=CA?.atmIV||vixFallback;
  const gldIV=CB?.atmIV||0.24;
  const tltIV=CC?.atmIV||0.175;

  // Far IV for term structure
  const spyFarIV=FA?.atmIV||null;
  const gldFarIV=FB?.atmIV||null;
  const tltFarIV=FC?.atmIV||null;

  // Term structure ratios (near/far)
  // If chain-based ratio unavailable, fall back to VIX/VIX3M
  const vix3m = indices.vix3m ?? null;
  const vixRatioFallback = (indices.vix && vix3m) ? indices.vix/vix3m : null;

  const mkTsRatio = (nearIV, farIV, fallback) => {
    if (nearIV && farIV && farIV>0) return { ratio:nearIV/farIV, source:'chain' };
    if (fallback) return { ratio:fallback, source:'VIX/VIX3M' };
    return null;
  };

  const spyTsRaw = mkTsRatio(spyIV, spyFarIV, vixRatioFallback);
  const gldTsRaw = mkTsRatio(gldIV, gldFarIV, null);
  const tltTsRaw = mkTsRatio(tltIV, tltFarIV, null);

  const spyTs = spyTsRaw ? { ...termStructureRegime(spyTsRaw.ratio), source:spyTsRaw.source, nearIV:spyIV, farIV:spyFarIV } : null;
  const gldTs = gldTsRaw ? { ...termStructureRegime(gldTsRaw.ratio), source:gldTsRaw.source, nearIV:gldIV, farIV:gldFarIV } : null;
  const tltTs = tltTsRaw ? { ...termStructureRegime(tltTsRaw.ratio), source:tltTsRaw.source, nearIV:tltIV, farIV:tltFarIV } : null;

  // Live RV
  const FBRV={spy:0.185,gld:0.28,tlt:0.14};
  const spyRV=rvData.SPY?.rv??FBRV.spy;
  const gldRV=rvData.GLD?.rv??FBRV.gld;
  const tltRV=rvData.TLT?.rv??FBRV.tlt;
  const rvLive=!!(rvData.SPY?.rv&&rvData.GLD?.rv&&rvData.TLT?.rv);

  const spyVRP=((spyIV-spyRV)*100);
  const gldVRP=((gldIV-gldRV)*100);
  const tltVRP=((tltIV-tltRV)*100);

  const vix  =indices.vix  ??spyIV*100;
  const vvix =indices.vvix ??94;
  const move =indices.move ??85;
  const dxy  =indices.dxy  ??99.6;
  const tnx  =tnx10??indices.tnx??4.34;
  const vixPct =Math.round(Math.max(0,Math.min(100,(vix-13.38)/(60.13-13.38)*100)));
  const vvixPct=Math.round(Math.max(0,Math.min(100,(vvix-60)/(180-60)*100)));

  const skewCond=s=>{if(s==null)return'N/A';return s>0.04?'Elevated':s<-0.01?'Inverted':'Normal';};
  const volR=iv=>iv>0.30?'Expansion':iv>0.18?'Transition':'Compression';
  const moveReg=move>110?'Expansion':move>80?'Transition':'Compression';
  const vixReg =vix>30?'Expansion':vix>18?'Transition':'Compression';
  const regime =vix>30||move>120?'High':vix>20||move>90?'Moderate':'Low';

  const dnt={
    spy:spyVRP<0||vix>28?'HOLD':'PROCEED',
    gld:gldVRP<0?'HOLD':'PROCEED',
    tlt:move>120?'HOLD':'PROCEED',
  };

  // Strategy selection per asset
  const changes={spy:chg(spyP2,spyPr),gld:chg(gldP2,gldPr),tlt:chg(tltP2,tltPr)};
  const spyStrat=selectStrategy('spy',{vrp:spyVRP,tsInfo:spyTs,skewCond:skewCond(CA?.skew25??null),volReg:volR(spyIV),changePct:parseFloat(changes.spy.pct),dnt:dnt.spy});
  const gldStrat=selectStrategy('gld',{vrp:gldVRP,tsInfo:gldTs,skewCond:skewCond(CB?.skew25??null),volReg:volR(gldIV),changePct:parseFloat(changes.gld.pct),dnt:dnt.gld});
  const tltStrat=selectStrategy('tlt',{vrp:tltVRP,tsInfo:tltTs,skewCond:skewCond(CC?.skew25??null),volReg:volR(tltIV),changePct:parseFloat(changes.tlt.pct),dnt:dnt.tlt});

  // Strike finder for vertical legs
  const findStrike=(spot,iv,side)=>{
    if(!spot||!iv) return {k:side==='put'?spot*.973:spot*1.027,p:78};
    let best=null,bestD=1;
    for(let pct=0.5;pct<=25;pct+=0.25){
      const k=side==='put'?spot*(1-pct/100):spot*(1+pct/100);
      const p=pOTM(spot,k,iv,15,side);
      const d=Math.abs(p-0.78);
      if(d<bestD){bestD=d;best={k:parseFloat(f(k,2)),p:parseFloat(f(p*100,0))};}
    }
    return best??{k:side==='put'?parseFloat(f(spot*.973,2)):parseFloat(f(spot*1.027,2)),p:78};
  };

  const spySS=findStrike(spyP2,spyIV,'put');
  const gldSS=findStrike(gldP2,gldIV,'call');
  const tltSS=findStrike(tltP2,tltIV,'call');

  // Build trade objects based on selected strategy type
  const buildTrade=(asset,spot,nearIV,farIV,ss,rvVal,stratInfo,dntSig,tsInfo,changes,skCond) => {
    const vrpPts=asset==='spy'?spyVRP:asset==='gld'?gldVRP:tltVRP;
    const side=asset==='spy'?'put':'call';
    const vrpStr=sgn(vrpPts.toFixed(1))+vrpPts.toFixed(1);
    const nearDTE=asset==='spy'?CA?.dte:asset==='gld'?CB?.dte:CC?.dte;
    const atmK=asset==='spy'?CA?.atmStrike:asset==='gld'?CB?.atmStrike:CC?.atmStrike;

    if (stratInfo.type==='calendar') {
      // Near leg: sell ATM at near expiry; Far leg: buy same strike at far expiry
      const nearExp=`~${nearDTE??15} DTE`;
      const farExp=`~${(nearDTE??15)+30} DTE`;
      return {
        type:'calendar', asset:asset.toUpperCase(), sig:dntSig,
        strat:'Calendar spread',
        leg1:`Sell ${f$(atmK??spot)} (${nearExp})`,
        leg2:`Buy  ${f$(atmK??spot)} (${farExp})`,
        structure:'ATM calendar — same strike, two expirations',
        prem:`~${f$(Math.max(0.5,(nearIV-farIV)*spot*0.05))}–${f$(Math.max(1,(nearIV-farIV)*spot*0.09))} db`,
        tsRatio:tsInfo?.ratio?.toFixed(3)??'—',
        rationale:stratInfo.rationale,
        risk:'Vol spike: near leg losses exceed far leg gains. Assignment risk on early exercise. Earnings/binary events within window.'
      };
    }

    if (stratInfo.type==='diagonal') {
      // Near leg: sell OTM strike (same as vertical short); Far leg: buy ATM at far expiry
      const nearExp=`~${nearDTE??15} DTE`;
      const farExp=`~${(nearDTE??15)+30} DTE`;
      return {
        type:'diagonal', asset:asset.toUpperCase(), sig:dntSig,
        strat:'Diagonal spread',
        leg1:`Sell ${side==='put'?f$(ss.k):f$(ss.k)} ${side} (${nearExp})`,
        leg2:`Buy  ${f$(atmK??spot)} ${side} (${farExp})`,
        structure:`OTM near / ATM far — directional diagonal`,
        prem:`~${f$(Math.max(0.8,(nearIV-farIV)*spot*0.06+0.3))}–${f$(Math.max(1.5,(nearIV-farIV)*spot*0.10+0.5))} db`,
        tsRatio:tsInfo?.ratio?.toFixed(3)??'—',
        rationale:stratInfo.rationale,
        risk:'Directional move against near short leg. Near leg IV collapse faster than far leg if vol mean-reverts rapidly.'
      };
    }

    if (stratInfo.type==='debit_spread') {
      const debitK=side==='put'?f$(ss.k+5):f$(ss.k-5);
      return {
        type:'debit', asset:asset.toUpperCase(), sig:dntSig,
        strat:side==='put'?'Bull put debit (hedge)':'Bull call debit',
        leg1:`Buy  ${side==='put'?f$(ss.k+5):f$(ss.k)} ${side}`,
        leg2:`Sell ${side==='put'?f$(ss.k):f$(ss.k+14)} ${side}`,
        structure:'$5-wide debit spread',
        prem:'~$0.80–1.20 db',
        tsRatio:'—',
        rationale:`VRP negative (${vrpStr}pts) — IV below realized vol. Avoid short premium. Debit spread caps downside.`,
        risk:'Time decay works against long position. Loses full premium if expires OTM.'
      };
    }

    // Default: credit spread
    return {
      type:'credit', asset:asset.toUpperCase(), sig:dntSig,
      strat:side==='put'?'Bull put spread':'Bear call spread',
      leg1:`Sell ${f$(ss.k)} ${side}`,
      leg2:`Buy  ${side==='put'?f$(ss.k-5):f$(ss.k+2.5)} ${side}`,
      structure:side==='put'?'$5-wide bull put':'$2.50-wide bear call',
      prem:side==='put'?'~$1.25–1.60 cr':'~$0.55–0.75 cr',
      tsRatio:tsInfo?.ratio?.toFixed(3)??'—',
      potm:ss.p+'%',
      rationale:`${stratInfo.rationale} VRP ${vrpStr}pts, skew ${skCond}.`,
      risk:side==='put'?'Gap below short strike; max loss = width − credit':'Yield shock; TLT rallies through short strike'
    };
  };

  const trades=[
    buildTrade('spy',spyP2,spyIV,spyFarIV,spySS,spyRV,spyStrat,dnt.spy,spyTs,changes.spy,skewCond(CA?.skew25??null)),
    buildTrade('gld',gldP2,gldIV,gldFarIV,gldSS,gldRV,gldStrat,dnt.gld,gldTs,changes.gld,skewCond(CB?.skew25??null)),
    buildTrade('tlt',tltP2,tltIV,tltFarIV,tltSS,tltRV,tltStrat,dnt.tlt,tltTs,changes.tlt,skewCond(CC?.skew25??null)),
  ];

  return {
    ts:new Date().toISOString(),
    greeksLive:isMarketHours(), rvLive,
    _debugChains:{ SPY:chainsNear.SPY?.debug, GLD:chainsNear.GLD?.debug, TLT:chainsNear.TLT?.debug },
    prices:{spy:spyP2,gld:gldP2,tlt:tltP2}, changes,
    vix:{val:vix,pct:vixPct,reg:vixReg,prev:indices.vix1},
    vvix:{val:vvix,pct:vvixPct},
    move:{val:move,reg:moveReg,prev:indices.move1},
    dxy:{val:dxy}, tnx:{val:tnx},
    iv:{spy:spyIV,gld:gldIV,tlt:tltIV},
    farIV:{spy:spyFarIV,gld:gldFarIV,tlt:tltFarIV},
    rv:{spy:{val:spyRV,data:rvData.SPY},gld:{val:gldRV,data:rvData.GLD},tlt:{val:tltRV,data:rvData.TLT}},
    vrp:{spy:spyVRP.toFixed(1),gld:gldVRP.toFixed(1),tlt:tltVRP.toFixed(1)},
    ts_struct:{spy:spyTs,gld:gldTs,tlt:tltTs},
    skew:{spy:CA?.skew25??null,gld:CB?.skew25??null,tlt:CC?.skew25??null},
    skewCond:{spy:skewCond(CA?.skew25??null),gld:skewCond(CB?.skew25??null),tlt:skewCond(CC?.skew25??null)},
    iv25:{spy:{c:CA?.iv25C,p:CA?.iv25P},gld:{c:CB?.iv25C,p:CB?.iv25P},tlt:{c:CC?.iv25C,p:CC?.iv25P}},
    oi:{spy:{pc:CA?.pcRatio??'—',walls:CA?.walls??[]},gld:{pc:CB?.pcRatio??'—',walls:CB?.walls??[]},tlt:{pc:CC?.pcRatio??'—',walls:CC?.walls??[]}},
    straddle:{spy:f(CA?.straddleMid??0),gld:f(CB?.straddleMid??0),tlt:f(CC?.straddleMid??0)},
    volReg:{spy:volR(spyIV),gld:volR(gldIV),tlt:volR(tltIV)},
    em:{
      spy:{d7:emCalc(spyP2,spyIV,7),d15:emCalc(spyP2,spyIV,15),d30:emCalc(spyP2,spyIV,30)},
      gld:{d7:emCalc(gldP2,gldIV,7),d15:emCalc(gldP2,gldIV,15),d30:emCalc(gldP2,gldIV,30)},
      tlt:{d7:emCalc(tltP2,tltIV,7),d15:emCalc(tltP2,tltIV,15),d30:emCalc(tltP2,tltIV,30)},
    },
    dnt, regime, trades,
    stratSel:{spy:spyStrat,gld:gldStrat,tlt:tltStrat},
    mod:{spy:vix>28?'Reduce':vix<18?'Increase':'Maintain',gld:gldVRP<0?'Reduce':'Maintain',tlt:move>110?'Reduce':'Maintain'},
    bias:{spy:{bull:vix<22?65:55,bear:vix<22?35:45,conf:vix>28?'Low':'Medium'},gld:{bull:80,bear:20,conf:'Medium'},tlt:{bull:20,bear:80,conf:'Med-High'}},
  };
}

/* ── Main fetch ── */
async function runBriefing(sid) {
  S.loading=true; S.errs=[]; S.warns=[]; render();
  try {
    // ETF bars for RV (30+ calendar days)
    const [spyB,gldB,tltB]=await Promise.all(
      ['SPY','GLD','TLT'].map(t=>stockBarsLong(t,35).catch(e=>{S.warns.push(`${t} bars: ${e.message}`);return[];}))
    );
    const rvData={SPY:calcRV(spyB,20),GLD:calcRV(gldB,20),TLT:calcRV(tltB,20)};
    if(!rvData.SPY) S.warns.push('SPY RV: insufficient data — using structural estimate');
    if(!rvData.GLD) S.warns.push('GLD RV: insufficient data — using structural estimate');
    if(!rvData.TLT) S.warns.push('TLT RV: insufficient data — using structural estimate');

    // Stock prices
    const [spyPr,gldPr,tltPr]=await Promise.all(['SPY','GLD','TLT'].map(t=>stockPrev(t).catch(()=>null)));
    const stocks={
      SPY:{price:spyB.at(-1)?.c??spyPr?.c??0, prevClose:spyPr?.c??spyB.at(-2)?.c??0},
      GLD:{price:gldB.at(-1)?.c??gldPr?.c??0, prevClose:gldPr?.c??gldB.at(-2)?.c??0},
      TLT:{price:tltB.at(-1)?.c??tltPr?.c??0, prevClose:tltPr?.c??tltB.at(-2)?.c??0},
    };

    // Index bars — VIX, VVIX, VIX3M, MOVE, DXY, TNX
    const [vixB,vvixB,vix3mB,moveB,dxyB,tnxB]=await Promise.all([
      indexBars('I:VIX',5), indexBars('I:VVIX',5), indexBars('I:VIX3M',5),
      indexBars('I:MOVE',5), indexBars('I:DXY',5),  indexBars('I:TNX',5),
    ]);
    const bc=bars=>bars[0]?.c??null, bp=bars=>bars[1]?.c??null;
    if(!bc(vixB))  S.warns.push('I:VIX unavailable — using IV proxy');
    if(!bc(vvixB)) S.warns.push('I:VVIX unavailable');
    if(!bc(moveB)) S.warns.push('I:MOVE unavailable');
    const indices={vix:bc(vixB),vix1:bp(vixB),vvix:bc(vvixB),vix3m:bc(vix3mB),move:bc(moveB),move1:bp(moveB),dxy:bc(dxyB),tnx:bc(tnxB)};
    const tnx10=bc(tnxB)??await tYield().catch(()=>null);

    // Expose spot prices for optionChain() strike-window anchoring
    _chainSpots = { SPY: stocks.SPY.price, GLD: stocks.GLD.price, TLT: stocks.TLT.price };

    // Options chains — near (10–23 DTE) AND far (35–55 DTE) for term structure
    const [spyNear,gldNear,tltNear,spyFar,gldFar,tltFar]=await Promise.all([
      optionChain('SPY',10,23).catch(e=>{S.warns.push(`SPY near chain: ${e.message}`);return[];}),
      optionChain('GLD',10,23).catch(e=>{S.warns.push(`GLD near chain: ${e.message}`);return[];}),
      optionChain('TLT',10,23).catch(e=>{S.warns.push(`TLT near chain: ${e.message}`);return[];}),
      optionChain('SPY',35,55).catch(e=>{S.warns.push(`SPY far chain: ${e.message}`);return[];}),
      optionChain('GLD',35,55).catch(e=>{S.warns.push(`GLD far chain: ${e.message}`);return[];}),
      optionChain('TLT',35,55).catch(e=>{S.warns.push(`TLT far chain: ${e.message}`);return[];}),
    ]);

    const chainsNear={SPY:analyseChain(spyNear,stocks.SPY.price,spyNear._dateFrom,spyNear._dateTo),GLD:analyseChain(gldNear,stocks.GLD.price,gldNear._dateFrom,gldNear._dateTo),TLT:analyseChain(tltNear,stocks.TLT.price,tltNear._dateFrom,tltNear._dateTo)};
    const chainsFar ={SPY:analyseChain(spyFar, stocks.SPY.price,spyFar._dateFrom,spyFar._dateTo),GLD:analyseChain(gldFar, stocks.GLD.price,gldFar._dateFrom,gldFar._dateTo),TLT:analyseChain(tltFar, stocks.TLT.price,tltFar._dateFrom,tltFar._dateTo)};

    if(!isMarketHours()) S.warns.push('Outside market hours — 25Δ greeks estimated via BS strike approximation (live greeks: 9:30–4:00 PM ET)');

    S.briefs[sid]=buildBriefing({stocks,rvData,indices,chainsNear,chainsFar,tnx10});
    S.sid=sid; S.tab='overview';
  } catch(e) { S.errs.push(e.message); }
  S.loading=false; render();
}

const vbadge=v=>v==='Expansion'?'br':v==='Transition'?'ba':'bb';
const mbadge=m=>m==='Reduce'?'ba':m==='Increase'?'bg':'bx';
const sbadge=s=>s==='HOLD'?'ba':s==='CONDITIONAL'?'bx':'bg';
const skbadge=s=>s==='Elevated'?'br':s==='Inverted'?'bb':s==='N/A'?'bx':'bg';
const regbadge=r=>r==='High'?'br':r==='Moderate'?'ba':'bg';
const tsbadge=r=>r==='contango'?'bb':r==='backwardation'?'br':'bx';
const stratbadge=t=>t==='calendar'?'bb':t==='diagonal'?'bp':t==='debit_spread'||t==='debit'?'ba':'bg';
const stratColor=t=>t==='calendar'?'#1d4ed8':t==='diagonal'?'#7c3aed':t==='debit_spread'||t==='debit'?'#b45309':'#15803d';

function chgHTML(c){
  const n=parseFloat(c.pct),cls=n>=0?'up':'dn';
  return `<span class="${cls}">${n>=0?'+':''}${c.ch} (${n>=0?'+':''}${c.pct}%)</span>`;
}
function skewBarHTML(skewVal){
  if(skewVal==null) return `<div style="font-size:11px;color:#aaa">N/A outside market hours</div>`;
  const pts=skewVal*100, pct=Math.min(100,Math.max(0,50+pts*300));
  const color=pts>4?'#dc2626':pts< -1?'#2563eb':'#22c55e';
  return `<div class="skew-visual"><div class="skew-track"><div class="skew-fill" style="width:${pct}%;background:${color}"></div></div><div class="skew-pts">${pts>=0?'+':''}${pts.toFixed(1)} pts</div></div>`;
}
function iv25HTML(iv25,side){
  const val=iv25?.[side];
  return (val==null||val===0)?'<span style="color:#aaa">—</span>':fp(val);
}
function sparklineHTML(returns){
  if(!returns||!returns.length) return '';
  const maxAbs=Math.max(...returns.map(Math.abs),0.001);
  return `<div class="sparkline">${returns.slice(-20).map(r=>{
    const h=Math.max(2,Math.round(Math.abs(r)/maxAbs*26));
    return `<div class="spark-bar" style="height:${h}px;background:${r>=0?'#16a34a':'#dc2626'}"></div>`;
  }).join('')}</div>`;
}
function vrpBarHTML(iv,rv){
  const maxV=Math.max(iv,rv,0.01), ivP=(iv/maxV*100).toFixed(1), rvP=(rv/maxV*100).toFixed(1);
  const vrpPos=iv>rv, vrpPts=((iv-rv)*100).toFixed(1);
  return `<div class="vrp-bar-wrap">
    <div class="vrp-bar-label"><span>RV ${fp(rv)}</span><span>IV ${fp(iv)}</span></div>
    <div style="position:relative;height:20px;">
      <div style="position:absolute;top:0;left:0;width:100%;height:6px;background:#f0f0ee;border-radius:3px;overflow:hidden;">
        <div style="height:100%;width:${rvP}%;background:#888;border-radius:3px;position:absolute;left:0;top:0"></div>
        <div style="height:100%;width:${ivP}%;background:${vrpPos?'#16a34a':'#dc2626'};border-radius:3px;position:absolute;left:0;top:0;opacity:0.7"></div>
      </div>
      <div style="position:absolute;top:10px;right:0;font-size:9px;color:${vrpPos?'#16a34a':'#dc2626'};font-weight:600">VRP ${sgn(vrpPts)}${vrpPts}pts</div>
    </div>
  </div>`;
}

function tsCardHTML(ticker, b) {
  const a=ticker.toLowerCase();
  const ts=b.ts_struct[a];
  const nearIV=b.iv[a], farIV=b.farIV[a];
  if (!ts) return `<div class="ts-card">
    <div class="ts-header"><div class="ts-ticker">${ticker}</div><span class="badge bx">No far chain data</span></div>
    <div class="ts-body"><div style="font-size:11px;color:#aaa">Far expiry chain (35–55 DTE) unavailable. VIX/VIX3M fallback also unavailable for this asset.</div></div>
  </div>`;

  const maxIV=Math.max(nearIV,farIV??nearIV,0.01);
  const nearPct=((nearIV/maxIV)*100).toFixed(0);
  const farPct =(((farIV??nearIV)/maxIV)*100).toFixed(0);

  return `<div class="ts-card">
    <div class="ts-header">
      <div class="ts-ticker">${ticker}</div>
      <span class="badge ${tsbadge(ts.regime)}">${ts.label}</span>
    </div>
    <div class="ts-body">
      <div class="ts-row">
        <div class="ts-label">Near IV (~15D)</div>
        <div class="ts-val">${fp(nearIV)}</div>
      </div>
      <div class="ts-row">
        <div class="ts-label">Far IV (~45D)</div>
        <div class="ts-val">${farIV?fp(farIV):'—'}</div>
      </div>
      <div class="ts-row">
        <div class="ts-label">Near/Far ratio</div>
        <div class="ts-val ${ts.ratio>1.05?'up':ts.ratio<0.95?'dn':'mu'}">${ts.ratio?.toFixed(3)??'—'}</div>
      </div>
      <div class="ts-row">
        <div class="ts-label">Source</div>
        <div class="ts-val" style="font-size:11px;color:#888">${ts.source==='chain'?'Options chain (both expirations)':'VIX / VIX3M ratio (fallback)'}</div>
      </div>
      <div class="ts-row">
        <div class="ts-label">Strategy implication</div>
        <div class="ts-val ${stratbadge(b.stratSel[a].type)}" style="font-size:11px;color:${stratColor(b.stratSel[a].type)};font-weight:600">${b.stratSel[a].label}</div>
      </div>
      <div class="ts-slope-wrap">
        <div class="ts-slope-labels">
          <span>Near ${fp(nearIV)}</span>
          <span>Far ${farIV?fp(farIV):'—'}</span>
        </div>
        <div class="ts-slope-track">
          <div class="ts-slope-far"  style="width:${farPct}%"></div>
          <div class="ts-slope-near" style="width:${nearPct}%"></div>
        </div>
        <div style="font-size:9px;color:#aaa;margin-top:4px">Red = near IV · Blue = far IV · Near > Far = contango</div>
      </div>
    </div>
  </div>`;
}

function rvCardHTML(ticker, b) {
  const a=ticker.toLowerCase();
  const rvObj=b.rv[a], iv=b.iv[a], rv=rvObj.val, vrpVal=parseFloat(b.vrp[a]);
  const vrpCls=vrpVal>=0?'bg':'br';
  const vrpSig=vrpVal>2?'Sell premium':vrpVal<-2?'Avoid short vol':'Calendars';
  const data=rvObj.data;
  return `<div class="rv-card">
    <div class="rv-header"><div class="rv-ticker">${ticker}</div><span class="badge ${vrpCls}">${vrpSig}</span></div>
    <div class="rv-body">
      <div class="rv-row"><div class="rv-label">ATM IV (chain)</div><div class="rv-val">${fp(iv)}</div></div>
      <div class="rv-row"><div class="rv-label">20D RV ${data?'(live)':'(structural)'}</div><div class="rv-val">${fp(rv)}</div></div>
      <div class="rv-row"><div class="rv-label">VRP (IV − RV)</div><div class="rv-val ${vrpVal>=0?'up':'dn'}">${sgn(b.vrp[a])}${b.vrp[a]} pts</div></div>
      ${data?`<div class="rv-row"><div class="rv-label">Trading days</div><div class="rv-val">${data.nDays}</div></div>`:''}
      ${vrpBarHTML(iv,rv)}
      ${data?sparklineHTML(data.returns):''}
      ${data?`<div style="font-size:9px;color:#aaa;margin-top:4px;text-align:right">Daily log returns · green = up · red = down</div>`:''}
    </div>
  </div>`;
}

    <div class="metric-card"><div class="mc-l">MOVE</div><div class="mc-v">${f(b.move.val,1)}</div><div class="mc-s ${moveChg!=null?cc(moveChg):'mu'}">${moveChg!=null?sgn(moveChg)+moveChg+'%':'—'}</div></div>

/* ─── Signals ─── */
function renderSignals(b) {
  const allWalls=['spy','gld','tlt'].flatMap(a=>(b.oi[a].walls||[]).map(w=>({...w,ticker:a.toUpperCase()}))).sort((a,z)=>z.oi-a.oi).slice(0,9);
  const dntFlags=[
    ['VIX / ATM IV elevated',['spy','gld','tlt'].map(a=>b.iv[a]>0.18||b.vix.val>20)],
    ['Binary event ≤ 3 days',[true,true,true]],
    ['IV below 20th pct',['spy','gld','tlt'].map(a=>b.iv[a]<0.13)],
    ['Negative VRP (IV < RV)',['spy','gld','tlt'].map(a=>parseFloat(b.vrp[a])<0)],
    ['MOVE > 110 (TLT only)',[false,false,b.move.val>110]],
  ];

  return `
  <div class="sh">Do not trade checklist</div>
  <div class="list-card">
    <div class="list-row" style="background:#f8f8f6">
      <div class="list-label" style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase">Condition</div>
      ${['SPY','GLD','TLT'].map(t=>`<div class="list-val" style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase">${t}</div>`).join('')}
    </div>
    ${dntFlags.map(([lbl,flags])=>`<div class="list-row">
      <div class="list-label">${lbl}</div>
      ${flags.map(fl=>`<div class="list-badge"><span class="badge ${fl?'br':'bg'}">${fl?'Y':'N'}</span></div>`).join('')}
    </div>`).join('')}
    <div class="list-row" style="background:#f8f8f6">
      <div class="list-label" style="font-weight:700">Signal</div>
      ${['spy','gld','tlt'].map(a=>`<div class="list-badge"><span class="badge ${sbadge(b.dnt[a])}">${b.dnt[a]}</span></div>`).join('')}
    </div>
  </div>

  <div class="sh">25Δ skew — ${b.greeksLive?'live greeks':'BS approx (market closed)'}</div>
  ${['spy','gld','tlt'].map(a=>`<div class="exec-card" style="margin-bottom:8px">
    <div class="exec-top" style="margin-bottom:6px">
      <div class="exec-ticker" style="font-size:13px">${a.toUpperCase()}</div>
      <span class="badge ${skbadge(b.skewCond[a])}">${b.skewCond[a]}</span>
    </div>
    <div class="exec-grid" style="margin-bottom:4px">
      <div><div class="exec-label">25Δ Put IV</div><div class="exec-val">${iv25HTML(b.iv25[a],'p')}</div></div>
      <div><div class="exec-label">25Δ Call IV</div><div class="exec-val">${iv25HTML(b.iv25[a],'c')}</div></div>
    </div>
    ${skewBarHTML(b.skew[a])}
  </div>`).join('')}

  <div class="sh">Expected moves</div>
  <div class="list-card">
    <div class="list-row" style="background:#f8f8f6">
      <div class="list-label" style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;flex:1.4">Asset / DTE</div>
      <div class="list-val" style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase">±$</div>
      <div class="list-val" style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase">±%</div>
    </div>
    ${['spy','gld','tlt'].flatMap(a=>[7,15,30].map(d=>{
      const e=b.em[a]['d'+d],spot=b.prices[a];
      return `<div class="list-row">
        <div class="list-label" style="flex:1.4">${a.toUpperCase()} ${d}D · ${fp(b.iv[a])}</div>
        <div class="list-val">±${f$(e)}</div>
        <div class="list-val">±${spot?((e/spot)*100).toFixed(2):'—'}%</div>
      </div>`;
    })).join('')}

  <div class="sh">OI walls — real from chain</div>

      <span style="color:#aaa;font-size:10px">${(w.oi/1000).toFixed(0)}k</span>

/* ─── Trades ─── */
function renderTrades(b) {
  const typeBadgeStyle = t => {
    if (t==='calendar') return 'background:#dbeafe;color:#1d4ed8';
    if (t==='diagonal') return 'background:#f3e8ff;color:#7c3aed';
    if (t==='debit'||t==='debit_spread') return 'background:#fef3c7;color:#b45309';
    return 'background:#dcfce7;color:#15803d';
  };

  return `
  <div class="sh">Strategy selection — driven by live term structure</div>
  <div class="list-card">
    <div class="list-row" style="background:#f8f8f6">
      <div class="list-label" style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase">Asset</div>
      <div class="list-val" style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase">TS</div>
      <div class="list-val" style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase">VRP</div>
      <div class="list-val" style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase">Strategy</div>
    </div>
    ${['spy','gld','tlt'].map(a=>`<div class="list-row">
      <div class="list-label"><strong>${a.toUpperCase()}</strong><br><span style="font-size:10px;color:#aaa">${b.ts_struct[a]?.label??'—'}</span></div>
      <span class="badge ${tsbadge(b.ts_struct[a]?.regime??'flat')}" style="flex-shrink:0">${b.ts_struct[a]?.ratio?.toFixed(2)??'—'}</span>
      <div class="list-val ${cc(b.vrp[a])}">${sgn(b.vrp[a])}${b.vrp[a]}pts</div>
      <span style="font-size:10px;padding:2px 7px;border-radius:6px;font-weight:600;flex-shrink:0;${typeBadgeStyle(b.stratSel[a].type)}">${b.stratSel[a].label}</span>
    </div>`).join('')}
  </div>
  <div style="font-size:11px;color:#888;margin:8px 0 16px;padding:0 2px;line-height:1.55">
    Ratio > 1.05 = near IV rich vs far (contango) → calendar or diagonal. Ratio &lt; 0.95 = backwardation → credit spread. Flat = credit spread default.
  </div>

  <div class="sh">Trade construction</div>
  ${b.trades.map(t=>`<div class="trade-card">
    <div class="trade-head">
      <div class="trade-title">${t.asset} — ${t.strat}</div>
      <div style="display:flex;gap:4px;align-items:center;flex-shrink:0">
        <span style="font-size:10px;padding:2px 7px;border-radius:6px;font-weight:600;${typeBadgeStyle(t.type)}">${t.type==='calendar'?'Cal':t.type==='diagonal'?'Diag':t.type==='debit'?'Debit':'Credit'}</span>
        ${t.sig!=='PROCEED'?`<span class="badge ${t.sig==='CONDITIONAL'?'bx':'ba'}">${t.sig}</span>`:''}
      </div>
    </div>
    <div class="trade-grid">
      <div><div class="tg-l">Near leg</div><div class="tg-v" style="font-size:11px">${t.leg1}</div></div>
      <div><div class="tg-l">Far leg</div><div class="tg-v" style="font-size:11px">${t.leg2}</div></div>
      <div><div class="tg-l">Structure</div><div class="tg-v" style="font-size:11px">${t.structure}</div></div>
      <div><div class="tg-l">Target</div><div class="tg-v">${t.prem}</div></div>
      ${t.type!=='calendar'&&t.type!=='diagonal'?`<div><div class="tg-l">P(OTM)</div><div class="tg-v">${t.potm??'—'}</div></div>`:''}
      <div><div class="tg-l">TS ratio</div><div class="tg-v">${t.tsRatio}</div></div>
    </div>
    <div class="trade-thesis"><strong>Rationale:</strong> ${t.rationale}</div>
    <div class="trade-risk"><strong>Risk:</strong> ${t.risk}</div>
  </div>`).join('')}

  <div class="sh">Directional bias</div>
  <div class="list-card">
    ${['spy','gld','tlt'].map(a=>{
      const bias=b.bias[a], net=Math.abs(bias.bull-bias.bear)<=10?'Neutral':bias.bull>bias.bear?'Bullish':'Bearish';
      return `<div class="list-row">
        <div class="list-label"><strong>${a.toUpperCase()}</strong> · ${a==='spy'?'50%':'25%'}</div>
        <div class="list-val"><span class="up">${bias.bull}%↑</span> <span class="dn">${bias.bear}%↓</span></div>
        <div class="list-badge"><span class="badge ${net==='Bullish'?'bg':net==='Bearish'?'br':'bx'}">${net}</span></div>
      </div>`;
    }).join('')}
  </div>`;
}

/* ── Main render ── */
function render() {
  const root=document.getElementById('root');
  const et=toET(S.now);
  const timeStr=et.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true})+' ET';
  const dateStr=et.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  const b=S.sid?S.briefs[S.sid]:null;

  let bodyHTML='';
  if (S.loading) {
    bodyHTML=`<div class="state-screen">
      <div class="spin"></div>
      <div class="state-title">Fetching…</div>
      <div class="state-sub">Near + far option chains · 20D RV · VIX/VIX3M term structure · MOVE · DXY</div>
    </div>`;
  } else if (b) {
    const c=S.tab==='overview'?renderOverview(b):S.tab==='signals'?renderSignals(b):renderTrades(b);
    bodyHTML=`<div class="content">${c}
      <div class="footer-ts">
        ${new Date(b.ts).toLocaleString('en-US',{timeZone:'America/New_York',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:true})} ET
        &nbsp;·&nbsp; RV: 20D c-t-c${b.rvLive?' (live)':' (fallback)'}
        &nbsp;·&nbsp; TS: ${b.ts_struct.spy?.source==='chain'?'chain-based':'VIX/VIX3M'} ratio
        &nbsp;·&nbsp; IV: Options Starter
      </div>
    </div>`;
  } else {
    bodyHTML=`<div class="state-screen">
      <div class="state-title">No briefing yet</div>
      <div class="state-sub">Tap Run to fetch live data including near + far option chains for term structure analysis.<br><br>Auto-runs at 8 AM, 1 PM, and 5 PM ET.</div>
    </div>`;
  }

  const tabs=b?`<div class="tabs">
    <button class="tab ${S.tab==='overview'?'on':''}" onclick="setTab('overview')">Overview</button>
    <button class="tab ${S.tab==='signals'?'on':''}" onclick="setTab('signals')">Signals &amp; OI</button>
    <button class="tab ${S.tab==='trades'?'on':''}" onclick="setTab('trades')">Trades</button>
  </div>`:'';

  root.innerHTML=`
  <div class="topbar">
    <div class="topbar-row1"><h1>Options Desk</h1><div class="topbar-time">${dateStr} · ${timeStr}</div></div>
    <div class="run-btns">
      ${SESSIONS.map(s=>`<button class="btn ${sessStatus(s,S.now)==='on'?'btn-active':''}" ${S.loading?'disabled':''} onclick="run('${s.id}')">Run ${s.short}</button>`).join('')}
    </div>
  </div>
  <div style="height:8px"></div>
  <div class="sbar">
    ${SESSIONS.map(s=>{const st=sessStatus(s,S.now),has=!!S.briefs[s.id];return`<span class="pill ${st} ${has?'ptr':''}" onclick="${has?`setSession('${s.id}')`:''}">${s.label}${has?' ✓':''}</span>`;}).join('')}
    <span class="cd">${countdown(S.now)}</span>
  </div>
  <div style="height:6px"></div>
  ${tabs}
  ${S.errs.length?`<div class="content"><div class="alert alert-err">⚠ ${S.errs.join(' · ')}</div></div>`:''}
  ${S.warns.length?`<div class="content"><div class="alert alert-warn">${S.warns.join('<br>')}</div></div>`:''}
  ${bodyHTML}`;
}

function setTab(t){S.tab=t;render();}
function setSession(sid){S.sid=sid;S.tab='overview';render();}
function run(sid){runBriefing(sid);}

const timers={};
function scheduleAutos(){
  SESSIONS.forEach(s=>{
    clearTimeout(timers[s.id]);
    const tick=()=>{
      const et=toET(new Date()),[h,m]=s.hhmm.split(':').map(Number);
      const tgt=new Date(et);tgt.setHours(h,m,0,0);
      let ms=tgt-et;if(ms<0)ms+=864e5;
      timers[s.id]=setTimeout(()=>{run(s.id);tick();},ms);
    };
    tick();
  });
}

setInterval(()=>{S.now=new Date();render();},1000);
scheduleAutos();
render();
</script>
</body>
</html>
