                            : -6;
            score += vixMomAdj;
            signals.push(`VIX rising ${absVm.toFixed(1)}% (${vixMomAdj})`);
          } else {
            // Falling VIX — check for VVIX conflict before awarding bullish score
            if (vvixSpiking) {
              // VIX falling but VVIX spiking — strong second leg risk, suppress bullish signal
              score -= 6;
              signals.push(`VIX falling but VVIX spiking (second leg risk — −6)`);
            } else if (vvixRising) {
              // VIX falling but VVIX rising — mild second leg risk, suppress and caution
              score -= 3;
              signals.push(`VIX falling but VVIX rising (second leg risk — −3)`);
            } else {
              // Clean VIX compression — no conflict, award full bullish score
              const vixMomAdj = absVm >= 35 ? +14
                              : absVm >= 20 ? +11
                              : absVm >= 10 ? +8
                              : +5;
              score += vixMomAdj;
              signals.push(`VIX falling ${absVm.toFixed(1)}% (+${vixMomAdj})`);
            }
          }
        }
      }
      // SPY: VIX level — continuous scaling. No signal in neutral zone (15–24).
      // Elevated: 24–28 → −4, 28–35 → −8, 35–45 → −12, >45 → −16 cap.
      // Low vol: 12–15 → +5 (grind-higher regime), <12 → +3 (complacency, tempered).
      // Interaction: low VIX + inverted skew → +3 bonus (cleanest bullish setup for credit sellers).
      if (extraSignals.vixLevel != null) {
        const vl = extraSignals.vixLevel;
        if (vl >= 45)      { score -= 16; signals.push(`VIX ${vl.toFixed(1)} (extreme — −16)`); }
        else if (vl >= 35) { score -= 12; signals.push(`VIX ${vl.toFixed(1)} (elevated — −8)`); }
        else if (vl >= 28) { score -= 8;  signals.push(`VIX ${vl.toFixed(1)} (elevated — −8)`); }
        else if (vl >= 24) { score -= 4;  signals.push(`VIX ${vl.toFixed(1)} (elevated — −4)`); }
        else if (vl < 12) {
          // Extreme complacency — bullish lean but tempered, reversal risk rises
          score += 3;
          signals.push(`VIX ${vl.toFixed(1)} (complacency — +3)`);
          // Interaction: complacency + inverted skew
          if (skew != null && skew < -0.01) {
            score += 3; signals.push('low VIX + inverted skew (credit seller setup +3)');
          }
        } else if (vl < 15) {
          // Low vol grind-higher regime — favorable for put sellers and credit spreads
          score += 5;
          signals.push(`VIX ${vl.toFixed(1)} (low vol regime — +5)`);
          // Interaction: low VIX + inverted skew = cleanest bullish setup
          if (skew != null && skew < -0.01) {
            score += 3; signals.push('low VIX + inverted skew (credit seller setup +3)');
          }
        }
      }
      // SPY: VVIX momentum — leading indicator for VIX spikes (vol-of-vol).
      // Rising VVIX precedes VIX moves by 1-2 days; falling VVIX signals vol compression.
      // Asymmetric: rising VVIX penalizes more than falling rewards (spikes faster than compression).
      // When VVIX and VIX are both rising, amplify the VIX signal rather than double-count.
      if (extraSignals.vvixMomPct != null) {
        const vvmp = extraSignals.vvixMomPct;
        const vixAlsoRising = extraSignals.vixMomPct != null && extraSignals.vixMomPct > 5;
        if (vvmp > 10) {
          if (vixAlsoRising) {
            // Both VVIX and VIX rising — amplify VIX signal rather than add independently
            score -= 4; signals.push('VVIX rising >10% (amplifies VIX signal)');
          } else {
            // VVIX leading — early warning before VIX has moved
            score -= 10; signals.push('VVIX rising >10% (vol spike warning)');
          }
        } else if (vvmp > 5) {
          if (vixAlsoRising) {
            score -= 2; signals.push('VVIX rising >5% (amplifies VIX signal)');
          } else {
            score -= 6; signals.push('VVIX rising >5% (early vol warning)');
          }
        } else if (vvmp < -10) {
          score += 6; signals.push('VVIX falling >10% (vol compression)');
        } else if (vvmp < -5) {
          score += 4; signals.push('VVIX falling >5% (vol calming)');
        }
      }
      // SPY: VIX3M term structure — ratio of VIX/VIX3M describes vol term structure shape.
      // Backwardation (VIX > VIX3M, ratio > 1): short-term fear elevated vs medium-term
      //   → market expects current spike to be transient → mean reversion setup, bullish.
      // Contango (VIX < VIX3M, ratio < 1): sustained vol expected → headwind for short premium.
      // Interaction: steep backwardation + VIX already elevated → classic vol peak setup, +4 bonus.
      if (asset === 'spy' && extraSignals.vix3m != null && extraSignals.vixLevel != null) {
        const v3 = extraSignals.vix3m;
        const vl = extraSignals.vixLevel;
        if (v3 > 0) {
          const tsRatio = vl / v3;
          const vixElevated = vl >= 24;
          if (tsRatio >= 1.15) {
            // Steep backwardation — vol spike likely peaking
            score += 8;
            signals.push(`VIX/VIX3M ${tsRatio.toFixed(2)} (steep backwardation — +8)`);
            if (vixElevated) {
              score += 4;
              signals.push('backwardation + elevated VIX (vol peak setup — +4)');
            }
          } else if (tsRatio >= 1.05) {
            score += 4;
            signals.push(`VIX/VIX3M ${tsRatio.toFixed(2)} (mild backwardation — +4)`);
          } else if (tsRatio <= 0.85) {
            // Steep contango — sustained vol expected
            score -= 6;
            signals.push(`VIX/VIX3M ${tsRatio.toFixed(2)} (steep contango — −6)`);
          } else if (tsRatio <= 0.95) {
            score -= 3;
            signals.push(`VIX/VIX3M ${tsRatio.toFixed(2)} (mild contango — −3)`);
          }
          // 0.95–1.05 = flat, no signal
        }
      }

      // GLD: DXY direction — continuous scaling with move magnitude + level conditioning.
      // Magnitude scale: 0.3–0.5% → ±6, 0.5–1.0% → ±10, 1.0–1.5% → ±14, >1.5% → ±16 base.
      // Level multiplier: strong dollar (DXY >103) amplifies signal; weak dollar (<98) dampens it.
      //   >106 → 1.4×  |  103–106 → 1.2×  |  98–103 → 1.0×  |  95–98 → 0.85×  |  <95 → 0.7×
      // Cap of ±16 applied after multiplier regardless of level.
      if (extraSignals.dxyMomPct != null) {
        const dm = extraSignals.dxyMomPct;
        const absDm = Math.abs(dm);
        if (absDm >= 0.3) {
          // Base score from magnitude
          let dxyAdj = absDm >= 1.5 ? 16
                     : absDm >= 1.0 ? 14
                     : absDm >= 0.5 ? 10
                     : 6;
          // Level multiplier — uses current DXY value from extraSignals
          const dxyLevel = extraSignals.dxyLevel ?? null;
          let levelMult = 1.0;
          let levelLabel = '';
          if (dxyLevel != null) {
            if      (dxyLevel > 106) { levelMult = 1.4; levelLabel = ` @${dxyLevel.toFixed(1)} (strong $)`; }
            else if (dxyLevel > 103) { levelMult = 1.2; levelLabel = ` @${dxyLevel.toFixed(1)}`; }
            else if (dxyLevel < 95)  { levelMult = 0.7; levelLabel = ` @${dxyLevel.toFixed(1)} (weak $)`; }
            else if (dxyLevel < 98)  { levelMult = 0.85; levelLabel = ` @${dxyLevel.toFixed(1)}`; }
            else                     { levelLabel = ` @${dxyLevel.toFixed(1)}`; }
          }
          dxyAdj = Math.round(Math.min(16, dxyAdj * levelMult));
          dxyAdj *= (dm > 0 ? -1 : 1); // rising DXY = bearish gold
          score += dxyAdj;
          signals.push(`DXY ${dm > 0 ? 'rising' : 'falling'} ${absDm.toFixed(2)}%${levelLabel} (${dxyAdj > 0 ? '+' : ''}${dxyAdj})`);
        }
      }
      // GLD: real yield change — continuous scaling with move magnitude.
      // Noise filter: <2bps ignored. Scale: 2–5bps → ±4, 5–10bps → ±8,
      // 10–15bps → ±11, >15bps → ±13 cap.
      if (extraSignals.realYieldChangeBps != null) {
        const rb = extraSignals.realYieldChangeBps;
        const absRb = Math.abs(rb);
        if (absRb >= 2) {
          let ryAdj = absRb >= 15 ? 13
                    : absRb >= 10 ? 11
                    : absRb >= 5  ? 8
                    : 4;
          ryAdj *= (rb > 0 ? -1 : 1); // rising real yield = bearish gold
          score += ryAdj;
          signals.push(`real yield ${rb > 0 ? 'rising' : 'falling'} ${absRb.toFixed(1)}bps (${ryAdj > 0 ? '+' : ''}${ryAdj})`);
        }
      }
      // GLD: breakeven inflation change (nominal − real yield change) — direct inflation expectation signal.
      // When both nominal and real yield are available, breakeven = nominal change − real change.
      //   Rising breakeven → inflation expectations rising → bullish gold (asymmetric: inflation fear > deflation)
      //   Falling breakeven → deflation pressure → mild bearish gold
      // When only nominal yield available (real yield null): use as weak standalone signal.
      //   Direction ambiguous (could be real rate or inflation) → reduced weight, labeled clearly.
      // Noise filter: <2bps for breakeven, <3bps for nominal-only.
      if (extraSignals.yieldChangeBps != null) {
        const nb = extraSignals.yieldChangeBps;
        const rb = extraSignals.realYieldChangeBps;
        if (rb != null) {
          // Both available — compute breakeven change
          const be = nb - rb;
          const absbe = Math.abs(be);
          if (absbe >= 2) {
            let beAdj;
            if (be > 0) {
              // Rising breakeven = inflation expectations rising = bullish gold
              // Asymmetric: stronger bullish signal than falling breakeven is bearish
              beAdj = absbe >= 12 ? +12
                    : absbe >= 8  ? +10
                    : absbe >= 4  ? +7
                    : +4;
            } else {
              // Falling breakeven = deflation pressure = mild bearish gold
              beAdj = absbe >= 12 ? -9
                    : absbe >= 8  ? -7
                    : absbe >= 4  ? -5
                    : -3;
            }
            score += beAdj;
            signals.push(`breakeven ${be > 0 ? 'rising' : 'falling'} ${absbe.toFixed(1)}bps (${beAdj > 0 ? '+' : ''}${beAdj})`);
          }
        } else {
          // Nominal only — ambiguous signal, reduced weight
          const absNb = Math.abs(nb);
          if (absNb >= 3) {
            const nomAdj = nb > 0 ? -4 : +4;
            score += nomAdj;
            signals.push(`nominal yield ${nb > 0 ? 'rising' : 'falling'} ${absNb.toFixed(1)}bps (nominal-only, ${nomAdj > 0 ? '+' : ''}${nomAdj})`);
          }
        }
      }

      // GLD: dealer gamma exposure (GEX)
      // Positive score → dealers long gamma → countercyclical → mild bullish lean (dampened moves favor put sellers)
      // Negative score → dealers short gamma → procyclical → bearish lean (amplified moves, avoid short premium)
      // Signal scales continuously. Threshold ±20 score filters noise.
      // VIX-conditioned multiplier: GEX dominates in low vol, gets overwhelmed in high vol.
      //   VIX <15 → 1.5×  |  15–20 → 1.0×  |  20–28 → 0.6×  |  28–35 → 0.3×  |  >35 → 0× (suppressed)
      // Exception: negative GEX in extreme vol (>35) keeps a small −4 — dealer short gamma
      //   in extreme vol signals amplified disorder risk even if GEX isn't driving price.
      if (extraSignals.gexScore != null) {
        const gs = extraSignals.gexScore;
        const gm = extraSignals.gexM != null ? ` ($${Math.abs(extraSignals.gexM)}M)` : '';

        // Regime-conditioned multiplier — asset-specific:
        //   SPY: conditioned on VIX (equity vol determines dealer dominance)
        //   TLT: conditioned on MOVE (bond vol determines dealer dominance)
        //   GLD: no regime conditioning (flat — GEX dynamics less well-studied for commodities)
        let gexMult = 1.0;
        let extremeVol = false;

        if (asset === 'spy') {
          const vl = extraSignals.vixLevel ?? null;
          gexMult = vl === null ? 1.0
                  : vl > 35    ? 0.0
                  : vl > 28    ? 0.3
                  : vl > 20    ? 0.6
                  : vl < 15    ? 1.5
                  : 1.0;
          extremeVol = vl !== null && vl > 35;
        } else if (asset === 'tlt') {
          const ml = extraSignals.moveLevel ?? null;
          gexMult = ml === null ? 1.0
                  : ml > 150   ? 0.0
                  : ml > 120   ? 0.3
                  : ml > 100   ? 0.6
                  : ml < 60    ? 1.4
                  : ml < 80    ? 1.1
                  : 1.0;
          extremeVol = ml !== null && ml > 150;
        }
        // GLD: gexMult stays 1.0, extremeVol stays false

        const extremePenalty = asset === 'tlt' ? -3 : -4; // TLT disorder risk slightly smaller

        if (extremeVol && gs <= -20) {
          score += extremePenalty;
          signals.push(`dealer short gamma${gm} (extreme vol — disorder risk ${extremePenalty})`);
        } else if (extremeVol) {
          // Positive GEX in extreme vol: suppress entirely
        } else {
          const baseAdj = gs >= 40 ? 10
                        : gs >= 20 ? 5
                        : gs <= -40 ? -10
                        : gs <= -20 ? -5
                        : 0;
          if (baseAdj !== 0) {
            const adj = Math.round(baseAdj * gexMult);
            if (adj !== 0) {
              score += adj;
              const multLabel = gexMult !== 1.0 ? ` ×${gexMult}` : '';
              if (baseAdj > 0) {
                const pinLabel = gs >= 40 ? ' (pin tendency)' : '';
                signals.push(`dealer ${gs >= 40 ? 'long' : 'mild long'} gamma${gm}${pinLabel} (${adj > 0 ? '+' : ''}${adj}${multLabel})`);
              } else {
                const trendLabel = gs <= -40 ? ' (trend risk)' : '';
                signals.push(`dealer ${gs <= -40 ? 'short' : 'mild short'} gamma${gm}${trendLabel} (${adj}${multLabel})`);
              }
            }
          }
        }
      }

      // SPY: yield change — regime-conditioned on VIX level.
      // Rising yields in low vol = mild multiple compression. Rising yields in high vol = inflation fear.
      // Falling yields in low vol = growth slowdown signal, ambiguous → skip.
      // Falling yields in high vol = Fed pivot / risk-on relief → bullish.
      // Threshold: 5bps (equities less sensitive than bonds to small yield moves).
      if (asset === 'spy' && extraSignals.yieldChangeBps != null) {
        const yb = extraSignals.yieldChangeBps;
        const absYb = Math.abs(yb);
        const highVol = extraSignals.vixLevel != null && extraSignals.vixLevel >= 20;
        if (yb > 0 && absYb >= 5) {
          // Rising yields — bearish, scaled by magnitude and vol regime
          if (absYb >= 10 && highVol) {
            score -= 12; signals.push(`yields rising ${absYb.toFixed(1)}bps (rates shock, high vol — −12)`);
          } else if (highVol) {
            score -= 8;  signals.push(`yields rising ${absYb.toFixed(1)}bps (inflation fear — −8)`);
          } else {
            score -= 4;  signals.push(`yields rising ${absYb.toFixed(1)}bps (multiple compression — −4)`);
          }
        } else if (yb < 0 && absYb >= 5) {
          // Falling yields — only signal in high vol (risk-on relief); skip in low vol
          if (absYb >= 10 && highVol) {
            score += 10; signals.push(`yields falling ${absYb.toFixed(1)}bps (aggressive relief — +10)`);
          } else if (highVol) {
            score += 6;  signals.push(`yields falling ${absYb.toFixed(1)}bps (risk-on relief — +6)`);
          }
          // Low vol + falling yields → ambiguous (growth slowdown), no signal
        }
      }

      // TLT: yield direction — continuous magnitude scaling + yield level conditioning.
      // Noise filter: <3bps ignored. Base scale: 3–5bps → ±6, 5–10bps → ±10,
      //   10–18bps → ±14, >18bps → ±18 base. Cap ±18 applied after multiplier.
      // Level multiplier: high yields amplify signal (more room to move, policy relief larger);
      //   low yields dampen (limited room, normalization rather than threat).
      //   >5.0% → 1.3×  |  4.5–5.0% → 1.15×  |  3.0–4.5% → 1.0×
      //   2.5–3.0% → 0.8×  |  <2.5% → 0.65×
      if (asset === 'tlt' && extraSignals.yieldChangeBps != null) {
        const yb = extraSignals.yieldChangeBps;
        const absYb = Math.abs(yb);
        if (absYb >= 3) {
          // Base magnitude score
          const yBase = absYb >= 18 ? 18
                      : absYb >= 10 ? 14
                      : absYb >= 5  ? 10
                      : 6;
          // Level multiplier
          const yl = extraSignals.yieldLevel ?? null;
          const yMult = yl === null ? 1.0
                      : yl > 5.0   ? 1.3
                      : yl > 4.5   ? 1.15
                      : yl < 2.5   ? 0.65
                      : yl < 3.0   ? 0.8
                      : 1.0;
          // Real yield modifier — adjusts for whether nominal move is real-rate or inflation-driven.
          // Same direction: real rate move → compounds signal (×1.15).
          // Opposite direction: inflation-driven → dampens signal (×0.80).
          // Only fires if real yield moved meaningfully (>2bps threshold).
          const rb = extraSignals.realYieldChangeBps ?? null;
          let ryMod = 1.0;
          let ryLabel = '';
          if (rb !== null && Math.abs(rb) >= 2) {
            const sameDir = (yb > 0 && rb > 0) || (yb < 0 && rb < 0);
            if (sameDir) {
              ryMod = 1.15;
              ryLabel = ' (real rate — ×1.15)';
            } else {
              ryMod = 0.80;
              ryLabel = ' (inflation-driven — ×0.80)';
            }
          }
          const yAdj = Math.min(18, Math.round(yBase * yMult * ryMod));
          const finalAdj = yb > 0 ? -yAdj : +yAdj;
          score += finalAdj;
          const multLabel = yMult !== 1.0 ? ` @${yl?.toFixed(2)}% ×${yMult}` : yl ? ` @${yl?.toFixed(2)}%` : '';
          signals.push(`yields ${yb > 0 ? 'rising' : 'falling'} ${absYb.toFixed(1)}bps${multLabel}${ryLabel} (${finalAdj > 0 ? '+' : ''}${finalAdj})`);
        }
      }
      // TLT: MOVE level — continuous scaling both directions.
      // Elevated MOVE = bond vol stressed = bearish TLT. Low MOVE = calm bonds = bullish TLT.
      // >150 → −14, 120–150 → −10, 100–120 → −6, 70–100 → 0 (neutral),
      // 55–70 → +4, <55 → +6.
      // Interaction: MOVE <70 + yields falling → calm vol + rate tailwind → +3 bonus.
      if (asset === 'tlt' && extraSignals.moveLevel != null) {
        const ml = extraSignals.moveLevel;
        const yb = extraSignals.yieldChangeBps ?? null;
        const yieldsFalling = yb !== null && yb < -3;
        if (ml > 150) {
          score -= 14; signals.push(`MOVE ${ml.toFixed(0)} (extreme — −14)`);
        } else if (ml > 120) {
          score -= 10; signals.push(`MOVE ${ml.toFixed(0)} (elevated — −10)`);
        } else if (ml > 100) {
          score -= 6;  signals.push(`MOVE ${ml.toFixed(0)} (moderately elevated — −6)`);
        } else if (ml < 55) {
          score += 6;  signals.push(`MOVE ${ml.toFixed(0)} (very calm — +6)`);
          if (yieldsFalling) { score += 3; signals.push('low MOVE + yields falling (calm tailwind — +3)'); }
        } else if (ml < 70) {
          score += 4;  signals.push(`MOVE ${ml.toFixed(0)} (calm — +4)`);
          if (yieldsFalling) { score += 3; signals.push('low MOVE + yields falling (calm tailwind — +3)'); }
        }
        // 70–100: neutral zone, no signal
      }

      // TLT: VIX flight-to-quality signal.
      // Rising VIX → risk-off → institutional money rotates into Treasuries → bullish TLT.
      // Falling VIX → risk-on → rotation out of bonds → mild bearish TLT.
      // VIX level sustained above 24 → safe-haven demand ongoing → mild bullish.
      // VIX level below 15 → risk appetite high → mild bond headwind.
      // Asymmetric: fear-driven inflows faster and stronger than complacency-driven outflows.
      // Interaction cap: VIX spike >20% + MOVE already elevated → cap combined at +8
      //   (stagflation risk — stress can be bond-negative if inflation-driven).
      if (asset === 'tlt' && extraSignals.vixMomPct != null) {
        const vm = extraSignals.vixMomPct;
        const absVm = Math.abs(vm);
        const ml = extraSignals.moveLevel ?? null;
        const moveElevated = ml !== null && ml > 100;
        if (vm > 0 && absVm >= 5) {
          // Rising VIX — flight-to-quality bid
          let ftqAdj = absVm >= 20 ? 10
                     : absVm >= 10 ? 7
                     : 4;
          // Cap combined score if MOVE also elevated (stagflation risk)
          if (moveElevated && ftqAdj > 8) ftqAdj = 8;
          score += ftqAdj;
          signals.push(`VIX rising ${absVm.toFixed(1)}% (flight-to-quality +${ftqAdj})`);
        } else if (vm < 0 && absVm >= 5) {
          // Falling VIX — risk-on rotation out of bonds
          const ftqAdj = absVm >= 20 ? -6
                       : absVm >= 10 ? -4
                       : -2;
          score += ftqAdj;
          signals.push(`VIX falling ${absVm.toFixed(1)}% (risk-on rotation ${ftqAdj})`);
        }
      }
      // TLT: VIX level — sustained fear or complacency regimes
      if (asset === 'tlt' && extraSignals.vixLevel != null) {
        const vl = extraSignals.vixLevel;
        if (vl >= 30)      { score += 4; signals.push(`VIX ${vl.toFixed(1)} (fear regime — safe haven +4)`); }
        else if (vl >= 24) { score += 2; signals.push(`VIX ${vl.toFixed(1)} (elevated — safe haven +2)`); }
        else if (vl < 15)  { score -= 3; signals.push(`VIX ${vl.toFixed(1)} (risk appetite — bond headwind −3)`); }
      }
    }

    // Clamp score to [-50, +50] then convert to bull/bear %
    score = Math.max(-50, Math.min(50, score));
    const bull = Math.round(50 + score);
    const bear = 100 - bull;
    const conf = Math.abs(score) >= 30 ? 'High' : Math.abs(score) >= 15 ? 'Medium' : 'Low';
    return { bull, bear, conf, signals };
  }

  // DXY momentum: % change today vs yesterday (fires in calcBias only if >0.3%)
  const dxyMomPct = (indices.dxy && indices.dxy1 && indices.dxy1 > 0)
    ? (indices.dxy - indices.dxy1) / indices.dxy1 * 100
    : null;
  // VIX momentum: % change today vs yesterday (fires in calcBias only if >5%)
  const vixMomPct = (vix && indices.vix1 && indices.vix1 > 0)
    ? (vix - indices.vix1) / indices.vix1 * 100
    : null;
  // VVIX momentum: % change today vs yesterday — leading indicator for VIX moves.
  // VVIX tends to spike 1-2 days before VIX, so rising VVIX is an early warning signal.
  const vvixMomPct = (indices.vvix && indices.vvix1 && indices.vvix1 > 0)
    ? (indices.vvix - indices.vvix1) / indices.vvix1 * 100
    : null;
  // Yield change in basis points today vs yesterday (fires in calcBias only if >3bps)
  const tnxPrev = indices.tnx1 ?? null;
  const yieldChangeBps = (tnx && tnxPrev) ? (tnx - tnxPrev) * 100 : null;
  // Real yield change in bps — used for GLD bias (rising real yields = headwind for gold)
  const realYieldChangeBps = (indices.realYield && indices.realYield1)
    ? (indices.realYield - indices.realYield1) * 100
    : null;

  const spyCloses = rvData.SPY?.closes ?? null;
  const gldCloses = rvData.GLD?.closes ?? null;
  const tltCloses = rvData.TLT?.closes ?? null;

  const bias = {
    spy: calcBias(spyCloses, CA?.pcRatio, CA?.skew25, {
      vixMomPct, vixLevel: vix,
      vvixMomPct,
      yieldChangeBps,
      vix3m: indices.vix3m ?? null,  // VIX3M for term structure ratio signal
      gexScore: CA?.gexScore ?? null,
      gexM:     CA?.gexM     ?? null,
    }, spyRV, 'spy'),
    gld: calcBias(gldCloses, CB?.pcRatio, CB?.skew25, {
      dxyMomPct, realYieldChangeBps,
      yieldChangeBps,                    // nominal yield change — used for breakeven or fallback signal
      dxyLevel: indices.dxy ?? null,     // current DXY level for level conditioning
      gexScore: CB?.gexScore ?? null,
      gexM:     CB?.gexM     ?? null,
    }, gldRV, 'gld'),
    tlt: calcBias(tltCloses, CC?.pcRatio, CC?.skew25, {
      yieldChangeBps, moveLevel: move,
      vixMomPct, vixLevel: vix,
      yieldLevel: tnx,
      realYieldChangeBps,                // real yield modifier — amplifies or dampens nominal signal
      gexScore: CC?.gexScore ?? null,
      gexM:     CC?.gexM     ?? null,
    }, tltRV, 'tlt'),
  };

  // Generate for all assets × both DTE windows
  const allCandidates = [
    ...genTrades('SPY',spyP2,spyIV,spyFarIV,spyRV,dnt.spy,spyTs,bias.spy,skewCond(CA?.skew25??null),15),
    ...genTrades('GLD',gldP2,gldIV,gldFarIV,gldRV,dnt.gld,gldTs,bias.gld,skewCond(CB?.skew25??null),15),
    ...genTrades('TLT',tltP2,tltIV,tltFarIV,tltRV,dnt.tlt,tltTs,bias.tlt,skewCond(CC?.skew25??null),15),
    ...genTrades('SPY',spyP2,spyIV,spyFarIV,spyRV,dnt.spy,spyTs,bias.spy,skewCond(CA?.skew25??null),30),
    ...genTrades('GLD',gldP2,gldIV,gldFarIV,gldRV,dnt.gld,gldTs,bias.gld,skewCond(CB?.skew25??null),30),
    ...genTrades('TLT',tltP2,tltIV,tltFarIV,tltRV,dnt.tlt,tltTs,bias.tlt,skewCond(CC?.skew25??null),30),
  ].filter(t=>t && t.contracts>0 && t.potm && t.legs?.length);

  // Selection: exactly 5 trades, conviction order, with guaranteed floor for PROCEED assets.
  // Step 1 — sort everything by score descending.
  allCandidates.sort((a,b) => b.score - a.score);

  // Step 2 — for each PROCEED asset, lock in its single best trade (highest score).
  // This guarantees representation even if that asset's trades rank 6th–Nth overall.
  const proceedAssets = ['SPY','GLD','TLT'].filter(a => dnt[a.toLowerCase()] === 'PROCEED');
  const guaranteed = [];
  const guaranteedIdx = new Set();
  for (const asset of proceedAssets) {
    const idx = allCandidates.findIndex(t => t.label === asset);
    if (idx !== -1 && !guaranteedIdx.has(idx)) {
      guaranteed.push(allCandidates[idx]);
      guaranteedIdx.add(idx);
    }
  }

  // Step 3 — fill remaining slots (up to 5 total) with highest-scoring candidates
  // not already guaranteed, preserving score order.
  const remaining = allCandidates.filter((_, i) => !guaranteedIdx.has(i));
  const filler = remaining.slice(0, Math.max(0, 5 - guaranteed.length));

  // Step 4 — merge and re-sort by score so final list is always conviction order.
  const trades = [...guaranteed, ...filler]
    .sort((a,b) => b.score - a.score)
    .slice(0, 5);

  // ── Portfolio CVaR ──
  // Runs correlated Monte Carlo across all top-5 trades simultaneously.
  // Uses Cholesky decomposition of a representative SPY/GLD/TLT correlation matrix.
  // Correlation regime: risk-on (low VIX) vs stress (high VIX) shifts correlations.
  // Output: { cvar, mean, stdev, pct5, pct1, paths, regime, corrMatrix, diversBenefit }
  function portfolioCVaR(trades, spots, ivs) {
    if (!trades || trades.length === 0) return null;
    const N = 2000;

    // Correlation matrices — empirical SPY/GLD/TLT
    // Indices: 0=SPY, 1=GLD, 2=TLT
    // Calm regime (VIX < 20): SPY-GLD weakly negative, SPY-TLT negative (flight to quality muted)
    // Stress regime (VIX >= 20): SPY-TLT more negative (flight to quality), SPY-GLD more negative
    const corrCalm = [
      [ 1.00, -0.05, -0.35],
      [-0.05,  1.00,  0.15],
      [-0.35,  0.15,  1.00],
    ];
    const corrStress = [
      [ 1.00, -0.20, -0.55],
      [-0.20,  1.00,  0.25],
      [-0.55,  0.25,  1.00],
    ];
    const corrMatrix = vix >= 20 ? corrStress : corrCalm;
    const corrRegime = vix >= 20 ? 'Stress' : 'Calm';

    // Cholesky decomposition (3×3 hard-coded for performance)
    // L such that L·Lᵀ = C
    function cholesky(C) {
      const L = [[0,0,0],[0,0,0],[0,0,0]];
      L[0][0] = Math.sqrt(C[0][0]);
      L[1][0] = C[1][0] / L[0][0];
      L[2][0] = C[2][0] / L[0][0];
      L[1][1] = Math.sqrt(C[1][1] - L[1][0]*L[1][0]);
      L[2][1] = (C[2][1] - L[2][0]*L[1][0]) / L[1][1];
      L[2][2] = Math.sqrt(Math.max(0, C[2][2] - L[2][0]*L[2][0] - L[2][1]*L[2][1]));
      return L;
    }
    const L = cholesky(corrMatrix);

    // Map each trade to an asset index for correlated path lookup
    function assetIdx(label) {
      return label==='SPY' ? 0 : label==='GLD' ? 1 : 2;
    }

    // Per-trade parameters needed for payoff calculation
    const tradeParams = trades.map(t => {
      const a = t.label;
      const spot = spots[a.toLowerCase()] ?? 0;
      const iv   = ivs[a.toLowerCase()] ?? 0.18;
      const T    = (t.dte ?? 15) / 365;
      const sigma = iv * Math.sqrt(T);
      return { ...t, spot, iv, T, sigma, aidx: assetIdx(a) };
    });

    const portfolioPnls = [];

    for (let i = 0; i < N; i++) {
      // Generate 3 independent standard normals via Box-Muller
      const z = [0,0,0];
      for (let k = 0; k < 3; k++) {
        const u1 = Math.random(), u2 = Math.random();
        z[k] = Math.sqrt(-2*Math.log(Math.max(u1,1e-10))) * Math.cos(2*Math.PI*u2);
      }
      // Correlated normals via Cholesky: w = L·z
      const w = [
        L[0][0]*z[0],
        L[1][0]*z[0] + L[1][1]*z[1],
        L[2][0]*z[0] + L[2][1]*z[1] + L[2][2]*z[2],
      ];

      // Simulate terminal price for each asset
      const sTs = tradeParams.map(tp => {
        const wi = w[tp.aidx];
        return tp.spot * Math.exp(-0.5*tp.iv*tp.iv*tp.T + tp.sigma*wi);
      });

      // Sum payoffs across all trades in this path
      let pathPnl = 0;
      tradeParams.forEach((tp, j) => {
        const sT = sTs[j];
        let payoff = 0;
        if (tp.type === 'credit' || tp.type === 'debit') {
          const leg0=tp.legs[0]??'', leg1=tp.legs[1]??'';
          const side=(leg0+leg1).toLowerCase().includes('put')?'put':'call';
          const k0=parseFloat((leg0.match(/\$([\d.]+)/)||[])[1]??0);
          const k1=parseFloat((leg1.match(/\$([\d.]+)/)||[])[1]??0);
          if (tp.credit) {
            const shortK=side==='put'?Math.max(k0,k1):Math.min(k0,k1);
            const longK =side==='put'?Math.min(k0,k1):Math.max(k0,k1);
            const sP=side==='put'?Math.max(0,shortK-sT):Math.max(0,sT-shortK);
            const lP=side==='put'?Math.max(0,longK-sT) :Math.max(0,sT-longK);
            payoff=-(sP-lP);
          } else {
            const longK =side==='put'?Math.max(k0,k1):Math.min(k0,k1);
            const shortK=side==='put'?Math.min(k0,k1):Math.max(k0,k1);
            const lP=side==='put'?Math.max(0,longK-sT) :Math.max(0,sT-longK);
            const sP=side==='put'?Math.max(0,shortK-sT):Math.max(0,sT-shortK);
            payoff=lP-sP;
          }
        } else if (tp.type==='calendar'||tp.type==='diagonal') {
          const em=tp.spot*tp.iv*Math.sqrt(tp.T);
          const dist=Math.abs(sT-tp.spot);
          const w2=tp.type==='diagonal'?0.35:0.5;
          payoff=dist<em*w2?(tp.width??5)*0.15:-Math.min((tp.width??5)*0.4,(dist-em*w2)*0.3);
        } else if (tp.type==='condor') {
          const psk=parseFloat(((tp.legs[0]??'').match(/\$([\d.]+)\s+put/i)||[])[1]??tp.spot*0.95);
          const csk=parseFloat(((tp.legs[1]??'').match(/\$([\d.]+)\s+call/i)||[])[1]??tp.spot*1.05);
          const w3=tp.width??5;
          payoff=sT>psk&&sT<csk?w3*0.28:sT<=psk?Math.max(-w3,-(psk-sT)):Math.max(-w3,-(sT-csk));
        } else if (tp.type==='bwb') {
          const bk=parseFloat(((tp.legs[1]??'').match(/\$([\d.]+)/)||[])[1]??tp.spot);
          const side=(tp.legs[0]??'').toLowerCase().includes('put')?'put':'call';
          const mv=side==='put'?tp.spot-sT:sT-tp.spot;
          const w4=tp.width??5;
          payoff=mv<0?w4*0.15:mv<w4?w4*0.15-mv*0.5:mv<w4*2?-(mv-w4):-(w4*0.9);
        }
        pathPnl += payoff * tp.contracts * 100; // × $100 multiplier
      });
      portfolioPnls.push(pathPnl);
    }

    portfolioPnls.sort((a,b)=>a-b);
    const cut5  = Math.floor(N*0.05);
    const cut1  = Math.floor(N*0.01);
    const tail5 = portfolioPnls.slice(0, cut5);
    const tail1 = portfolioPnls.slice(0, cut1);
    const cvar5 = Math.abs(tail5.reduce((s,v)=>s+v,0)/tail5.length);
    const cvar1 = Math.abs(tail1.reduce((s,v)=>s+v,0)/tail1.length);
    const mean  = portfolioPnls.reduce((s,v)=>s+v,0)/N;
    const pct5  = portfolioPnls[cut5];  // 5th percentile P&L
    const stdev = Math.sqrt(portfolioPnls.reduce((s,v)=>s+(v-mean)**2,0)/N);

    // Diversification benefit: sum of individual CVaRs vs portfolio CVaR
    // Individual CVaRs are already in dollars (from tradePayoff which uses width, not ×100)
    // Re-scale: tradePayoff returns width-based loss, we need ×100 multiplier
    const sumIndivCvar = trades.reduce((s,t)=>{
      // cvar stored on trade is already per-trade (cvarPerUnit × contracts), width-based
      // multiply by 100 to get dollar value
      return s + (t.cvar??0)*100;
    },0);
    const diversBenefit = Math.max(0, sumIndivCvar - cvar5);
    const diversPct = sumIndivCvar > 0 ? (diversBenefit/sumIndivCvar*100).toFixed(0) : 0;

    return {
      cvar5, cvar1, mean, stdev, pct5,
      corrRegime, corrMatrix,
      sumIndivCvar, diversBenefit, diversPct,
      totalBudget: trades.reduce((s,t)=>s+(t.cvarBudget??800),0),
    };
  }

  const portCVaR = portfolioCVaR(trades, {spy:spyP2,gld:gldP2,tlt:tltP2}, {spy:spyIV,gld:gldIV,tlt:tltIV});

  // ── Continuous Risk Score ──
  // Per-asset score 0–100. Hard overrides pin to Red (100) before scoring runs.
  // Weights: CVaR/budget 35%, VVIX 25%, VIX absolute 20%, Skew 20%.
  // VVIX contribution is neutral (50) when neither API nor manual entry available.
  const vvixKnown = !!(indices.vvixIsAPI || indices.vvixIsManual);
  // vixMomPct already computed above (shared with calcBias)
  const vixSurging = vixMomPct !== null && vixMomPct >= 10; // ≥10% day-over-day → Red override

  function calcRiskScore(assetLabel, vrp, skewCondStr, cvarPerUnit, budget) {
    // ── Hard overrides — pin to 100 (Red) immediately ──
    if (vrp < 0)       return { score:100, override:'Negative VRP', tier:'Red' };
    if (vixSurging)    return { score:100, override:`VIX +${vixMomPct.toFixed(1)}% surge`, tier:'Red' };

    // ── Continuous scoring ──
    // Each component returns 0 (greenest) → 100 (reddest), then weighted.

    // 1. CVaR/budget ratio (35%) — 0% → green, ≥100% → red
    let cvarScore = 50; // neutral if unknown
    if (cvarPerUnit != null && budget > 0) {
      cvarScore = Math.min(100, Math.max(0, (cvarPerUnit / budget) * 100));
    }

    // 2. VVIX (25%) — ≤90 → green (0), ≥130 → red (100), neutral (50) if unknown
    let vvixScore = 50;
    if (vvixKnown) {
      vvixScore = Math.min(100, Math.max(0, (vvix - 90) / (130 - 90) * 100));
    }

    // 3. VIX absolute (20%) — ≤15 → green (0), ≥28 → red (100)
    const vixScore = Math.min(100, Math.max(0, (vix - 15) / (28 - 15) * 100));

    // 4. Skew (20%) — Elevated → red (100), Normal → mid (40), Inverted → green (0), N/A → neutral (50)
    const skewScore = skewCondStr==='Elevated' ? 100
                    : skewCondStr==='Normal'   ? 40
                    : skewCondStr==='Inverted' ? 0
                    : 50; // N/A

    const score = Math.round(cvarScore*0.35 + vvixScore*0.25 + vixScore*0.20 + skewScore*0.20);
    const tier  = score <= 33 ? 'Green' : score <= 66 ? 'Amber' : 'Red';

    return {
      score, tier, override: null,
      components: {
        cvar:  { score: Math.round(cvarScore),  weight: 35, label: 'CVaR/budget' },
        vvix:  { score: Math.round(vvixScore),  weight: 25, label: 'VVIX', neutral: !vvixKnown },
        vix:   { score: Math.round(vixScore),   weight: 20, label: 'VIX level' },
        skew:  { score: Math.round(skewScore),  weight: 20, label: 'Skew' },
      },
    };
  }

  // Find best (highest-score) cvarPerUnit for each asset from top trades
  // Use the trade that represents each asset most fairly (lowest cvarPerUnit = most benign)
  function bestCvarForAsset(label) {
    const ts = trades.filter(t => t.label === label && t.cvarPerUnit != null);
    if (!ts.length) return null;
    return Math.min(...ts.map(t => t.cvarPerUnit));
  }

  const riskScore = {
    spy: calcRiskScore('SPY', spyVRP, skewCond(CA?.skew25??null), bestCvarForAsset('SPY'), CVAR_BUDGETS['SPY']),
    gld: calcRiskScore('GLD', gldVRP, skewCond(CB?.skew25??null), bestCvarForAsset('GLD'), CVAR_BUDGETS['GLD']),
    tlt: calcRiskScore('TLT', tltVRP, skewCond(CC?.skew25??null), bestCvarForAsset('TLT'), CVAR_BUDGETS['TLT']),
  };

  // Sizing modifier from risk tier
  // Green → full CVaR-budget sizing, Amber → half size (round up), Red → debit only / 1 contract
  function tierSizeModifier(tier) {
    return tier==='Green' ? 1.0 : tier==='Amber' ? 0.5 : 0.0; // 0 = debit-only (handled in trade gen)
  }

  return {
    greeksLive:isMarketHours(), rvLive,
    prices:{spy:spyP2,gld:gldP2,tlt:tltP2}, changes,
    vix:{val:vix,pct:vixPct,reg:vixReg,prev:indices.vix1},
    vvix:{val:vvix,pct:vvixPct},
    move:{val:move,reg:moveReg,prev:indices.move1,proxy:moveIsProxy},
    dxy:{val:dxy}, tnx:{val:tnx},
    iv:{spy:spyIV,gld:gldIV,tlt:tltIV},
    farIV:{spy:spyFarIV,gld:gldFarIV,tlt:tltFarIV},
    rv:{spy:{val:spyRV,data:rvData.SPY},gld:{val:gldRV,data:rvData.GLD},tlt:{val:tltRV,data:rvData.TLT}},
    vrp:{spy:spyVRP.toFixed(1),gld:gldVRP.toFixed(1),tlt:tltVRP.toFixed(1)},
    ts_struct:{spy:spyTs,gld:gldTs,tlt:tltTs},
    skew:{spy:CA?.skew25??null,gld:CB?.skew25??null,tlt:CC?.skew25??null},
    skewSource:{spy:CA?.skewSource??'unavailable',gld:CB?.skewSource??'unavailable',tlt:CC?.skewSource??'unavailable'},
    skewCond:{spy:skewCond(CA?.skew25??null),gld:skewCond(CB?.skew25??null),tlt:skewCond(CC?.skew25??null)},
    iv25:{spy:{c:CA?.iv25C,p:CA?.iv25P},gld:{c:CB?.iv25C,p:CB?.iv25P},tlt:{c:CC?.iv25C,p:CC?.iv25P}},
    oi:{spy:{pc:CA?.pcRatio??'—',callOI:CA?.callOI??0,putOI:CA?.putOI??0,walls:CA?.walls??[]},gld:{pc:CB?.pcRatio??'—',callOI:CB?.callOI??0,putOI:CB?.putOI??0,walls:CB?.walls??[]},tlt:{pc:CC?.pcRatio??'—',callOI:CC?.callOI??0,putOI:CC?.putOI??0,walls:CC?.walls??[]}},
    straddle:{spy:f(CA?.straddleMid??0),gld:f(CB?.straddleMid??0),tlt:f(CC?.straddleMid??0)},
    volReg:{spy:volR(spyIV),gld:volR(gldIV),tlt:volR(tltIV)},
    _debugChains:{ SPY:chainsNear.SPY?.debug, GLD:chainsNear.GLD?.debug, TLT:chainsNear.TLT?.debug },
    em:{
      spy:{d7:emCalc(spyP2,spyIV,7),d15:emCalc(spyP2,spyIV,15),d30:emCalc(spyP2,spyIV,30),d45:emCalc(spyP2,spyIV,45),d60:emCalc(spyP2,spyIV,60)},
      gld:{d7:emCalc(gldP2,gldIV,7),d15:emCalc(gldP2,gldIV,15),d30:emCalc(gldP2,gldIV,30),d45:emCalc(gldP2,gldIV,45),d60:emCalc(gldP2,gldIV,60)},
      tlt:{d7:emCalc(tltP2,tltIV,7),d15:emCalc(tltP2,tltIV,15),d30:emCalc(tltP2,tltIV,30),d45:emCalc(tltP2,tltIV,45),d60:emCalc(tltP2,tltIV,60)},
    },
    dnt, regime, trades, portCVaR, riskScore,
    stratSel:{spy:spyStrat,gld:gldStrat,tlt:tltStrat},
    mod:{spy:vix>28?'Reduce':vix<18?'Increase':'Maintain',gld:gldVRP<0?'Reduce':'Maintain',tlt:move>110?'Reduce':'Maintain'},
    bias,
  };
}

/* ── Main fetch ── */
async function runBriefing(sid) {
  S.loading=true; S.errs=[]; S.warns=[]; render();
  try {
    // ETF bars for RV (30+ calendar days)
    const [spyB,gldB,tltB]=await Promise.all(
      ['SPY','GLD','TLT'].map(t=>stockBarsLong(t,35).catch(e=>{S.warns.push(`${t} bars: ${e.message}`);return[];}))
    );
    const rvData={SPY:calcRV(spyB,20),GLD:calcRV(gldB,20),TLT:calcRV(tltB,20)};
    if(!rvData.SPY) S.warns.push('SPY RV: insufficient data — using structural estimate');
    if(!rvData.GLD) S.warns.push('GLD RV: insufficient data — using structural estimate');
    if(!rvData.TLT) S.warns.push('TLT RV: insufficient data — using structural estimate');

    // Stock prices
    const [spyPr,gldPr,tltPr]=await Promise.all(['SPY','GLD','TLT'].map(t=>stockPrev(t).catch(()=>null)));
    const stocks={
      SPY:{price:spyB.at(-1)?.c??spyPr?.c??0, prevClose:spyPr?.c??spyB.at(-2)?.c??0},
      GLD:{price:gldB.at(-1)?.c??gldPr?.c??0, prevClose:gldPr?.c??gldB.at(-2)?.c??0},
      TLT:{price:tltB.at(-1)?.c??tltPr?.c??0, prevClose:tltPr?.c??tltB.at(-2)?.c??0},
    };

    // ── Index data — Polygon Starter proxies ──
    // VIX   → spyIV × 100 (computed in buildBriefing from chain)
    // DXY   → 96.5 / C:EURUSD (Polygon forex, Starter plan ✓)
    // 10Y   → 3.875 / (tltPrice/100) proxy from TLT bars already fetched
    // VVIX/VIX3M/MOVE → manual override only (index plan required)
    // All *1 (prev day) values populated so momentum signals fire correctly.
    // Manual override fields (Today + Prev) take priority over all proxies.

    const eurusdB = await polyForex('C:EURUSD', 3).catch(()=>[]);
    const fv  = arr => arr[0]?.value ?? null;
    const fv1 = arr => arr[1]?.value ?? null;

    // DXY proxy from EUR/USD
    const eurusd  = fv(eurusdB);
    const eurusd1 = fv1(eurusdB);
    const dxyProxy  = eurusd  ? parseFloat((96.5 / eurusd ).toFixed(2)) : null;
    const dxyProxy1 = eurusd1 ? parseFloat((96.5 / eurusd1).toFixed(2)) : null;

    // 10Y proxy from TLT price (tltB already fetched above)
    const tltClose  = tltB.at(-1)?.c ?? 0;
    const tltClose1 = tltB.at(-2)?.c ?? 0;
    const tnxProxy  = tltClose  > 0 ? parseFloat((3.875 / (tltClose /100)).toFixed(2)) : null;
    const tnxProxy1 = tltClose1 > 0 ? parseFloat((3.875 / (tltClose1/100)).toFixed(2)) : null;

    const indices = {
      vix:  null,      vix1:  null,       // derived in buildBriefing from spyIV
      dxy:  dxyProxy,  dxy1:  dxyProxy1,  // EUR/USD inversion proxy
      tnx:  tnxProxy,  tnx1:  tnxProxy1,  // TLT price proxy
      realYield: null, realYield1: null, breakeven: null,
      vvix: null, vix3m: null, move: null, move1: null,
      vvixIsAPI: false,
    };

    // Manual overrides — Today fields override proxy; Prev fields override proxy prev.
    // Both fields filled → momentum signal fires with your numbers.
    // Only Today filled → value used, momentum signal stays null (no prev to diff against).
    if (OV.vix  && !isNaN(+OV.vix))  { indices.vix  = +OV.vix;  S.warns.push('VIX: manual today'); }
    if (OV.vix1 && !isNaN(+OV.vix1)) { indices.vix1 = +OV.vix1; }
    if (OV.vvix && !isNaN(+OV.vvix)) { indices.vvix = +OV.vvix; indices.vvixIsManual=true; S.warns.push('VVIX: manual today'); }
    if (OV.vvix1&& !isNaN(+OV.vvix1)){ indices.vvix1= +OV.vvix1; }
    if (OV.move && !isNaN(+OV.move)) { indices.move = +OV.move; S.warns.push('MOVE: manual today'); }
    if (OV.move1&& !isNaN(+OV.move1)){ indices.move1= +OV.move1; }
    if (OV.dxy  && !isNaN(+OV.dxy))  { indices.dxy  = +OV.dxy; }
    if (OV.dxy1 && !isNaN(+OV.dxy1)) { indices.dxy1 = +OV.dxy1; }
    if (OV.tnx  && !isNaN(+OV.tnx))  { indices.tnx  = +OV.tnx; }
    if (OV.tnx1 && !isNaN(+OV.tnx1)) { indices.tnx1 = +OV.tnx1; }
    if (OV.ry   && !isNaN(+OV.ry))   { indices.realYield  = +OV.ry; }
    if (OV.ry1  && !isNaN(+OV.ry1))  { indices.realYield1 = +OV.ry1; }
    if (OV.vix3m && !isNaN(+OV.vix3m)) { indices.vix3m = +OV.vix3m; }
    const tnx10 = indices.tnx;

    // Fetch the most recent minute bar for each ETF to get a live spot price.
    // Done once here (not inside each optionChain call) to avoid race conditions
    // from 6 parallel fetches all writing to _chainSpots simultaneously.
    // Walks back up to 5 trading days to handle weekends/holidays.
    async function fetchLastMinutePrice(ticker, fallback) {
      // 1. Try snapshot endpoint first — gives real-time last trade price
      try {
        const j = await apiFetch(
          `https://api.polygon.io/v2/snapshot/locale/us/markets/stocks/tickers/${ticker}?apiKey=${KEY}`,
          `snapshot/${ticker}`
        );
        const lastTrade = j.ticker?.lastTrade?.p ?? 0;
        const dayClose  = j.ticker?.day?.c ?? 0;
        const prevClose = j.ticker?.prevDay?.c ?? 0;
        const p = lastTrade || dayClose || 0;
        if (p > 0) return p;
      } catch(e) { /* fall through to minute bars */ }
      // 2. Minute bars fallback — walk back up to 5 trading days
      const etNow = toET(new Date());
      for (let daysBack = 0; daysBack <= 5; daysBack++) {
        const d = new Date(etNow);
        d.setDate(d.getDate() - daysBack);
        if (d.getDay() === 0 || d.getDay() === 6) continue;
        const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        try {
          const j = await apiFetch(
            `https://api.polygon.io/v2/aggs/ticker/${ticker}/range/1/minute/${ds}/${ds}?adjusted=true&sort=desc&limit=1&apiKey=${KEY}`,
            `minute/${ticker}/${ds}`
          );
          const p = j.results?.[0]?.c ?? 0;
          if (p > 0) return p;
        } catch(e) { /* try next day */ }
      }
      return fallback;
    }
    const [spySpot, gldSpot, tltSpot] = await Promise.all([
      fetchLastMinutePrice('SPY', stocks.SPY.price),
      fetchLastMinutePrice('GLD', stocks.GLD.price),
      fetchLastMinutePrice('TLT', stocks.TLT.price),
    ]);
    _chainSpots = { SPY: spySpot, GLD: gldSpot, TLT: tltSpot };
    // Update stock prices to the live minute bar values for display
    if (spySpot > 0) stocks.SPY.price = spySpot;
    if (gldSpot > 0) stocks.GLD.price = gldSpot;
    if (tltSpot > 0) stocks.TLT.price = tltSpot;

    // Options chains — near (10–23 DTE) AND far (35–55 DTE) for term structure
    const [spyNear,gldNear,tltNear,spyFar,gldFar,tltFar]=await Promise.all([
      optionChain('SPY',10,23,spySpot).catch(e=>{S.warns.push(`SPY near chain: ${e.message}`);return[];}),
      optionChain('GLD',10,23,gldSpot).catch(e=>{S.warns.push(`GLD near chain: ${e.message}`);return[];}),
      optionChain('TLT',10,23,tltSpot).catch(e=>{S.warns.push(`TLT near chain: ${e.message}`);return[];}),
      optionChain('SPY',35,55,spySpot).catch(e=>{S.warns.push(`SPY far chain: ${e.message}`);return[];}),
      optionChain('GLD',35,55,gldSpot).catch(e=>{S.warns.push(`GLD far chain: ${e.message}`);return[];}),
      optionChain('TLT',35,55,tltSpot).catch(e=>{S.warns.push(`TLT far chain: ${e.message}`);return[];}),
    ]);

    const chainsNear={SPY:analyseChain(spyNear,stocks.SPY.price,spyNear._dateFrom,spyNear._dateTo,_chainSpots.SPY,'SPY'),GLD:analyseChain(gldNear,stocks.GLD.price,gldNear._dateFrom,gldNear._dateTo,_chainSpots.GLD,'GLD'),TLT:analyseChain(tltNear,stocks.TLT.price,tltNear._dateFrom,tltNear._dateTo,_chainSpots.TLT,'TLT')};
    const chainsFar ={SPY:analyseChain(spyFar, stocks.SPY.price,spyFar._dateFrom,spyFar._dateTo,_chainSpots.SPY,'SPY'),GLD:analyseChain(gldFar, stocks.GLD.price,gldFar._dateFrom,gldFar._dateTo,_chainSpots.GLD,'GLD'),TLT:analyseChain(tltFar, stocks.TLT.price,tltFar._dateFrom,tltFar._dateTo,_chainSpots.TLT,'TLT')};

    if(!isMarketHours()) S.warns.push('Outside market hours — 25Δ greeks estimated via BS strike approximation (live greeks: 9:30–4:00 PM ET)');

    S.briefs[sid]=buildBriefing({stocks,rvData,indices,chainsNear,chainsFar,tnx10});
    S.sid=sid; S.tab='overview';
  } catch(e) { S.errs.push(e.message); }
  S.loading=false; render();
}

function chgHTML(c){
  const n=parseFloat(c.pct),cls=n>=0?'up':'dn';
  return `<span class="${cls}">${n>=0?'+':''}${c.ch} (${n>=0?'+':''}${c.pct}%)</span>`;
}
function skewBarHTML(skewVal){
  if(skewVal==null) return `<div style="font-size:11px;color:#aaa">N/A outside market hours</div>`;
  const pts=skewVal*100, pct=Math.min(100,Math.max(0,50+pts*300));
  const color=pts>4?'#dc2626':pts< -1?'#2563eb':'#22c55e';
  return `<div class="skew-visual"><div class="skew-track"><div class="skew-fill" style="width:${pct}%;background:${color}"></div></div><div class="skew-pts">${pts>=0?'+':''}${pts.toFixed(1)} pts</div></div>`;
}
function iv25HTML(iv25,side){
  const val=iv25?.[side];
  return (val==null||val===0)?'<span style="color:#aaa">—</span>':fp(val);
}
function sparklineHTML(returns){
  if(!returns||!returns.length) return '';
  const maxAbs=Math.max(...returns.map(Math.abs),0.001);
  return `<div class="sparkline">${returns.slice(-20).map(r=>{
    const h=Math.max(2,Math.round(Math.abs(r)/maxAbs*26));
    return `<div class="spark-bar" style="height:${h}px;background:${r>=0?'#16a34a':'#dc2626'}"></div>`;
  }).join('')}</div>`;
}
function vrpBarHTML(iv,rv){

  return `<div class="vrp-bar-wrap">
    <div class="vrp-bar-label"><span>RV ${fp(rv)}</span><span>IV ${fp(iv)}</span></div>

function tsCardHTML(ticker, b) {
  const a=ticker.toLowerCase();
  const ts=b.ts_struct[a];
  const nearIV=b.iv[a], farIV=b.farIV[a];
  if (!ts) return `<div class="ts-card">
    <div class="ts-header"><div class="ts-ticker">${ticker}</div><span class="badge bx">No far chain data</span></div>
    <div class="ts-body"><div style="font-size:11px;color:#aaa">Far expiry chain (35–55 DTE) unavailable. VIX/VIX3M fallback also unavailable for this asset.</div></div>
  </div>`;

  const maxIV=Math.max(nearIV,farIV??nearIV,0.01);
  const nearPct=((nearIV/maxIV)*100).toFixed(0);
  const farPct =(((farIV??nearIV)/maxIV)*100).toFixed(0);

  return `<div class="ts-card">
    <div class="ts-header">
      <div class="ts-ticker">${ticker}</div>
      <span class="badge ${tsbadge(ts.regime)}">${ts.label}</span>
    </div>
    <div class="ts-body">
      <div class="ts-row">
        <div class="ts-label">Near IV (~15D)</div>
        <div class="ts-val">${fp(nearIV)}</div>
      </div>
      <div class="ts-row">
        <div class="ts-label">Far IV (~45D)</div>
        <div class="ts-val">${farIV?fp(farIV):'—'}</div>
      </div>
      <div class="ts-row">
        <div class="ts-label">Near/Far ratio</div>
        <div class="ts-val ${ts.ratio>1.05?'up':ts.ratio<0.95?'dn':'mu'}">${ts.ratio?.toFixed(3)??'—'}</div>
      </div>
      <div class="ts-row">
        <div class="ts-label">Source</div>
        <div class="ts-val" style="font-size:11px;color:#888">${ts.source==='chain'?'Options chain (both expirations)':'VIX / VIX3M ratio (fallback)'}</div>
      </div>
      <div class="ts-row">
        <div class="ts-label">Strategy implication</div>
        <div class="ts-val ${stratbadge(b.stratSel[a].type)}" style="font-size:11px;color:${stratColor(b.stratSel[a].type)};font-weight:600">${b.stratSel[a].label}</div>
      </div>
      <div class="ts-slope-wrap">
        <div class="ts-slope-labels">
          <span>Near ${fp(nearIV)}</span>
          <span>Far ${farIV?fp(farIV):'—'}</span>
        </div>
        <div class="ts-slope-track">
          <div class="ts-slope-far"  style="width:${farPct}%"></div>
          <div class="ts-slope-near" style="width:${nearPct}%"></div>
        </div>
        <div style="font-size:9px;color:#aaa;margin-top:4px">Red = near IV · Blue = far IV · Near > Far = contango</div>
      </div>
    </div>
  </div>`;
}

    <div class="rv-header"><div class="rv-ticker">${ticker}</div><span class="badge ${vrpCls}">${vrpSig}</span></div>

      <div class="rv-row"><div class="rv-label">VRP (IV − RV)</div><div class="rv-val ${vrpVal>=0?'up':'dn'}">${sgn(b.vrp[a])}${b.vrp[a]} pts</div></div>
      ${data?`<div class="rv-row"><div class="rv-label">Trading days</div><div class="rv-val">${data.nDays}</div></div>`:''}

}

      <div class="exec-ticker" style="font-size:13px">${a.toUpperCase()}</div>

  <div class="sh">Expected moves</div>

      <div class="list-label" style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;flex:1.4">Asset / DTE</div>
      <div class="list-val" style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase">±$</div>
      <div class="list-val" style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase">±%</div>
    </div>
    ${['spy','gld','tlt'].flatMap(a=>[7,15,30,45,60].map(d=>{
      const e=b.em[a]['d'+d],spot=b.prices[a];
      return `<div class="list-row">
        <div class="list-label" style="flex:1.4">${a.toUpperCase()} ${d}D · ${fp(b.iv[a])}</div>
        <div class="list-val">±${f$(e)}</div>
        <div class="list-val">±${spot?((e/spot)*100).toFixed(2):'—'}%</div>
      </div>`;
    })).join('')}
  </div>

  <div class="sh">OI walls — zone-based S/R (pin · support/resistance · tail)</div>
  ${['spy','gld','tlt'].map(a => {
    const walls = (b.oi[a].walls||[]);
    const spot = b.prices[a];
    const em15 = b.em[a]?.d15 ?? null;
    const totalCallOI = b.oi[a].callOI || 0;
    const totalPutOI  = b.oi[a].putOI  || 0;

    // Group walls by zone
    const zones = {
      pin:  walls.filter(w=>w.zone==='pin'),
      sr:   walls.filter(w=>w.zone==='sr'),
      tail: walls.filter(w=>w.zone==='tail'),
    };
    const zoneConfig = [
      { key:'pin',  label:'Pin',              labelCol:'#7c3aed', labelBg:'#f3e8ff' },
      { key:'sr',   label:'Support/Resist',   labelCol:'#1d4ed8', labelBg:'#dbeafe' },
      { key:'tail', label:'Tail',             labelCol:'#888',    labelBg:'#f0f0ee' },
    ];

    const renderChip = w => {
      const dist = spot && w.strike ? w.strike - spot : null;
      const distPct = spot && dist !== null ? (dist / spot * 100) : null;
      const distStr = distPct !== null
        ? `${distPct>=0?'+':''}${distPct.toFixed(1)}% / ${dist>=0?'+':''}${f$(Math.abs(dist))}`
        : '';
      const distCol = distPct === null ? '#aaa'
        : Math.abs(distPct) < 1.5 ? '#d97706'
        : distPct > 0 ? '#1d4ed8'
        : '#dc2626';
      const absDist = dist !== null ? Math.abs(dist) : null;
      const inEM = em15 && absDist !== null ? absDist <= em15 : null;
      const emBadge = inEM === null ? ''
        : inEM
          ? `<span style="font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;background:#fef3c7;color:#92400e">IN EM</span>`
          : `<span style="font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;background:#f0f0ee;color:#888">OUT</span>`;
      const sideTotal = w.type==='call' ? totalCallOI : totalPutOI;
      const concPct = sideTotal > 0 ? (w.oi / sideTotal * 100) : null;
      const concStr = concPct !== null ? concPct.toFixed(0)+'%' : '';
      const concCol = concPct === null ? '#aaa' : concPct >= 50 ? '#dc2626' : concPct >= 30 ? '#d97706' : '#aaa';
      const pinning = w.dte != null && w.dte <= 14;
      const pinBadge = pinning
        ? `<span style="font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;background:#fee2e2;color:#b91c1c">⚡ ${w.dte}D</span>`
        : w.dte != null ? `<span style="font-size:8px;color:#bbb">${w.dte}D</span>` : '';
      return `<div class="wall-chip ${w.type==='call'?'wc-call':'wc-put'}" style="flex-direction:column;align-items:flex-start;gap:3px;${inEM?'border-color:#d97706;':'opacity:0.8;'}">
        <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
          <span class="wc-type">${w.type==='call'?'C':'P'}</span>
          <span>${f$(w.strike)}</span>
          <span style="color:#aaa;font-size:10px">${w.oi>=1000?(w.oi/1000).toFixed(1)+'k':w.oi}</span>
          ${concStr?`<span style="font-size:9px;font-weight:700;color:${concCol}">${concStr}</span>`:''}
          ${emBadge}${pinBadge}
        </div>
        ${distStr?`<div style="font-size:9px;font-weight:600;color:${distCol};padding-left:2px">${distStr}</div>`:''}
      </div>`;
    };

    const hasAny = walls.length > 0;
    const emStr = em15 ? ` · 15D EM ±${f$(em15)}` : '';
    return `<div style="margin-bottom:14px">
      <div style="font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px">${a.toUpperCase()} · spot ${f$(spot)}${emStr}</div>
      ${hasAny ? zoneConfig.map(({key,label,labelCol,labelBg})=>{
        const zw = zones[key];
        if (!zw.length) return '';
        return `<div style="margin-bottom:8px">
          <div style="font-size:9px;font-weight:700;color:${labelCol};background:${labelBg};display:inline-block;padding:1px 7px;border-radius:4px;margin-bottom:5px">${label}</div>
          <div class="wall-chips">${zw.map(renderChip).join('')}</div>
        </div>`;
      }).join('') : '<span style="font-size:11px;color:#bbb">No data</span>'}
    </div>`;
  }).join('')}`;
}

/* ─── Trades ─── */
function renderTrades(b) {
  const typeStyle = t => {
    if (t==='calendar') return 'background:#dbeafe;color:#1d4ed8';
    if (t==='diagonal') return 'background:#f3e8ff;color:#7c3aed';
    if (t==='debit')    return 'background:#fef3c7;color:#b45309';
    if (t==='condor')   return 'background:#f0fdf4;color:#15803d';
    if (t==='bwb')      return 'background:#fdf2f8;color:#9d174d';
    return 'background:#dcfce7;color:#15803d';
  };
  const typeLabel = t => ({calendar:'Cal',diagonal:'Diag',debit:'Debit',condor:'Condor',bwb:'BWB',credit:'Credit'})[t]??t;

  if (!b.trades||!b.trades.length) {
    return '<div class="content"><div class="alert alert-warn">No trades generated — all assets HOLD or no qualifying strikes at \u226565% P(OTM).</div></div>';
  }

  // ── Portfolio CVaR panel ──
  const pc = b.portCVaR;
  const portPanel = pc ? (()=>{
    const totalBudget = pc.totalBudget;
    const pctUsed = Math.min(100, (pc.cvar5 / totalBudget * 100));
    const col = pc.cvar5 > totalBudget ? '#dc2626' : pc.cvar5 > totalBudget*0.7 ? '#d97706' : '#16a34a';
    const trackCol = pc.cvar5 > totalBudget ? '#fee2e2' : pc.cvar5 > totalBudget*0.7 ? '#fef3c7' : '#dcfce7';
    const signal = pc.cvar5 > totalBudget ? '⚠ Over budget — reduce size'
                 : pc.cvar5 > totalBudget*0.7 ? '~ Near budget — monitor'
                 : '✓ Within budget';
    const signalCol = pc.cvar5 > totalBudget ? '#b91c1c' : pc.cvar5 > totalBudget*0.7 ? '#92400e' : '#15803d';

    return '<div style="background:#fff;border:0.5px solid #e0e0de;border-radius:12px;padding:12px 14px;margin-bottom:12px">'
      // Header
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
      +'<div style="font-size:12px;font-weight:700">Portfolio CVaR</div>'
      +'<span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;background:#f3e8ff;color:#7c3aed">Correlated MC · '+pc.corrRegime+' regime</span>'
      +'</div>'

      // Main CVaR bar
      +'<div style="margin-bottom:10px">'
      +'<div style="display:flex;justify-content:space-between;font-size:10px;color:#aaa;margin-bottom:4px">'
      +'<span>5% CVaR (worst-case expected loss)</span>'
      +'<span style="font-weight:600;color:'+col+'">$'+pc.cvar5.toFixed(0)+' / $'+totalBudget+'</span>'
      +'</div>'
      +'<div style="height:7px;background:'+trackCol+';border-radius:4px;overflow:hidden;margin-bottom:4px">'
      +'<div style="width:'+pctUsed.toFixed(0)+'%;height:100%;background:'+col+';border-radius:4px"></div>'
      +'</div>'
      +'<div style="font-size:11px;font-weight:600;color:'+signalCol+'">'+signal+'</div>'
      +'</div>'

      // Metrics grid
      +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px">'
      +'<div style="background:#f8f8f6;border-radius:8px;padding:7px 9px">'
      +'<div style="font-size:9px;color:#aaa;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px">1% CVaR</div>'
      +'<div style="font-size:13px;font-weight:600;color:#dc2626">$'+pc.cvar1.toFixed(0)+'</div>'
      +'<div style="font-size:9px;color:#aaa">extreme tail</div>'
      +'</div>'
      +'<div style="background:#f8f8f6;border-radius:8px;padding:7px 9px">'
      +'<div style="font-size:9px;color:#aaa;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px">Exp P&L</div>'
      +'<div style="font-size:13px;font-weight:600;color:'+(pc.mean>=0?'#16a34a':'#dc2626')+'">'+(pc.mean>=0?'+':'')+'$'+pc.mean.toFixed(0)+'</div>'
      +'<div style="font-size:9px;color:#aaa">avg at expiry</div>'
      +'</div>'
      +'<div style="background:#f8f8f6;border-radius:8px;padding:7px 9px">'
      +'<div style="font-size:9px;color:#aaa;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px">Diversif.</div>'
      +'<div style="font-size:13px;font-weight:600;color:#1d4ed8">'+pc.diversPct+'%</div>'
      +'<div style="font-size:9px;color:#aaa">tail risk offset</div>'
      +'</div>'
      +'</div>'

      // Correlation context
      +'<div style="border-top:0.5px solid #f0f0ee;padding-top:8px">'
      +'<div style="font-size:10px;color:#888;margin-bottom:5px;font-weight:600">Correlation assumptions ('+pc.corrRegime+' regime)</div>'
      +'<div style="display:flex;gap:8px;flex-wrap:wrap">'
      +'<div style="font-size:10px;color:#666;background:#f8f8f6;border-radius:6px;padding:3px 8px">SPY↔TLT '+(pc.corrMatrix[0][2]>=0?'+':'')+pc.corrMatrix[0][2].toFixed(2)+'</div>'
      +'<div style="font-size:10px;color:#666;background:#f8f8f6;border-radius:6px;padding:3px 8px">SPY↔GLD '+(pc.corrMatrix[0][1]>=0?'+':'')+pc.corrMatrix[0][1].toFixed(2)+'</div>'
      +'<div style="font-size:10px;color:#666;background:#f8f8f6;border-radius:6px;padding:3px 8px">GLD↔TLT '+(pc.corrMatrix[1][2]>=0?'+':'')+pc.corrMatrix[1][2].toFixed(2)+'</div>'
      +'</div>'
      +'<div style="font-size:9px;color:#bbb;margin-top:6px">Diversification benefit = sum of individual CVaRs − portfolio CVaR. '+pc.corrRegime+' regime shifts correlations — stress = stronger SPY/TLT flight-to-quality.</div>'
      +'</div>'
      +'</div>';
  })() : '';

  // CVaR budget summary — budgets are asset-specific
  const totalCvar = b.trades.reduce((s,t)=>s+(t.cvar??0),0);
  const totalBudget = b.trades.reduce((s,t)=>s+(t.cvarBudget??800),0);
  const budgetRows = b.trades.map(t=>{
    const c=t.cvar??0, bgt=t.cvarBudget??800, pct=Math.min(100,(c/bgt)*100);
    const col=c>bgt?'#dc2626':c>bgt*0.7?'#d97706':'#16a34a';
    const trackCol=c>bgt?'#fee2e2':c>bgt*0.7?'#fef3c7':'#dcfce7';
    return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">'
      +'<div style="font-size:10px;color:#666;width:72px;flex-shrink:0;white-space:nowrap">'+t.label+' '+t.strat.split(' ')[0]+'</div>'
      +'<div style="flex:1;height:5px;background:'+trackCol+';border-radius:3px;overflow:hidden">'
      +'<div style="width:'+pct.toFixed(0)+'%;height:100%;background:'+col+';border-radius:3px"></div>'
      +'</div>'
      +'<div style="font-size:10px;font-weight:600;color:'+col+';width:36px;text-align:right;flex-shrink:0">$'+c.toFixed(0)+'</div>'
      +'<div style="font-size:10px;color:#aaa;width:48px;text-align:right;flex-shrink:0">/ $'+bgt+'</div>'
      +'<div style="font-size:10px;color:#aaa;width:28px;text-align:right;flex-shrink:0">'+t.contracts+'×</div>'
      +'</div>';
  }).join('');
  const summaryPanel = '<div style="background:#fff;border:0.5px solid #e0e0de;border-radius:12px;padding:12px 14px;margin-bottom:12px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
    +'<div style="font-size:12px;font-weight:600">CVaR sizing — per-asset budgets</div>'
    +'<div style="font-size:11px;color:#888">Total: <strong style="color:'+(totalCvar>totalBudget?'#dc2626':totalCvar>totalBudget*0.7?'#d97706':'#1a1a1a')+'">$'+totalCvar.toFixed(0)+'</strong> of $'+totalBudget.toFixed(0)+'</div>'
    +'</div>'
    +budgetRows
    +'<div style="font-size:9px;color:#bbb;margin-top:6px">SPY budget $800 · GLD/TLT budget $400 · each = ~2% of allocated capital. Contracts sized to stay within budget.</div>'
    +'</div>';

  const rows = b.trades.map((t,i) => {
    const aggrBadge = t.aggressive ? '<span class="badge ba">Aggressive</span>' : '';
    const holdBadge = t.dntSig!=='PROCEED' ? '<span class="badge ba">HOLD</span>' : '';
    const tsBit = t.tsRatio ? '<div><div class="tg-l">TS ratio</div><div class="tg-v">'+t.tsRatio+'</div></div>' : '';
    const legsHtml = (t.legs??[]).map((leg,j) =>
      '<div><div class="tg-l">Leg '+(j+1)+'</div><div class="tg-v" style="font-size:11px;font-family:monospace">'+leg+'</div></div>'
    ).join('');
    return '<div class="trade-card" style="'+(t.aggressive?'border-color:#fbbf24;border-width:1.5px':'')+'">'
      + '<div class="trade-head">'
      +   '<div>'
      +     '<div class="trade-title">'+t.label+' — '+t.strat+'</div>'
      +     '<div style="font-size:10px;color:#888;margin-top:2px">'+t.expiry+' · '+t.contracts+' contract'+(t.contracts!==1?'s':'')+'</div>'
      +   '</div>'
      +   '<div style="display:flex;gap:4px;align-items:flex-start;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end">'
      +     '<span style="font-size:10px;padding:2px 7px;border-radius:6px;font-weight:600;'+typeStyle(t.type)+'">'+typeLabel(t.type)+'</span>'
      +     aggrBadge + holdBadge
      +   '</div>'
      + '</div>'
      + '<div class="trade-grid" style="margin-bottom:10px">'
      +   legsHtml
      +   '<div><div class="tg-l">Structure</div><div class="tg-v" style="font-size:11px">'+t.structure+'</div></div>'
      +   '<div><div class="tg-l">P(OTM)</div><div class="tg-v">'+t.potm+'</div></div>'
      +   '<div style="grid-column:1/-1"><div class="tg-l">Premium target</div><div class="tg-v" style="font-size:11px">'+t.premTarget+'</div></div>'
      +   '<div><div class="tg-l">Contracts</div><div class="tg-v">'+t.contracts+' × '+t.label+(t.cvarPerUnit?' <span style="font-size:10px;color:#aaa">($'+t.cvarPerUnit.toFixed(0)+'/unit)</span>':'')+'</div></div>'
      +   (t.cvar!=null?(()=>{
            const budget=t.cvarBudget??800;
            const pct=Math.min(100,(t.cvar/budget)*100);
            const col=t.cvar>budget?'#dc2626':t.cvar>budget*0.7?'#d97706':'#16a34a';
            const trackCol=t.cvar>budget?'#fee2e2':t.cvar>budget*0.7?'#fef3c7':'#dcfce7';
            return '<div style="grid-column:1/-1">'
              +'<div class="tg-l">CVaR (5%) · $'+budget+' budget</div>'
              +'<div style="display:flex;align-items:center;gap:8px;margin-top:2px">'
              +'<div style="flex:1;height:5px;background:'+trackCol+';border-radius:3px;overflow:hidden">'
              +'<div style="width:'+pct+'%;height:100%;background:'+col+';border-radius:3px"></div>'
              +'</div>'
              +'<div class="tg-v" style="color:'+col+';font-weight:600;flex-shrink:0">−$'+t.cvar.toFixed(0)+'</div>'
              +'</div>'
              +'</div>';
          })():'')
      +   tsBit
      +   (t.netDelta ? '<div><div class="tg-l">Net Δ</div><div class="tg-v" style="color:'+(t.netDelta.startsWith('+')?'#16a34a':'#dc2626')+'">'+t.netDelta+'</div></div>' : '')
      + '</div>'
      + '<div style="font-size:10px;color:#888;margin-bottom:6px;padding:4px 6px;background:#f8f8f6;border-radius:6px">'+(t.regimeNote??'')+'</div>'
      + '<div class="trade-thesis"><strong>Rationale:</strong> '+t.rationale+'</div>'
      + '<div class="trade-risk" style="margin-top:6px"><strong>Risk:</strong> '+t.risk+'</div>'
      + '</div>';
  }).join('');

  const biasRows = ['spy','gld','tlt'].map(a => {
    const bias=b.bias[a], net=Math.abs(bias.bull-bias.bear)<=10?'Neutral':bias.bull>bias.bear?'Bullish':'Bearish';
    const confCls=bias.conf==='High'?'bg':bias.conf==='Medium'?'bx':'br';
    const signalsList = (bias.signals??[]).length
      ? '<div style="font-size:10px;color:#888;padding:4px 0 6px;line-height:1.6;border-top:0.5px solid #f0f0ee;margin-top:4px">'
        + bias.signals.join(' · ')
        + '</div>'
      : '<div style="font-size:10px;color:#bbb;padding:4px 0 6px;border-top:0.5px solid #f0f0ee;margin-top:4px">No signals fired</div>';
    return '<div class="list-row" style="flex-direction:column;align-items:stretch;padding-bottom:4px">'
      + '<div style="display:flex;align-items:center;gap:8px;width:100%">'
      + '<div class="list-label"><strong>'+a.toUpperCase()+'</strong> · '+(a==='spy'?'50%':'25%')+'</div>'
      + '<div class="list-val"><span class="up">'+bias.bull+'%↑</span> <span class="dn">'+bias.bear+'%↓</span></div>'
      + '<div class="list-badge"><span class="badge '+(net==='Bullish'?'bg':net==='Bearish'?'br':'bx')+'">'+net+'</span></div>'
      + '<div class="list-badge"><span class="badge '+confCls+'" style="font-size:9px">'+bias.conf+'</span></div>'
      + '</div>'
      + signalsList
      + '</div>';
  }).join('');

  const regRows = ['spy','gld','tlt'].map(a => {
    const rs = b.riskScore?.[a];
    const tier = rs?.tier ?? 'Green';
    const score = rs?.score ?? 0;
    const tierCol = tier==='Red'?'#dc2626':tier==='Amber'?'#d97706':'#16a34a';
    const tierBg  = tier==='Red'?'#fee2e2':tier==='Amber'?'#fef3c7':'#dcfce7';
    const overrideTxt = rs?.override ? ' · '+rs.override : '';
    return '<div class="list-row">'
      + '<div class="list-label"><strong>'+a.toUpperCase()+'</strong>'
      + '<span style="font-size:10px;color:#aaa"> · '+(b.ts_struct[a]?.label??'—')+' · VRP '+(b.vrp[a]>0?'+':'')+b.vrp[a]+'pts · '+b.skewCond[a]+' skew</span>'
      + '</div>'
      + '<div class="list-badge"><span class="badge '+(b.dnt[a]==='HOLD'?'ba':'bg')+'">'+b.dnt[a]+'</span></div>'
      + '<div class="list-badge"><span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;background:'+tierBg+';color:'+tierCol+'">'+score+''+overrideTxt+'</span></div>'
      + '</div>';
  }).join('');

  return '<div class="sh">Regime context</div>'
    + '<div class="list-card">'+regRows+'</div>'
    + '<div class="sh">Portfolio CVaR — correlated tail risk</div>'
    + portPanel
    + '<div class="sh">Sizing summary — CVaR budget</div>'
    + summaryPanel
    + '<div class="sh">Trade construction — top 5 by conviction score</div>'
    + rows
    + '<div class="sh">Directional bias</div>'
    + '<div class="list-card">'+biasRows+'</div>';
}



/* ── Main render ── */
function render() {
  const root=document.getElementById('root');
  const et=toET(S.now);
  const timeStr=et.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true})+' ET';
  const dateStr=et.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  // Update static topbar (no focus disruption)
  const _clock=document.getElementById('clock-display');
  if(_clock) _clock.textContent=dateStr+' · '+timeStr;
  const _runBtns=document.getElementById('run-btns-container');
  if(_runBtns) _runBtns.innerHTML=SESSIONS.map(s=>`<button class="btn ${sessStatus(s,S.now)==='on'?'btn-active':''}" ${S.loading?'disabled':''} onclick="run('${s.id}')">Run ${s.short}</button>`).join('');
  const b=S.sid?S.briefs[S.sid]:null;

  let bodyHTML='';
  if (S.loading) {
    bodyHTML=`<div class="state-screen">
      <div class="spin"></div>
      <div class="state-title">Fetching…</div>
      <div class="state-sub">Near + far option chains · 20D RV · VIX/VIX3M term structure · MOVE · DXY</div>
    </div>`;
  } else if (b) {
    const c=S.tab==='overview'?renderOverview(b):S.tab==='signals'?renderSignals(b):renderTrades(b);
    bodyHTML=`<div class="content">${c}
      <div class="footer-ts">
        ${new Date(b.ts).toLocaleString('en-US',{timeZone:'America/New_York',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:true})} ET
        &nbsp;·&nbsp; RV: 20D c-t-c${b.rvLive?' (live)':' (fallback)'}
        &nbsp;·&nbsp; TS: ${b.ts_struct.spy?.source==='chain'?'chain-based':'VIX/VIX3M'} ratio
        &nbsp;·&nbsp; IV: Options Starter · Macro: Polygon · * = proxy
      </div>
    </div>`;
  } else {
    bodyHTML=`<div class="state-screen">
      <div class="state-title">No briefing yet</div>
      <div class="state-sub">Tap Run to fetch live data including near + far option chains for term structure analysis.<br><br>Auto-runs at 8 AM, 1 PM, and 5 PM ET.</div>
    </div>`;
  }

  const tabs=b?`<div class="tabs">
    <button class="tab ${S.tab==='overview'?'on':''}" onclick="setTab('overview')">Overview</button>
    <button class="tab ${S.tab==='signals'?'on':''}" onclick="setTab('signals')">Signals &amp; OI</button>
    <button class="tab ${S.tab==='trades'?'on':''}" onclick="setTab('trades')">Trades</button>
  </div>`:'';

  root.innerHTML=`
  <div style="height:8px"></div>
  <div class="sbar">
    ${SESSIONS.map(s=>{const st=sessStatus(s,S.now),has=!!S.briefs[s.id];return`<span class="pill ${st} ${has?'ptr':''}" onclick="${has?`setSession('${s.id}')`:''}">${s.label}${has?' ✓':''}</span>`;}).join('')}
    <span class="cd">${countdown(S.now)}</span>
  </div>
  <div style="height:6px"></div>
  ${tabs}
  ${S.errs.length?`<div class="content"><div class="alert alert-err">⚠ ${S.errs.join(' · ')}</div></div>`:''}
  ${S.warns.length?`<div class="content"><div class="alert alert-warn">${S.warns.join('<br>')}</div></div>`:''}
  ${bodyHTML}`;
}


function setOV(key, val) {
  OV[key] = val.trim();
  const el = document.getElementById('ov-'+key);
  if (el) el.classList.toggle('has-val', OV[key].length > 0);
  if (key === 'tnx' || key === 'tnx1' || key === 'ry' || key === 'ry1') {
    const suffix = el?.parentElement?.querySelector('span');
    if (suffix) suffix.style.color = OV[key] ? '#92400e' : '#ccc';
  }
}
function clearOV() {
  OV = { vix:'', vix1:'', vvix:'', vvix1:'', move:'', move1:'', dxy:'', dxy1:'', tnx:'', tnx1:'', ry:'', ry1:'', vix3m:'' };
  ['vix','vix1','vvix','vvix1','move','move1','dxy','dxy1','tnx','tnx1','ry','ry1','vix3m'].forEach(k => {
    const el = document.getElementById('ov-'+k);
    if (el) { el.value = ''; el.classList.remove('has-val'); }
  });
  document.querySelectorAll('#ov-tnx ~ span, #ov-tnx1 ~ span, #ov-tnx + span, #ov-tnx1 + span').forEach(s => s.style.color = '#ccc');
}

function setTab(t){S.tab=t;render();}
function setSession(sid){S.sid=sid;S.tab='overview';render();}
function run(sid){runBriefing(sid);}

const timers={};
function scheduleAutos(){
  SESSIONS.forEach(s=>{
    clearTimeout(timers[s.id]);
    const tick=()=>{
      const et=toET(new Date()),[h,m]=s.hhmm.split(':').map(Number);
      const tgt=new Date(et);tgt.setHours(h,m,0,0);
      let ms=tgt-et;if(ms<0)ms+=864e5;
      timers[s.id]=setTimeout(()=>{run(s.id);tick();},ms);
    };
    tick();
  });
}

setInterval(()=>{S.now=new Date();render();},1000);
scheduleAutos();
render();
</script>
</body>
