<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Options Desk">
<title>Options Desk</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 16px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
  font-size: 14px; color: #1a1a1a; background: #f2f2f0;
  padding-bottom: env(safe-area-inset-bottom);
}
.app { max-width: 680px; margin: 0 auto; padding: 0 0 2rem; }

/* Top bar */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(242,242,240,0.93);
  -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
  padding: 12px 16px 10px; border-bottom: 0.5px solid #d8d8d6;
}
.topbar-row1 { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.topbar h1 { font-size: 15px; font-weight: 600; letter-spacing: -.2px; }
.topbar-time { font-size: 11px; color: #888; }
.run-btns { display: flex; gap: 6px; }

/* Buttons */
.btn {
  font-size: 12px; font-weight: 500; padding: 6px 12px;
  border: 0.5px solid #c8c8c6; border-radius: 8px;
  background: #fff; color: #1a1a1a; cursor: pointer;
  white-space: nowrap; -webkit-user-select: none; user-select: none;
}
.btn:active { opacity: .6; }
.btn:disabled { opacity: .35; pointer-events: none; }
.btn-active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

/* Schedule bar */
.sbar {
  display: flex; gap: 6px; align-items: center;
  overflow-x: auto; padding: 0 16px 2px; scrollbar-width: none;
}
.sbar::-webkit-scrollbar { display: none; }
.pill {
  font-size: 11px; font-weight: 500; padding: 3px 10px;
  border-radius: 20px; border: 0.5px solid #d0d0ce;
  color: #888; background: #e8e8e6; white-space: nowrap; flex-shrink: 0;
}
.pill.on  { background: #fff; border-color: #888; color: #1a1a1a; }
.pill.nxt { background: #eff6ff; border-color: #93c5fd; color: #1d4ed8; }
.pill.ptr { cursor: pointer; }
.cd { font-size: 10px; color: #aaa; margin-left: auto; flex-shrink: 0; font-variant-numeric: tabular-nums; }

/* Tabs */
.tabs {
  display: flex; overflow-x: auto; padding: 0 16px;
  border-bottom: 0.5px solid #d8d8d6; background: #f2f2f0;
  scrollbar-width: none; -webkit-overflow-scrolling: touch;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  font-size: 13px; font-weight: 500; padding: 10px 16px;
  border: none; background: transparent; color: #999; cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -0.5px;
  white-space: nowrap; flex-shrink: 0;
}
.tab.on { color: #1a1a1a; border-bottom-color: #1a1a1a; }

/* Content */
.content { padding: 14px 16px 0; }

/* Alerts */
.alert { border-radius: 10px; padding: 10px 12px; font-size: 12px; line-height: 1.55; margin-bottom: 12px; }
.alert-err  { background: #fee2e2; color: #b91c1c; border: 0.5px solid #fca5a5; }
.alert-warn { background: #fef3c7; color: #92400e; border: 0.5px solid #fde68a; }
.alert-info { background: #eff6ff; color: #1e40af; border: 0.5px solid #bfdbfe; }

/* Section header */
.sh {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .07em; color: #999;
  margin: 18px 0 8px; padding-bottom: 5px;
  border-bottom: 0.5px solid #d8d8d6;
}
.sh:first-child { margin-top: 4px; }

/* Price row */
.price-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.price-card {
  background: #fff; border-radius: 12px;
  padding: 12px 12px 10px; border: 0.5px solid #e0e0de;
}
.pc-ticker { font-size: 11px; font-weight: 600; color: #888; letter-spacing: .04em; margin-bottom: 3px; }
.pc-price  { font-size: 19px; font-weight: 600; letter-spacing: -.5px; line-height: 1; margin-bottom: 4px; }
.pc-chg    { font-size: 11px; font-weight: 500; }
.pc-iv     { font-size: 10px; color: #aaa; margin-top: 3px; }
.up { color: #16a34a; } .dn { color: #dc2626; } .mu { color: #888; }

/* Metric row */
.metric-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.metric-card {
  background: #fff; border-radius: 10px;
  padding: 10px 10px 8px; border: 0.5px solid #e0e0de; min-width: 0;
}
.mc-l { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: #aaa; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mc-v { font-size: 16px; font-weight: 600; line-height: 1.1; }
.mc-s { font-size: 10px; color: #999; margin-top: 2px; }

/* Exec cards */
.exec-card {
  background: #fff; border-radius: 12px;
  border: 0.5px solid #e0e0de; padding: 12px 14px; margin-bottom: 8px;
}
.exec-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.exec-ticker { font-size: 15px; font-weight: 600; }
.exec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; }
.exec-label { font-size: 10px; color: #aaa; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 1px; }
.exec-val   { font-size: 12px; font-weight: 500; }

/* RV card */
.rv-card {
  background: #fff; border-radius: 12px;
  border: 0.5px solid #e0e0de; overflow: hidden; margin-bottom: 8px;
}
.rv-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px 8px; border-bottom: 0.5px solid #f0f0ee;
}
.rv-ticker { font-size: 13px; font-weight: 600; }
.rv-body   { padding: 10px 14px; }
.rv-row    { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.rv-row:last-child { margin-bottom: 0; }
.rv-label  { font-size: 11px; color: #888; }
.rv-val    { font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums; }
/* VRP bar */
.vrp-bar-wrap { margin-top: 10px; padding-top: 10px; border-top: 0.5px solid #f0f0ee; }
.vrp-bar-label { display: flex; justify-content: space-between; font-size: 10px; color: #aaa; margin-bottom: 4px; }
.vrp-bar-track { width: 100%; height: 6px; background: #f0f0ee; border-radius: 3px; position: relative; overflow: hidden; }
.vrp-bar-fill  { height: 100%; border-radius: 3px; position: absolute; top: 0; }
/* Returns sparkline */
.sparkline { display: flex; align-items: flex-end; gap: 2px; height: 28px; margin-top: 8px; }
.spark-bar { flex: 1; border-radius: 2px; min-height: 2px; }

/* Badges */
.badge {
  font-size: 10px; font-weight: 600; padding: 2px 8px;
  border-radius: 20px; display: inline-block; white-space: nowrap;
}
.bg { background: #dcfce7; color: #15803d; }
.br { background: #fee2e2; color: #b91c1c; }
.ba { background: #fef3c7; color: #b45309; }
.bb { background: #dbeafe; color: #1d4ed8; }
.bx { background: #f0f0ee; color: #666; }

/* List rows */
.list-card { background: #fff; border-radius: 12px; border: 0.5px solid #e0e0de; overflow: hidden; }
.list-row {
  display: flex; align-items: center;
  padding: 10px 14px; border-bottom: 0.5px solid #f0f0ee; gap: 8px;
}
.list-row:last-child { border-bottom: none; }
.list-label { font-size: 12px; color: #666; flex: 1; min-width: 0; }
.list-val   { font-size: 12px; font-weight: 500; text-align: right; font-variant-numeric: tabular-nums; flex-shrink: 0; }
.list-badge { flex-shrink: 0; }

/* Trade cards */
.trade-card {
  background: #fff; border-radius: 12px;
  border: 0.5px solid #e0e0de; padding: 12px 14px; margin-bottom: 8px;
}
.trade-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; gap: 8px; }
.trade-title { font-size: 13px; font-weight: 600; line-height: 1.3; }
.trade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px 12px; margin-bottom: 10px; }
.tg-l { font-size: 10px; color: #aaa; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 1px; }
.tg-v { font-size: 12px; font-weight: 500; font-variant-numeric: tabular-nums; }
.trade-thesis { font-size: 11px; color: #444; line-height: 1.55; padding-top: 9px; border-top: 0.5px solid #f0f0ee; }
.trade-risk   { font-size: 11px; color: #dc2626; margin-top: 4px; line-height: 1.45; }

/* Skew bar */
.skew-visual { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.skew-track { flex: 1; height: 4px; background: #e8e8e6; border-radius: 2px; position: relative; overflow: hidden; }
.skew-fill { height: 100%; border-radius: 2px; position: absolute; top: 0; left: 0; }
.skew-pts { font-size: 10px; color: #aaa; flex-shrink: 0; font-variant-numeric: tabular-nums; min-width: 48px; text-align: right; }

/* OI chips */
.wall-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.wall-chip {
  font-size: 11px; font-weight: 500; padding: 5px 10px;
  border-radius: 8px; border: 0.5px solid #e0e0de; background: #f8f8f6;
  display: flex; align-items: center; gap: 5px;
}
.wc-type { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 4px; }
.wc-call .wc-type { background: #dbeafe; color: #1d4ed8; }
.wc-put  .wc-type { background: #fee2e2; color: #b91c1c; }

/* States */
.state-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 55vh;
  gap: 14px; text-align: center; padding: 24px;
}
.spin { width: 24px; height: 24px; border: 2px solid #e0e0de; border-top-color: #1a1a1a; border-radius: 50%; animation: sp .8s linear infinite; }
@keyframes sp { to { transform: rotate(360deg); } }
.state-title { font-size: 15px; font-weight: 600; }
.state-sub   { font-size: 12px; color: #aaa; max-width: 260px; line-height: 1.5; }

.ts { font-size: 10px; color: #c0c0be; text-align: center; margin-top: 20px; padding: 0 16px; line-height: 1.8; }

@media (min-width: 560px) {
  .topbar { padding: 14px 24px 12px; }
  .content { padding: 16px 24px 0; }
  .sbar { padding: 0 24px 2px; }
  .tabs { padding: 0 24px; }
  .metric-row { grid-template-columns: repeat(6,1fr); }
  .exec-grid  { grid-template-columns: repeat(3,1fr); }
  .pc-price { font-size: 22px; }
}
</style>

<body>
<div class="app" id="root"></div>
<script>
const KEY = '8YxfViBiNRATU2HQwZTSUaJatTsFI0yh';

const SESSIONS = [
  { id:'pre',  label:'Pre-market',  hhmm:'08:00', short:'8 AM',  startM:480,  endM:780  },
  { id:'mid',  label:'Mid-session', hhmm:'13:00', short:'1 PM',  startM:780,  endM:1020 },
  { id:'post', label:'After-close', hhmm:'17:00', short:'5 PM',  startM:1020, endM:1320 },
];

let S = { sid:null, tab:'overview', briefs:{}, loading:false, errs:[], warns:[], now:new Date() };

/* ── Time ── */
const toET  = d => new Date(d.toLocaleString('en-US',{timeZone:'America/New_York'}));
const ymd   = d => d.toISOString().slice(0,10);
const dBack = n => { const d=new Date(toET(new Date())); d.setDate(d.getDate()-n); return ymd(d); };

function isMarketHours() {
  const et=toET(new Date()), h=et.getHours(), m=et.getMinutes(), day=et.getDay();
  if (day===0||day===6) return false;
  return (h*60+m)>=570 && (h*60+m)<960;
}
function sessStatus(s, now) {
  const et=toET(now), m=et.getHours()*60+et.getMinutes();
  if (m>=s.startM&&m<s.endM) return 'on';
  if (m<s.startM&&s.startM-m<=30) return 'nxt';
  return '';
}
function countdown(now) {
  const et=toET(now), cur=et.getHours()*60+et.getMinutes(), sec=et.getSeconds();
  for (const s of SESSIONS) {
    if (cur<s.startM) {
      const d=(s.startM-cur)*60-sec, h=Math.floor(d/3600), m=Math.floor((d%3600)/60), s2=d%60;
      return `next in ${h?h+'h ':''}${m}m ${String(s2).padStart(2,'0')}s`;
    }
  }
  const d=(1440-cur+480)*60-sec;
  return `8AM in ${Math.floor(d/3600)}h ${Math.floor((d%3600)/60)}m`;
}

/* ── API ── */
async function apiFetch(url, lbl) {
  const r=await fetch(url);
  const j=await r.json().catch(()=>({}));
  if (!r.ok||j.status==='ERROR') throw new Error(`${lbl}: ${j.error||j.message||r.status}`);
  return j;
}

// Fetch N daily bars for RV calculation — needs 22 bars for 20 daily returns + 1 buffer
async function stockBarsLong(ticker, days=30) {
  const to=ymd(toET(new Date())), from=dBack(days);
  const j=await apiFetch(
    `https://api.polygon.io/v2/aggs/ticker/${ticker}/range/1/day/${from}/${to}?adjusted=true&sort=desc&limit=35&apiKey=${KEY}`,
    `rv-bars/${ticker}`);
  return (j.results??[]).reverse(); // oldest first for return calculation
}

async function stockPrev(ticker) {
  const j=await apiFetch(
    `https://api.polygon.io/v2/aggs/ticker/${ticker}/prev?adjusted=true&apiKey=${KEY}`,
    `prev/${ticker}`);
  return j.results?.[0]??null;
}

async function indexBars(sym, days=5) {
  try {
    const to=ymd(toET(new Date())), from=dBack(days);
    const j=await apiFetch(
      `https://api.polygon.io/v2/aggs/ticker/${encodeURIComponent(sym)}/range/1/day/${from}/${to}?sort=desc&limit=5&apiKey=${KEY}`,
      `idx/${sym}`);
    return j.results??[];
  } catch { return []; }
}

async function tYield() {
  try {
    const j=await apiFetch(
      `https://api.polygon.io/v1/indicators/treasury/yield?tenor=10Y&limit=1&apiKey=${KEY}`,`yield`);
    return j.results?.values?.[0]?.value??null;
  } catch { return null; }
}

async function optionChain(ticker, dteLow=10, dteHigh=23) {
  const et=toET(new Date());
  const from=ymd(new Date(et.getTime()+dteLow*86400000));
  const to=ymd(new Date(et.getTime()+dteHigh*86400000));
  const j=await apiFetch(
    `https://api.polygon.io/v3/snapshot/options/${ticker}?expiration_date.gte=${from}&expiration_date.lte=${to}&limit=250&sort=strike_price&order=asc&apiKey=${KEY}`,
    `chain/${ticker}`);
  return j.results??[];
}

/* ── Realized Vol Calculator ── */

// 20-day close-to-close RV
// σ = std(ln(Ct / Ct-1)) × √252
// Returns { rv20, returns, nDays } or null if insufficient data
function calcRV(bars, window=20) {
  if (!bars||bars.length<window+1) return null;

  // Use the most recent window+1 bars (window+1 closes → window returns)
  const recent = bars.slice(-(window+1));
  const closes = recent.map(b=>b.c).filter(c=>c>0);
  if (closes.length < window+1) return null;

  // Log returns
  const returns = [];
  for (let i=1; i<closes.length; i++) {
    returns.push(Math.log(closes[i] / closes[i-1]));
  }
  if (returns.length < window) return null;

  // Mean
  const mean = returns.reduce((s,r)=>s+r,0) / returns.length;

  // Variance (population — standard for RV)
  const variance = returns.reduce((s,r)=>s+Math.pow(r-mean,2),0) / returns.length;

  // Annualized RV
  const rv = Math.sqrt(variance * 252);

  return {
    rv,
    returns,          // for sparkline
    nDays: returns.length,
    closes,
  };
}

/* ── Chain analysis ── */
function analyseChain(contracts, spot) {
  if (!contracts.length||!spot) return null;
  const calls=contracts.filter(c=>c.details?.contract_type==='call');
  const puts =contracts.filter(c=>c.details?.contract_type==='put');
  if (!calls.length||!puts.length) return null;

  const nearest=arr=>arr.reduce((a,b)=>
    Math.abs((a.details?.strike_price??0)-spot)<=Math.abs((b.details?.strike_price??0)-spot)?a:b);
  const atmC=nearest(calls), atmP=nearest(puts);
  const atmIV=((atmC?.implied_volatility??0)+(atmP?.implied_volatility??0))/2||atmC?.implied_volatility||0;

  const expDate=atmC?.details?.expiration_date;
  const dte=expDate?Math.max(1,Math.round((new Date(expDate)-toET(new Date()))/86400000)):15;

  // 25Δ — correct sign convention + after-hours BS fallback
  function find25IV(arr, targetDelta) {
    const withGreeks=arr.filter(c=>c.greeks?.delta!=null);
    if (withGreeks.length>=3) {
      const best=withGreeks.reduce((a,b)=>{
        const da=Math.abs(a.greeks.delta-targetDelta);
        const db=Math.abs(b.greeks.delta-targetDelta);
        return da<=db?a:b;
      });
      return best?.implied_volatility??null;
    }
    // BS strike approximation
    if (!atmIV||!dte) return null;
    const T=dte/365, d1=targetDelta>0?0.674:-0.674;
    const theorK=spot*Math.exp(-d1*atmIV*Math.sqrt(T));
    const best=arr.reduce((a,b)=>
      Math.abs((a.details?.strike_price??0)-theorK)<=Math.abs((b.details?.strike_price??0)-theorK)?a:b);
    return best?.implied_volatility??null;
  }

  const iv25C=find25IV(calls,+0.25)??0;
  const iv25P=find25IV(puts, -0.25)??0;
  const skew25=(iv25P&&iv25C)?iv25P-iv25C:null;

  const callOI=calls.reduce((s,c)=>s+(c.open_interest??0),0);
  const putOI =puts.reduce( (s,c)=>s+(c.open_interest??0),0);
  const pcRatio=callOI?(putOI/callOI).toFixed(2):'—';

  const walls=[...contracts]
    .sort((a,b)=>(b.open_interest??0)-(a.open_interest??0))
    .slice(0,5)
    .map(c=>({strike:c.details?.strike_price,type:c.details?.contract_type,oi:c.open_interest??0}));

  const midOf=c=>c?.day?.close??0;
  const straddleMid=midOf(atmC)+midOf(atmP);
  const greeksLive=calls.filter(c=>c.greeks?.delta!=null).length>=3;

  return {atmIV,iv25C,iv25P,skew25,callOI,putOI,pcRatio,walls,straddleMid,dte,greeksLive};
}

/* ── Math ── */
function ndCDF(x){
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const sg=x<0?-1:1; x=Math.abs(x);
  const t=1/(1+p*x),y=1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);
  return 0.5*(1+sg*y);
}
function pOTM(spot,strike,iv,dte,type='put'){
  if(!iv||!dte) return 0.78;
  const t=dte/365,d2=(Math.log(spot/strike)-0.5*iv*iv*t)/(iv*Math.sqrt(t));
  return type==='put'?ndCDF(d2):(1-ndCDF(d2));
}
function emCalc(spot,iv,dte){ return spot*(iv||0)*Math.sqrt(dte/365); }

/* ── Formatting ── */
const f  =(n,d=2)=>isNaN(n)||n==null?'—':Number(n).toFixed(d);
const f$ =n=>'$'+f(n);
const fp =(n,d=1)=>(!n&&n!==0)||isNaN(n)?'—':(n*100).toFixed(d)+'%';
const sgn=n=>parseFloat(n)>=0?'+':'';
const cc =n=>parseFloat(n)>=0?'up':'dn';

/* ── Build briefing ── */
function buildBriefing({stocks, rvData, indices, chains, tnx10}) {
  const sp=stocks.SPY, gl=stocks.GLD, tl=stocks.TLT;
  const spyP=sp?.price??0, gldP=gl?.price??0, tltP=tl?.price??0;
  const spyPr=sp?.prevClose??spyP, gldPr=gl?.prevClose??gldP, tltPr=tl?.prevClose??tltP;
  const chg=(c,p)=>p?{ch:f(c-p),pct:f((c-p)/p*100)}:{ch:'0.00',pct:'0.00'};

  const CA=chains.SPY, CB=chains.GLD, CC=chains.TLT;
  const vixFallback=(indices.vix??22)/100;
  const spyIV=CA?.atmIV||vixFallback;
  const gldIV=CB?.atmIV||0.24;
  const tltIV=CC?.atmIV||0.175;

  // ── LIVE 20-day RV from price history ──
  // If calculation succeeded use it; fall back to structural only as last resort
  const FALLBACK_RV = { spy:0.185, gld:0.28, tlt:0.14 };
  const spyRV  = rvData.SPY?.rv  ?? FALLBACK_RV.spy;
  const gldRV  = rvData.GLD?.rv  ?? FALLBACK_RV.gld;
  const tltRV  = rvData.TLT?.rv  ?? FALLBACK_RV.tlt;
  const rvLive = !!(rvData.SPY?.rv && rvData.GLD?.rv && rvData.TLT?.rv);

  // VRP is now genuinely real: live chain IV minus live RV
  const spyVRP=((spyIV-spyRV)*100).toFixed(1);
  const gldVRP=((gldIV-gldRV)*100).toFixed(1);
  const tltVRP=((tltIV-tltRV)*100).toFixed(1);

  const vix  =indices.vix  ??spyIV*100;
  const vvix =indices.vvix ??94;
  const move =indices.move ??85;
  const dxy  =indices.dxy  ??99.6;
  const tnx  =tnx10??indices.tnx??4.34;

  const vixPct =Math.round(Math.max(0,Math.min(100,(vix-13.38)/(60.13-13.38)*100)));
  const vvixPct=Math.round(Math.max(0,Math.min(100,(vvix-60)/(180-60)*100)));

  const skewCond=s=>{
    if(s==null) return 'N/A';
    return s>0.04?'Elevated':s< -0.01?'Inverted':'Normal';
  };
  const volR=iv=>iv>0.30?'Expansion':iv>0.18?'Transition':'Compression';
  const moveReg=move>110?'Expansion':move>80?'Transition':'Compression';
  const vixReg =vix>30?'Expansion':vix>18?'Transition':'Compression';
  const regime =vix>30||move>120?'High':vix>20||move>90?'Moderate':'Low';

  const findStrike=(spot,iv,side)=>{
    if(!spot||!iv) return {k:side==='put'?spot*.973:spot*1.027,p:78};
    let best=null,bestD=1;
    for(let pct=0.5;pct<=25;pct+=0.25){
      const k=side==='put'?spot*(1-pct/100):spot*(1+pct/100);
      const p=pOTM(spot,k,iv,15,side);
      const d=Math.abs(p-0.78);
      if(d<bestD){bestD=d;best={k:parseFloat(f(k,2)),p:parseFloat(f(p*100,0))};}
    }
    return best??{k:side==='put'?parseFloat(f(spot*.973,2)):parseFloat(f(spot*1.027,2)),p:78};
  };

  const spySS=findStrike(spyP,spyIV,'put');
  const gldSS=findStrike(gldP,gldIV,'call');
  const tltSS=findStrike(tltP,tltIV,'call');

  return {
    ts:new Date().toISOString(),
    greeksLive:isMarketHours(),
    rvLive,
    prices:{spy:spyP,gld:gldP,tlt:tltP},
    changes:{spy:chg(spyP,spyPr),gld:chg(gldP,gldPr),tlt:chg(tltP,tltPr)},
    vix:{val:vix,pct:vixPct,reg:vixReg,prev:indices.vix1},
    vvix:{val:vvix,pct:vvixPct},
    move:{val:move,reg:moveReg,prev:indices.move1},
    dxy:{val:dxy}, tnx:{val:tnx},
    iv:{spy:spyIV,gld:gldIV,tlt:tltIV},
    rv:{
      spy:{ val:spyRV, data:rvData.SPY },
      gld:{ val:gldRV, data:rvData.GLD },
      tlt:{ val:tltRV, data:rvData.TLT },
    },
    vrp:{spy:spyVRP,gld:gldVRP,tlt:tltVRP},
    skew:{
      spy:CA?.skew25??null,
      gld:CB?.skew25??null,
      tlt:CC?.skew25??null,
    },
    skewCond:{
      spy:skewCond(CA?.skew25??null),
      gld:skewCond(CB?.skew25??null),
      tlt:skewCond(CC?.skew25??null),
    },
    iv25:{
      spy:{c:CA?.iv25C,p:CA?.iv25P},
      gld:{c:CB?.iv25C,p:CB?.iv25P},
      tlt:{c:CC?.iv25C,p:CC?.iv25P},
    },
    oi:{
      spy:{pc:CA?.pcRatio??'—',walls:CA?.walls??[]},
      gld:{pc:CB?.pcRatio??'—',walls:CB?.walls??[]},
      tlt:{pc:CC?.pcRatio??'—',walls:CC?.walls??[]},
    },
    straddle:{spy:f(CA?.straddleMid??0),gld:f(CB?.straddleMid??0),tlt:f(CC?.straddleMid??0)},
    volReg:{spy:volR(spyIV),gld:volR(gldIV),tlt:volR(tltIV)},
    em:{
      spy:{d7:emCalc(spyP,spyIV,7),d15:emCalc(spyP,spyIV,15),d30:emCalc(spyP,spyIV,30)},
      gld:{d7:emCalc(gldP,gldIV,7),d15:emCalc(gldP,gldIV,15),d30:emCalc(gldP,gldIV,30)},
      tlt:{d7:emCalc(tltP,tltIV,7),d15:emCalc(tltP,tltIV,15),d30:emCalc(tltP,tltIV,30)},
    },
    dnt:{
      spy:parseFloat(spyVRP)<0||vix>28?'HOLD':'PROCEED',
      gld:parseFloat(gldVRP)<0?'HOLD':'PROCEED',
      tlt:move>120?'HOLD':'PROCEED',
    },
    regime,
    strikes:{
      spy:{short:f$(spySS.k),long:f$(spySS.k-5),potm:spySS.p+'%'},
      gld:{short:f$(gldSS.k),long:f$(gldSS.k+14),potm:gldSS.p+'%'},
      tlt:{short:f$(tltSS.k),long:f$(tltSS.k+2.5),potm:tltSS.p+'%'},
    },
    strat:{
      spy:parseFloat(spyVRP)>0?'Bull put spread':'Bull call debit',
      gld:parseFloat(gldVRP)>0?'Bear call spread':'Bull call debit (¼ size)',
      tlt:'Bear call spread',
    },
    mod:{
      spy:vix>28?'Reduce':vix<18?'Increase':'Maintain',
      gld:parseFloat(gldVRP)<0?'Reduce':'Maintain',
      tlt:move>110?'Reduce':'Maintain',
    },
    bias:{
      spy:{bull:vix<22?65:55,bear:vix<22?35:45,conf:vix>28?'Low':'Medium'},
      gld:{bull:80,bear:20,conf:'Medium'},
      tlt:{bull:20,bear:80,conf:'Med-High'},
    },
  };
}

/* ── Main fetch ── */
async function runBriefing(sid) {
  S.loading=true; S.errs=[]; S.warns=[]; render();
  try {
    // Fetch 30 calendar days of bars to guarantee 22+ trading days for RV
    const [spyBarsLong, gldBarsLong, tltBarsLong] = await Promise.all(
      ['SPY','GLD','TLT'].map(t =>
        stockBarsLong(t, 30).catch(e=>{S.warns.push(`${t} RV bars: ${e.message}`);return[];})
      )
    );

    // Calculate 20-day RV for each asset
    const rvData = {
      SPY: calcRV(spyBarsLong, 20),
      GLD: calcRV(gldBarsLong, 20),
      TLT: calcRV(tltBarsLong, 20),
    };
    if (!rvData.SPY) S.warns.push('SPY: insufficient bars for 20-day RV (need 21+ trading days) — using structural estimate');
    if (!rvData.GLD) S.warns.push('GLD: insufficient bars for RV — using structural estimate');
    if (!rvData.TLT) S.warns.push('TLT: insufficient bars for RV — using structural estimate');

    // Current prices from the same bars
    const mkStock = (bars) => {
      const sorted = [...bars].sort((a,b)=>b.t-a.t); // newest first
      return { price:sorted[0]?.c??0, prevClose:sorted[1]?.c??sorted[0]?.o??0 };
    };
    // Also grab prev for most accurate prevClose
    const [spyPr, gldPr, tltPr] = await Promise.all(
      ['SPY','GLD','TLT'].map(t=>stockPrev(t).catch(()=>null))
    );
    const stocks = {
      SPY: { price:spyBarsLong.at(-1)?.c??spyPr?.c??0, prevClose:spyPr?.c??spyBarsLong.at(-2)?.c??0 },
      GLD: { price:gldBarsLong.at(-1)?.c??gldPr?.c??0, prevClose:gldPr?.c??gldBarsLong.at(-2)?.c??0 },
      TLT: { price:tltBarsLong.at(-1)?.c??tltPr?.c??0, prevClose:tltPr?.c??tltBarsLong.at(-2)?.c??0 },
    };

    // Index bars
    const [vixB,vvixB,moveB,dxyB,tnxB] = await Promise.all([
      indexBars('I:VIX',5), indexBars('I:VVIX',5),
      indexBars('I:MOVE',5), indexBars('I:DXY',5), indexBars('I:TNX',5),
    ]);
    const bc=bars=>bars[0]?.c??null, bp=bars=>bars[1]?.c??null;
    if (!bc(vixB))  S.warns.push('I:VIX unavailable — using IV proxy');
    if (!bc(vvixB)) S.warns.push('I:VVIX unavailable — estimate');
    if (!bc(moveB)) S.warns.push('I:MOVE unavailable — estimate');
    const indices = {vix:bc(vixB),vix1:bp(vixB),vvix:bc(vvixB),move:bc(moveB),move1:bp(moveB),dxy:bc(dxyB),tnx:bc(tnxB)};

    const tnx10 = bc(tnxB) ?? await tYield().catch(()=>null);

    // Options chains
    const [spyCh,gldCh,tltCh] = await Promise.all(
      ['SPY','GLD','TLT'].map(t=>
        optionChain(t,10,23).catch(e=>{S.warns.push(`${t} chain: ${e.message}`);return[];})
      )
    );
    const chains = {
      SPY: analyseChain(spyCh, stocks.SPY.price),
      GLD: analyseChain(gldCh, stocks.GLD.price),
      TLT: analyseChain(tltCh, stocks.TLT.price),
    };

    if (!isMarketHours()) {
      S.warns.push('Outside market hours — 25Δ greeks estimated via BS strike approximation. Live greeks available 9:30–4:00 PM ET.');
    }

    S.briefs[sid] = buildBriefing({stocks, rvData, indices, chains, tnx10});
    S.sid=sid; S.tab='overview';
  } catch(e) { S.errs.push(e.message); }
  S.loading=false; render();
}

/* ── Render helpers ── */
const vbadge =v=>v==='Expansion'?'br':v==='Transition'?'ba':'bb';
const mbadge =m=>m==='Reduce'?'ba':m==='Increase'?'bg':'bx';
const sbadge =s=>s==='HOLD'?'ba':s==='CONDITIONAL'?'bx':'bg';
const skbadge=s=>s==='Elevated'?'br':s==='Inverted'?'bb':s==='N/A'?'bx':'bg';
const regbadge=r=>r==='High'?'br':r==='Moderate'?'ba':'bg';

function chgHTML(c){
  const n=parseFloat(c.pct),cls=n>=0?'up':'dn';
  return `<span class="${cls}">${n>=0?'+':''}${c.ch} (${n>=0?'+':''}${c.pct}%)</span>`;
}

function skewBarHTML(skewVal){
  if(skewVal==null) return `<div style="font-size:11px;color:#aaa">N/A — greeks not available outside market hours</div>`;
  const pts=skewVal*100, pct=Math.min(100,Math.max(0,50+pts*300));
  const color=pts>4?'#dc2626':pts< -1?'#2563eb':'#22c55e';
  return `<div class="skew-visual">
    <div class="skew-track"><div class="skew-fill" style="width:${pct}%;background:${color}"></div></div>
    <div class="skew-pts">${pts>=0?'+':''}${pts.toFixed(1)} pts</div>
  </div>`;
}

function iv25HTML(iv25, side){
  const val=iv25?.[side];
  if(val==null||val===0) return '<span style="color:#aaa">—</span>';
  return fp(val);
}

// Sparkline of daily log returns — green bars up, red bars down
function sparklineHTML(returns){
  if(!returns||!returns.length) return '';
  const maxAbs=Math.max(...returns.map(Math.abs),0.001);
  return `<div class="sparkline">
    ${returns.slice(-20).map(r=>{
      const h=Math.max(2,Math.round(Math.abs(r)/maxAbs*26));
      const color=r>=0?'#16a34a':'#dc2626';
      return `<div class="spark-bar" style="height:${h}px;background:${color}"></div>`;
    }).join('')}
  </div>`;
}

// VRP bar: shows IV vs RV visually
function vrpBarHTML(iv, rv) {
  const maxV=Math.max(iv,rv,0.01);
  const ivPct=(iv/maxV*100).toFixed(1);
  const rvPct=(rv/maxV*100).toFixed(1);
  const vrpPos=iv>rv;
  return `<div class="vrp-bar-wrap">
    <div class="vrp-bar-label">
      <span>RV ${fp(rv)}</span>
      <span>IV ${fp(iv)}</span>
    </div>
    <div style="position:relative;height:16px;">
      <div style="position:absolute;top:0;left:0;width:100%;height:6px;background:#f0f0ee;border-radius:3px;overflow:hidden;">
        <div style="height:100%;width:${rvPct}%;background:#888;border-radius:3px;position:absolute;left:0;top:0"></div>
        <div style="height:100%;width:${ivPct}%;background:${vrpPos?'#16a34a':'#dc2626'};border-radius:3px;position:absolute;left:0;top:0;opacity:0.7"></div>
      </div>
      <div style="position:absolute;top:9px;left:0;width:100%;display:flex;justify-content:space-between;">

}

  const trades=[
    {
      asset:'TLT', strat:'Bear call spread', exp:'15 DTE', sig:b.dnt.tlt,
      short:b.strikes.tlt.short, long:b.strikes.tlt.long,
      prem:'~$0.55–0.75 cr', delta:'~0.22Δ', potm:b.strikes.tlt.potm,
      thesis:`Bearish yield; VRP ${sgn(b.vrp.tlt)}${b.vrp.tlt}pts (live IV vs live RV); skew ${b.skewCond.tlt}. Initiate post 10Y auction.`,
      risk:'10Y auction shock; yields +25bp; TLT drops toward 52wk low',
    },
    {
      asset:'TLT', strat:'Bear call spread (30D)', exp:'30 DTE', sig:b.dnt.tlt,
      short:f$(parseFloat(b.strikes.tlt.short.replace('$',''))+0.5),
      long: f$(parseFloat(b.strikes.tlt.long.replace('$',''))+0.5),
      prem:'~$0.75–0.95 cr', delta:'~0.20Δ', potm:String(parseInt(b.strikes.tlt.potm)+2)+'%',
      thesis:'Rate direction intact; 30D buffer absorbs binary risk; real OI call wall confirms resistance.',
      risk:'Ceasefire → flight-to-safety; yields fall; TLT rallies through short strike',
    },
    {
      asset:'SPY', strat:'Bull put hedge (debit)', exp:'15 DTE',
      sig:b.dnt.spy==='HOLD'?'HOLD':'PROCEED',
      short:`Sell ${f$(parseFloat(b.strikes.spy.short.replace('$',''))+5)}`,
      long:`Buy ${b.strikes.spy.short}`,
      prem:'~$0.80–1.10 db', delta:'Long put', potm:'—',
      thesis:`HOLD hedge. Put skew ${b.skewCond.spy} → puts rich → debit costs less. Protects vs overnight gap risk.`,
      risk:'SPY gaps higher; debit expires worthless',
    },
    {
      asset:'GLD', strat:'Bull call debit (¼ size)', exp:'15 DTE', sig:b.dnt.gld,
      short:`Sell ${b.strikes.gld.short}`,
      long:`Buy ${f$(parseFloat(b.strikes.gld.short.replace('$',''))-14)}`,
      prem:'~$3.50–4.50 db', delta:'~0.30Δ long', potm:b.strikes.gld.potm,
      thesis:`HOLD bullish: VRP ${b.vrp.gld}pts bars short premium. Momentum. ¼ size only.`,
      risk:'Safe-haven unwind; gold IV collapses; debit lost',
    },
    {
      asset:'SPY', strat:`${b.strat.spy} (CONDITIONAL)`, exp:'15 DTE', sig:'CONDITIONAL',
      short:b.strikes.spy.short, long:b.strikes.spy.long,
      prem:'~$1.25–1.60 cr', delta:'~0.22Δ', potm:b.strikes.spy.potm,
      thesis:`⚠ Wait for binary resolution. Put skew ${b.skewCond.spy} → puts rich → above-avg credit. VRP ${sgn(b.vrp.spy)}${b.vrp.spy}pts.`,
      risk:'Gap below short strike on escalation; max loss = width − credit',
    },
  ];

  return `
  <div class="sh">Strategy Selection</div>
  <div class="list-card">
    <div class="list-row" style="background:#f8f8f6">
      <div class="list-label" style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase">Asset</div>
      <div class="list-val" style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase">Vol</div>
      <div class="list-val" style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase">VRP</div>
      <div class="list-val" style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase">Mod</div>
    </div>
    ${['spy','gld','tlt'].map(a=>`<div class="list-row">
      <div class="list-label"><strong>${a.toUpperCase()}</strong><br><span style="font-size:10px;color:#aaa">${b.strat[a]}</span></div>
      <div class="list-badge"><span class="badge ${vbadge(b.volReg[a])}">${b.volReg[a]}</span></div>
      <div class="list-val ${cc(b.vrp[a])}">${sgn(b.vrp[a])}${b.vrp[a]}pts</div>
      <div class="list-badge"><span class="badge ${mbadge(b.mod[a])}">${b.mod[a]}</span></div>
    </div>`).join('')}
  </div>

  <div class="sh">Trade Construction</div>
  ${trades.map(t=>`<div class="trade-card">
    <div class="trade-head">
      <div class="trade-title">${t.asset} — ${t.strat}</div>
      ${t.sig!=='PROCEED'?`<span class="badge ${t.sig==='CONDITIONAL'?'bx':'ba'}" style="flex-shrink:0">${t.sig}</span>`:''}
    </div>
    <div class="trade-grid">
      <div><div class="tg-l">Expiry</div><div class="tg-v">${t.exp}</div></div>
      <div><div class="tg-l">Short</div><div class="tg-v">${t.short}</div></div>
      <div><div class="tg-l">Long</div><div class="tg-v">${t.long}</div></div>
      <div><div class="tg-l">Target</div><div class="tg-v">${t.prem}</div></div>
      <div><div class="tg-l">Delta</div><div class="tg-v">${t.delta}</div></div>
      <div><div class="tg-l">P(OTM)</div><div class="tg-v">${t.potm}</div></div>
    </div>
    <div class="trade-thesis"><strong>Thesis:</strong> ${t.thesis}</div>
    <div class="trade-risk"><strong>Risk:</strong> ${t.risk}</div>
  </div>`).join('')}

  <div class="sh">Directional Bias</div>
  <div class="list-card">
    ${['spy','gld','tlt'].map(a=>{
      const bias=b.bias[a], net=Math.abs(bias.bull-bias.bear)<=10?'Neutral':bias.bull>bias.bear?'Bullish':'Bearish';
      return `<div class="list-row">
        <div class="list-label"><strong>${a.toUpperCase()}</strong> · ${a==='spy'?'50%':'25%'}</div>
        <div class="list-val"><span class="up">${bias.bull}%↑</span> <span class="dn">${bias.bear}%↓</span></div>
        <div class="list-badge"><span class="badge ${net==='Bullish'?'bg':net==='Bearish'?'br':'bx'}">${net}</span></div>
      </div>`;
    }).join('')}
  </div>`;
}

/* ── Main render ── */
function render(){
  const root=document.getElementById('root');
  const et=toET(S.now);
  const timeStr=et.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true})+' ET';
  const dateStr=et.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  const b=S.sid?S.briefs[S.sid]:null;

  let bodyHTML='';
  if(S.loading){
    bodyHTML=`<div class="state-screen">
      <div class="spin"></div>
      <div class="state-title">Fetching…</div>
      <div class="state-sub">20D RV · Options chain · VIX · VVIX · MOVE · DXY</div>
    </div>`;
  } else if(b){
    const c=S.tab==='overview'?renderOverview(b):S.tab==='signals'?renderSignals(b):renderTrades(b);
    bodyHTML=`<div class="content">${c}
      <div class="ts">
        ${new Date(b.ts).toLocaleString('en-US',{timeZone:'America/New_York',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:true})} ET
        &nbsp;·&nbsp; RV: 20D close-to-close${b.rvLive?' (live)':' (structural fallback)'}
        &nbsp;·&nbsp; IV: Options Starter chain
        &nbsp;·&nbsp; Indices: Stocks Starter
      </div>
    </div>`;
  } else {
    bodyHTML=`<div class="state-screen">
      <div class="state-title">No briefing yet</div>
      <div class="state-sub">Tap Run to fetch live data.<br>Auto-runs at 8 AM, 1 PM, and 5 PM ET.</div>
    </div>`;
  }

  const tabs=b?`<div class="tabs">
    <button class="tab ${S.tab==='overview'?'on':''}" onclick="setTab('overview')">Overview</button>
    <button class="tab ${S.tab==='signals'?'on':''}" onclick="setTab('signals')">Signals &amp; OI</button>
    <button class="tab ${S.tab==='trades'?'on':''}" onclick="setTab('trades')">Trades</button>
  </div>`:'';

  root.innerHTML=`
  <div class="topbar">
    <div class="topbar-row1">
      <h1>Options Desk</h1>
      <div class="topbar-time">${dateStr} · ${timeStr}</div>
    </div>
    <div class="run-btns">
      ${SESSIONS.map(s=>`<button class="btn ${sessStatus(s,S.now)==='on'?'btn-active':''}"
        ${S.loading?'disabled':''} onclick="run('${s.id}')">Run ${s.short}</button>`).join('')}
    </div>
  </div>
  <div style="height:8px"></div>
  <div class="sbar">
    ${SESSIONS.map(s=>{
      const st=sessStatus(s,S.now),has=!!S.briefs[s.id];
      return `<span class="pill ${st} ${has?'ptr':''}" onclick="${has?`setSession('${s.id}')`:''}">${s.label}${has?' ✓':''}</span>`;
    }).join('')}
    <span class="cd">${countdown(S.now)}</span>
  </div>
  <div style="height:6px"></div>
  ${tabs}
  ${S.errs.length?`<div class="content"><div class="alert alert-err">⚠ ${S.errs.join(' · ')}</div></div>`:''}
  ${S.warns.length?`<div class="content"><div class="alert alert-warn">${S.warns.join('<br>')}</div></div>`:''}
  ${bodyHTML}`;
}

function setTab(t){S.tab=t;render();}
function setSession(sid){S.sid=sid;S.tab='overview';render();}
function run(sid){runBriefing(sid);}

/* ── Auto-scheduler ── */
const timers={};
function scheduleAutos(){
  SESSIONS.forEach(s=>{
    clearTimeout(timers[s.id]);
    const tick=()=>{
      const et=toET(new Date()),[h,m]=s.hhmm.split(':').map(Number);
      const tgt=new Date(et);tgt.setHours(h,m,0,0);
      let ms=tgt-et;if(ms<0)ms+=864e5;
      timers[s.id]=setTimeout(()=>{run(s.id);tick();},ms);
    };
    tick();
  });
}

setInterval(()=>{S.now=new Date();render();},1000);
scheduleAutos();
render();
</script>
</body>
