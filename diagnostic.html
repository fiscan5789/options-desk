<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Polygon Diagnostic</title>
<style>
body { font-family: monospace; font-size: 12px; padding: 16px; background: #1a1a1a; color: #e0e0e0; }
button { font-size: 13px; padding: 8px 16px; margin: 4px; background: #333; color: #fff; border: 1px solid #555; border-radius: 6px; cursor: pointer; }
button:active { opacity: .6; }
.section { margin: 16px 0; border: 1px solid #444; border-radius: 6px; overflow: hidden; }
.section-title { background: #2a2a2a; padding: 8px 12px; font-weight: bold; color: #aaa; font-size: 11px; text-transform: uppercase; }
.section-body { padding: 10px 12px; }
.row { margin: 3px 0; }
.key { color: #888; }
.val { color: #7dd3fc; }
.val-good { color: #86efac; }
.val-bad  { color: #fca5a5; }
.val-warn { color: #fde68a; }
pre { white-space: pre-wrap; word-break: break-all; color: #ccc; font-size: 11px; max-height: 300px; overflow-y: auto; }
</style>
</head>
<body>
<h2 style="color:#fff;margin-bottom:16px">Polygon API Diagnostic</h2>

<div>
  <button onclick="runAll()">Run All Tests</button>
  <button onclick="testMinute('SPY')">SPY Minute</button>
  <button onclick="testMinute('GLD')">GLD Minute</button>
  <button onclick="testChain('SPY')">SPY Chain</button>
  <button onclick="testChain('GLD')">GLD Chain</button>
</div>

<div id="output" style="margin-top:16px"></div>

<script>
const KEY = '8YxfViBiNRATU2HQwZTSUaJatTsFI0yh';
const _lastMinuteSpot = {};

function log(html) {
  document.getElementById('output').innerHTML += html;
}
function clear() {
  document.getElementById('output').innerHTML = '';
}

function toET(d) {
  return new Date(d.toLocaleString('en-US', {timeZone: 'America/New_York'}));
}

function section(title, rows) {
  const rowHtml = rows.map(([k,v,cls])=>
    `<div class="row"><span class="key">${k}: </span><span class="${cls||'val'}">${v}</span></div>`
  ).join('');
  return `<div class="section"><div class="section-title">${title}</div><div class="section-body">${rowHtml}</div></div>`;
}

async function testMinute(ticker) {
  log(`<div style="color:#aaa;margin:8px 0">Testing minute bars for ${ticker}...</div>`);
  const etNow = toET(new Date());
  for (let daysBack = 0; daysBack <= 5; daysBack++) {
    const d = new Date(etNow);
    d.setDate(d.getDate() - daysBack);
    if (d.getDay() === 0 || d.getDay() === 6) continue;
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    try {
      const url = `https://api.polygon.io/v2/aggs/ticker/${ticker}/range/1/minute/${ds}/${ds}?adjusted=true&sort=desc&limit=3&apiKey=${KEY}`;
      const r = await fetch(url);
      const j = await r.json();
      const bars = j.results ?? [];
      const rows = [
        ['Date tried', ds],
        ['HTTP status', r.status, r.ok ? 'val-good' : 'val-bad'],
        ['Results count', j.resultsCount ?? 0],
        ['Bar[0] close', bars[0]?.c ?? 'none', bars[0]?.c > 0 ? 'val-good' : 'val-bad'],
        ['Bar[0] time', bars[0]?.t ? new Date(bars[0].t).toISOString() : 'none'],
        ['Bar[1] close', bars[1]?.c ?? 'none'],
        ['Bar[2] close', bars[2]?.c ?? 'none'],
        ['Raw status', j.status],
      ];
      log(section(`${ticker} Minute Bars — ${ds} (daysBack=${daysBack})`, rows));
      if (bars[0]?.c > 0) break; // found data, stop
    } catch(e) {
      log(section(`${ticker} Minute ERROR`, [['error', e.message, 'val-bad']]));
    }
  }
}

async function testChain(ticker) {
  log(`<div style="color:#aaa;margin:8px 0">Testing options chain for ${ticker}...</div>`);
  const etNow = toET(new Date());
  etNow.setHours(12,0,0,0);

  function etPlus(n) {
    const d = new Date(etNow);
    d.setDate(d.getDate() + n);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  const from = etPlus(10);
  const to   = etPlus(23);

  // Test 1: unfiltered, sort by OI desc, limit 5 — shows where OI actually is
  try {
    const url1 = `https://api.polygon.io/v3/snapshot/options/${ticker}?expiration_date.gte=${from}&expiration_date.lte=${to}&limit=5&sort=open_interest&order=desc&apiKey=${KEY}`;
    const r1 = await fetch(url1);
    const j1 = await r1.json();
    const rows1 = [
      ['Date window', `${from} → ${to}`],
      ['HTTP status', r1.status, r1.ok ? 'val-good' : 'val-bad'],
      ['Results count', (j1.results??[]).length],
      ['underlying_asset.price[0]', j1.results?.[0]?.underlying_asset?.price ?? 'null/missing', 
        j1.results?.[0]?.underlying_asset?.price > 0 ? 'val-good' : 'val-warn'],
    ];
    (j1.results??[]).forEach((c,i) => {
      rows1.push([`Contract[${i}]`, 
        `${c.details?.contract_type?.toUpperCase()} $${c.details?.strike_price} exp:${c.details?.expiration_date} OI:${c.open_interest} IV:${c.implied_volatility?.toFixed(4)??'null'}`
      ]);
    });
    log(section(`${ticker} Chain — Top 5 by OI DESC (${from}→${to})`, rows1));
  } catch(e) {
    log(section(`${ticker} Chain OI ERROR`, [['error', e.message, 'val-bad']]));
  }

  // Test 2: ascending, no strike filter — shows what the old code was getting
  try {
    const url2 = `https://api.polygon.io/v3/snapshot/options/${ticker}?expiration_date.gte=${from}&expiration_date.lte=${to}&limit=5&sort=strike_price&order=asc&apiKey=${KEY}`;
    const r2 = await fetch(url2);
    const j2 = await r2.json();
    const rows2 = [['HTTP status', r2.status, r2.ok ? 'val-good' : 'val-bad']];
    (j2.results??[]).forEach((c,i) => {
      rows2.push([`Contract[${i}]`,
        `${c.details?.contract_type?.toUpperCase()} $${c.details?.strike_price} exp:${c.details?.expiration_date} OI:${c.open_interest}`
      ]);
    });
    log(section(`${ticker} Chain — Lowest 5 strikes ASC (no filter)`, rows2));
  } catch(e) {
    log(section(`${ticker} Chain ASC ERROR`, [['error', e.message, 'val-bad']]));
  }

  // Test 3: descending, no strike filter — shows top end of the chain
  try {
    const url3 = `https://api.polygon.io/v3/snapshot/options/${ticker}?expiration_date.gte=${from}&expiration_date.lte=${to}&limit=5&sort=strike_price&order=desc&apiKey=${KEY}`;
    const r3 = await fetch(url3);
    const j3 = await r3.json();
    const rows3 = [['HTTP status', r3.status, r3.ok ? 'val-good' : 'val-bad']];
    (j3.results??[]).forEach((c,i) => {
      rows3.push([`Contract[${i}]`,
        `${c.details?.contract_type?.toUpperCase()} $${c.details?.strike_price} exp:${c.details?.expiration_date} OI:${c.open_interest}`
      ]);
    });
    log(section(`${ticker} Chain — Highest 5 strikes DESC (no filter)`, rows3));
  } catch(e) {
    log(section(`${ticker} Chain DESC ERROR`, [['error', e.message, 'val-bad']]));
  }

  // Test 4: THE KEY TEST — strike filter with spot from minute bars
  const minuteSpot = _lastMinuteSpot[ticker] ?? 0;
  if (minuteSpot > 0) {
    const lo = (minuteSpot * 0.88).toFixed(2);
    const hi = (minuteSpot * 1.12).toFixed(2);
    try {
      const url4asc  = `https://api.polygon.io/v3/snapshot/options/${ticker}?expiration_date.gte=${from}&expiration_date.lte=${to}&strike_price.gte=${lo}&strike_price.lte=${hi}&limit=5&sort=strike_price&order=asc&apiKey=${KEY}`;
      const url4desc = `https://api.polygon.io/v3/snapshot/options/${ticker}?expiration_date.gte=${from}&expiration_date.lte=${to}&strike_price.gte=${lo}&strike_price.lte=${hi}&limit=5&sort=strike_price&order=desc&apiKey=${KEY}`;
      const [r4a, r4d] = await Promise.all([fetch(url4asc), fetch(url4desc)]);
      const [j4a, j4d] = await Promise.all([r4a.json(), r4d.json()]);
      const rows4 = [
        ['Spot (minute bar)', minuteSpot, 'val-good'],
        ['Strike window', `$${lo} → $${hi}`],
        ['ASC HTTP status', r4a.status, r4a.ok ? 'val-good' : 'val-bad'],
        ['ASC results count', (j4a.results??[]).length],
        ['DESC HTTP status', r4d.status, r4d.ok ? 'val-good' : 'val-bad'],
        ['DESC results count', (j4d.results??[]).length],
      ];
      (j4a.results??[]).slice(0,3).forEach((c,i) => rows4.push([`ASC[${i}]`, `${c.details?.contract_type?.toUpperCase()} $${c.details?.strike_price} OI:${c.open_interest} IV:${c.implied_volatility?.toFixed(4)??'null'}`]));
      (j4d.results??[]).slice(0,3).forEach((c,i) => rows4.push([`DESC[${i}]`, `${c.details?.contract_type?.toUpperCase()} $${c.details?.strike_price} OI:${c.open_interest} IV:${c.implied_volatility?.toFixed(4)??'null'}`]));
      log(section(`${ticker} Chain — FILTERED ±12% around spot $${minuteSpot} ← KEY TEST`, rows4));
    } catch(e) {
      log(section(`${ticker} Chain FILTERED ERROR`, [['error', e.message, 'val-bad']]));
    }
  }
}

async function runAll() {
  clear();
  log(`<div style="color:#aaa;font-size:11px;margin-bottom:8px">Running at ${new Date().toISOString()} — ET: ${toET(new Date()).toLocaleString()}</div>`);
  await testMinute('SPY');
  await testMinute('GLD');
  await testChain('SPY');
  await testChain('GLD');
}
</script>
</body>
</html>
